poster with its spec and pricing", "prompt_preview": "generate an image of a racing car poster with its spec and pricing"}, {"id": "68", "title": "博物学家风格的食品样本横截面", "title_en": "Naturalist-Style Food Specimen Cross-Section", "category": "模型对比案例", "img": "images/case_case112/output.jpg", "prompt": "一颗/一块/一枚【食物名称】，以博物学大师发现野外标本的方式解剖。\n剖开、展开、固定——如同博物馆的珍贵藏品，\n却以卡拉瓦乔为《国家地理》掌镜时的光线照亮。\n每一个内部结构都以自身的材质真相发光。\n截面锋利得近乎暴力。内部美丽得近乎神圣。\n画面中呈现完整标本：\n一半保持原状，展示【外表面描述：质感/颜色/纹理】；\n另一半剖开至核心，【内部核心结构描述：最重要的1—2个内部视觉特征】清晰可见。\n【补充1—2句该食物最具视觉张力的横截面细节描述】\n背景：纯粹的黑丝绒。\n【食物名称】悬浮其中，如同某件珍贵而危险的事物。\n标注文字紧贴结构边缘，手写感衬线字体，绝不悬空飘浮。\n画面包含以下标注，每处标注三行：第一行结构名称，第二行成分数据，第三行一句人话：\n【结构01名称】\n【成分／数据说明】\n【这个结构在做什么，为什么重要】\n\n【结构02名称】\n【成分／数据说明】\n【这个结构在做什么，为什么重要】\n【结构03名称】\n【成分／数据说明】\n【这个结构在做什么，为什么重要】\n【结构04名称】\n【成分／数据说明】\n【这个结构在做什么，为什么重要】\n【结构05名称】\n【成分／数据说明】\n【这个结构在做什么，为什么重要】\n\n【结构06名称】\n【成分／数据说明】\n【这个结构在做什么，为什么重要】\n省略其他如果有继续保持这个格式\n主标题，左上角，暖象牙白大写字体：\n【食物名称】·解剖\n\n斜体副标题紧随其下：\n【一句揭示这种食物本质的话，不超过15字】\n\n整体气质：奥杜邦博物插画×卡拉瓦乔光影×有史以来最美的科学摄影。\n4K精度，标本照明，极致内部细节。\n没有任何临床感，一切都鲜活。\n写实风格，非示意图，非卡通，非简化图解。\n每一种材质都有真实的物理质感：\n粗糙的、光滑的、湿润的、干燥的、致密的、疏松的。", "prompt_preview": "一颗/一块/一枚【食物名称】，以博物学大师发现野外标本的方式解剖。\n剖开、展开、固定——如同博物馆的珍贵藏品，\n却以卡拉瓦乔为《国家地理》掌镜时的光线照亮。\n每一个内部结构都以自身的材质真相发光。\n截面锋利得近乎暴力。内部美丽得近乎神圣。\n画面中呈现完整标本：\n一半保持原状，展示【外表面描述：质感/颜色/纹理】；\n另一半剖开至核心，【内部核心结构描述：最重要的1—2个内部视觉特征】清晰可见。\n【补"}, {"id": "69", "title": "卓别林产品海报重新设计", "title_en": "Charlie Chaplin Product Poster Redesign", "category": "海报与插画案例", "img": "images/poster_case106/output.jpg", "prompt": "重新生成一张海报，卓别林拿着商品图里的止痒膏，面露微笑。风格要简约干净。\n\n左边是 GPT-image-2 右边是", "prompt_preview": "重新生成一张海报，卓别林拿着商品图里的止痒膏，面露微笑。风格要简约干净。\n\n左边是 GPT-image-2 右边是"}, {"id": "69", "title": "宝丽来框架突破场景", "title_en": "Polaroid Frame Breakout Scene", "category": "模型对比案例", "img": "images/case_case113/output.jpg", "prompt": "ポラロイド写真の中に人が写っていて、その人がフレームから外に飛び出している画像。日本語が書いてある画像生成して\n\n←下の画像\nGPT Image-2で生成したやつ→", "prompt_preview": "ポラロイド写真の中に人が写っていて、その人がフレームから外に飛び出している画像。日本語が書いてある画像生成して\n\n←下の画像\nGPT Image-2で生成したやつ→"}, {"id": "70", "title": "奢侈运动服篮球运动员宣传海报", "title_en": "Luxury Sportswear Basketball Athlete Campaign Poster", "category": "海报与插画案例", "img": "images/poster_case70/output.jpg", "prompt": "Create a premium luxury sportswear campaign poster featuring a confident female athlete in a modern studio environment. Full body pose with strong fashion attitude, standing tall while holding a basketball at her side, chin raised slightly, direct powerful expression. Athletic toned physique, sleek pulled back hair, clean glowing skin, sharp editorial posture.\n\nOutfit includes an oversized cropped varsity jacket, fitted sports bra, tailored biker shorts, white crew socks, and modern high top sneakers. Neutral monochrome styling with subtle premium branding.\n\nBackground is a clean light gray studio wall with giant bold condensed black typography reading “POWER” stretched vertically across the backdrop behind the model. Text should feel oversized and dominant, framing the athlete in the center.\n\nFloor is glossy reflective studio surface with subtle court markings and soft reflections. A few basketballs placed naturally around the floor for depth and campaign styling.\n\nLighting is bright luxury studio lighting with crisp highlights, soft shadows, and polished commercial finish. Sharp focus, ultra realistic skin texture, premium fabric texture, cinematic contrast.\n\nStyle should feel modern, minimal, elite, bold, high fashion sports campaign, luxury brand advertisement, clean composition, balanced negative space, strong visual impact, high resolution, square format.", "prompt_preview": "Create a premium luxury sportswear campaign poster featuring a confident female athlete in a modern studio environment. Full body pose with strong fashion attitude, standing tall while holding a baske"}, {"id": "70", "title": "餐厅POV变化比较", "title_en": "Restaurant POV Change Comparison", "category": "模型对比案例", "img": "images/comparison_case70/output.jpg", "prompt": "A side-by-side comparison graphic on a black background demonstrating a camera-angle change in the same restaurant scene. At the top, large white sans-serif text reads: \"Show me the POV from someone standing behind the bar looking out over this crowded restaurant. Change NOTHING in the scene other than the pov\". Below, place 2 stacked rectangular photos centered vertically: the top image labeled \"Source\" in large white text on the left, and the bottom image labeled \"Output\" in large white text on the left. The top photo shows a warmly lit, upscale, crowded restaurant interior seen from the dining room side, facing a tall back bar filled with many illuminated liquor bottles on wall-to-wall shelves, with bartenders and guests in front, amber lighting, globe pendant lights, wood ceiling, beige columns, and tightly packed seated diners in the foreground. The bottom photo shows the exact same restaurant, same crowd density, same warm lighting, same decor, same bar shelving, same globe pendant lights, and same overall composition elements, but now from the point of view of someone standing behind the bar and looking outward across the crowded restaurant; the foreground includes the bar counter with glassware, metal bar tools, bottles, and a point-of-sale screen visible at the lower left, while guests and staff fill the middle ground and the dining room extends into the background. Preserve the sense that only the camera position changed between the 2 images, with no other scene alterations.", "prompt_preview": "A side-by-side comparison graphic on a black background demonstrating a camera-angle change in the same restaurant scene. At the top, large white sans-serif text reads: \"Show me the POV from someone s"}, {"id": "71", "title": "街头时尚运动亚洲服装海报", "title_en": "Streetwear Fashion Campaign Asian Apparel Poster", "category": "海报与插画案例", "img": "images/poster_case71/output.jpg", "prompt": "Create a premium streetwear fashion campaign poster inspired by modern Asian apparel advertising. Full body portrait of a stylish young male model standing confidently with legs crossed at the ankles, hands inside jacket pockets, head turned slightly upward and sideways with a calm thoughtful expression. Curly tousled medium length hair with soft volume. Slim athletic build.\n\nOutfit includes a dark olive green padded hooded jacket worn open, clean white crewneck sweatshirt underneath with a tiny chest logo, relaxed black cargo style trousers, and minimal white sneakers. Styling is clean, youthful, and contemporary.\n\nBackground is a vibrant electric blue seamless studio backdrop with subtle gradient lighting, soft glow streaks, and glossy floor reflection. Lighting is soft studio light with gentle shadows and polished commercial finish.\n\nGraphic poster layout with giant bold condensed sans serif text reading “JEANSWEST” vertically stretched across the background behind the model in light gray white. Add large text on lower right reading “JW26”. \n\nComposition should feel premium, trendy, clean, commercial, youthful, modern fashion ad campaign. Sharp focus, ultra realistic fabric texture, cinematic lighting, balanced negative space, sleek branding design, high resolution, vertical poster ratio.", "prompt_preview": "Create a premium streetwear fashion campaign poster inspired by modern Asian apparel advertising. Full body portrait of a stylish young male model standing confidently with legs crossed at the ankles,"}, {"id": "71", "title": "动漫人群POV对比", "title_en": "Anime Crowd POV Comparison", "category": "模型对比案例", "img": "images/comparison_case71/output.jpg", "prompt": "{\"type\":\"comparison graphic\",\"style\":\"anime cinematic demonstration image on a black presentation background\",\"canvas\":{\"aspect_ratio\":\"4:3\",\"background\":\"solid black\"},\"text_elements\":[{\"text\":\"{argument name=\\\"headline text\\\" default=\\\"Move the camera POV to be at ground level in the crowd.\\\"}\",\"position\":\"top center\",\"style\":\"large white sans-serif\"},{\"text\":\"Source\",\"position\":\"left of upper image\",\"style\":\"large white sans-serif\"},{\"text\":\"Output\",\"position\":\"left of lower image\",\"style\":\"large white sans-serif\"}],\"layout\":{\"sections\":[{\"title\":\"Source\",\"position\":\"upper center\",\"count\":1,\"labels\":[\"overhead crowd scene\"]},{\"title\":\"Output\",\"position\":\"lower center\",\"count\":1,\"labels\":[\"ground-level crowd POV scene\"]}],\"image_frames\":2},\"images\":[{\"role\":\"source image\",\"composition\":\"busy top-down view of a densely packed historical street crowd, seen from above\",\"scene\":\"a chaotic crowd gathered around a wagon and a horse-drawn carriage, people pressed shoulder to shoulder, many wearing caps and muted early-20th-century or old-European clothing, bundles and sacks visible, one brown horse at the right edge, wooden wagon wheel and cart structure partially visible\",\"camera\":\"high overhead bird's-eye angle looking down into the crowd\",\"lighting\":\"soft daylight\",\"color_palette\":\"muted earthy browns, dusty blues, beige, olive, warm gray\",\"rendering\":\"hand-painted anime film still, detailed crowd illustration, slightly soft shading\"},{\"role\":\"output image\",\"composition\":\"the same crowded historical street reimagined from inside the mass of people at near-ground height\",\"scene\":\"view from within the crowd beside a carriage wheel, bodies filling the foreground and midground, a person in dark maroon clothing bent forward at left, a crouched figure in green near the bottom center, a woman in a light blue dress at right-center turning back, tightly packed figures, horse and cart implied nearby, dramatic sense of compression and closeness\",\"camera\":\"very low ground-level POV from inside the crowd, upward and forward through people, emphasizing complex occlusion and depth\",\"lighting\":\"soft daylight with warm cinematic shadows\",\"color_palette\":\"muted earthy browns, dusty blues, beige, olive, warm gray\",\"rendering\":\"hand-painted anime film still, cinematic perspective shift, detailed character crowding, soft painterly shading\"}],\"overall_goal\":\"show a before-and-after camera angle transformation of the same anime crowd scene, with the output moving from an overhead view to a low immersive POV inside the crowd\"}", "prompt_preview": "{\"type\":\"comparison graphic\",\"style\":\"anime cinematic demonstration image on a black presentation background\",\"canvas\":{\"aspect_ratio\":\"4:3\",\"background\":\"solid black\"},\"text_elements\":[{\"text\":\"{argu"}, {"id": "72", "title": "史诗级职业时刻电影海报模板", "title_en": "Epic Career Moments Cinematic Poster Template", "category": "海报与插画案例", "img": "images/poster_case72/output.jpg", "prompt": "Create an epic poster showcasing the most iconic moments of [Insert Name]'s career. Cinematic style, lens flare. Portrait orientation. A1 poster size. aspect ratio 4:5 https://t.co/L9OHPKUNRp", "prompt_preview": "Create an epic poster showcasing the most iconic moments of [Insert Name]'s career. Cinematic style, lens flare. Portrait orientation. A1 poster size. aspect ratio 4:5 https://t.co/L9OHPKUNRp"}, {"id": "72", "title": "霓虹灯AI缩略图对比", "title_en": "Neon AI Thumbnail Comparison", "category": "模型对比案例", "img": "images/comparison_case72/output.jpg", "prompt": "Create a dramatic Japanese YouTube thumbnail in a futuristic neon cyberpunk style, 16:9 landscape. Use a dark tech-city background with faint skyscrapers, digital grid lines, glowing particles, and high-contrast blue, pink, and gold lighting. In the exact center, place a young woman from the waist up with long straight pastel blue hair, wearing a plain white short-sleeve T-shirt and a light pink skirt, posing thoughtfully with one hand near her chin and the other arm folded; anonymize her face with a soft rectangular blur. Across the very top, add huge distressed bold white Japanese headline text reading 主導権が揺れた, and directly below it add large bold yellow text reading {argument name=\"subheadline text\" default=\"Nano Bananaから\"}. On the left side, create a glowing blue hexagonal-framed panel titled Nano Banana with a smaller subtitle 画像生成. Inside that panel, include exactly 4 image tiles in a 2x2 grid: 1) a fantasy floating island landscape at sunset, 2) a sunlit forest path with tall trees, 3) a neon futuristic city street at night, 4) an outer-space planet scene with stars and a spacecraft. Beneath the left panel, add a blue glowing ribbon label reading かつては優位だった. On the right side, create a glowing magenta hexagonal-framed panel titled {argument name=\"right panel title\" default=\"GPT Image 2\"} with a smaller subtitle 実務で使える出力へ. Inside it, include exactly 4 example thumbnail cards in a 2x2 grid, each featuring the same blue-haired woman with a blurred face and bold Japanese text. The 4 card labels above the tiles are: サムネイル画像, 記事のアイキャッチ画像, LPのセクション画像, SNS投稿画像. The large text inside the 4 cards should read respectively: 1) AIで変わるクリエイティブの未来, 2) AI時代のクリエイティブ戦略 成功する企業の条件, 3) AIで加速するビジネス成長, 4) 未来をつくるのは AI×あなたのアイデア. Between the left and right panels, place a bright glowing gold arrow pointing from left to right with spark-like particle trails, indicating transition or superiority shift. Along the bottom, add a very large black banner with a glowing gold border and massive bold gold text reading {argument name=\"bottom banner text\" default=\"GPT Image 2へ\"}. Overall composition should feel like a comparison graphic showing a shift from older image generation to more practical commercial output, with aggressive thumbnail typography, strong glow effects, metallic texture on major text, and polished social-media marketing visuals.", "prompt_preview": "Create a dramatic Japanese YouTube thumbnail in a futuristic neon cyberpunk style, 16:9 landscape. Use a dark tech-city background with faint skyscrapers, digital grid lines, glowing particles, and hi"}, {"id": "73", "title": "前卫篮球雕塑体育时尚广告", "title_en": "Avant-Garde Basketball Sculpture Sports Fashion Ad", "category": "海报与插画案例", "img": "images/poster_case73/output.jpg", "prompt": "Avant-garde sports fashion advertisement, oversized basketball posed like a monumental sculpture, female athlete reclining across the ball’s curved surface as if modern furniture, giant word “ELEVATE” in bold typography behind, burnt orange studio backdrop, glossy reflective floor, luxury athletic editorial aesthetic, cinematic lighting, ultra-clean composition, 1:1", "prompt_preview": "Avant-garde sports fashion advertisement, oversized basketball posed like a monumental sculpture, female athlete reclining across the ball’s curved surface as if modern furniture, giant word “ELEVATE”"}, {"id": "73", "title": "赛博朋克AI工具对比海报", "title_en": "Cyberpunk AI Tools Comparison Poster", "category": "模型对比案例", "img": "images/comparison_case73/output.jpg", "prompt": "A futuristic Japanese tech comparison poster in a dark cyberpunk control-room setting, wide 16:9 composition. Large distressed white Japanese headline text at the upper left reading \"三つ巴\", with a bold gold subtitle directly below reading \"それぞれの武器\". Across the center-left are 3 glowing holographic comparison panels arranged horizontally and connected by neon arrows: a blue panel labeled \"Google\", an amber-gold panel labeled \"Claude\", and a purple-magenta panel labeled \"OpenAI\". The Google panel contains 4 inner cards: 2 larger top cards labeled \"Gemini\" and \"Antigravity\", plus 2 smaller bottom cards showing analytics/dashboard-like visuals and a blue isometric cube graphic. The Claude panel contains 4 inner cards: 1 large top card labeled \"Claude Code\", plus 3 smaller bottom cards showing a network diagram, text/code list, and chart analytics. The OpenAI panel contains 5 inner cards: 2 larger top cards labeled \"ChatGPT\" and \"Codex\", plus 3 smaller bottom cards showing interface/code windows and a geometric wireframe cube. Add glowing bidirectional arrows between Google and Claude, and between Claude and OpenAI. At the bottom center, place a large neon-framed banner with gold text reading \"Google / Claude / OpenAI\". On the right side, include a young woman standing and pointing left toward the panels, with long straight split-dyed hair in pastel pink and cyan blue, a plain white t-shirt with black text reading \"{argument name=\"shirt text\" default=\"OKIHIRO AI Creative\"}\", and a soft pink pleated skirt. Her face is obscured by a smooth rectangular blur block. Use cinematic sci-fi lighting, glossy hologram UI details, high contrast, vivid blue-gold-purple accents, and a polished YouTube thumbnail aesthetic.", "prompt_preview": "A futuristic Japanese tech comparison poster in a dark cyberpunk control-room setting, wide 16:9 composition. Large distressed white Japanese headline text at the upper left reading \"三つ巴\", with a bold"}, {"id": "74", "title": "前卫网球拍雕塑体育时尚广告", "title_en": "Avant-Garde Tennis Racket Sculpture Sports Fashion Ad", "category": "海报与插画案例", "img": "images/poster_case74/output.jpg", "prompt": "Avant-garde sports fashion advertisement, oversized tennis racket positioned like monumental sculpture, female athlete seated casually on the strings as if a suspended lounge, giant word “PRECISION” in bold typography behind, crisp white studio backdrop, reflective court-like floor, luxury sportswear editorial aesthetic, cinematic lighting, ultra-clean composition, 1:1", "prompt_preview": "Avant-garde sports fashion advertisement, oversized tennis racket positioned like monumental sculpture, female athlete seated casually on the strings as if a suspended lounge, giant word “PRECISION” i"}, {"id": "74", "title": "日本AI大战YouTube缩略图", "title_en": "Japanese AI Battle YouTube Thumbnail", "category": "模型对比案例", "img": "images/comparison_case74/output.jpg", "prompt": "A bold Japanese YouTube thumbnail about the AI competition era, 16:9 widescreen, high contrast, dramatic tech-news style. Use a dark futuristic control-room background filled with 3 glowing holographic dashboard screens and blue cyber interface elements around the edges. On the left and center, place a luminous circular hub labeled “AI” in bright blue, with 3 directional glowing energy arrows branching outward to competing platforms: “Google” on the left in a blue electric region, “Claude” on the upper right in a gold electric region, and “OpenAI” at the bottom center in a magenta-purple electric region. Add a subtle world-map or territory-battle visualization effect under each brand region, like illuminated digital land masses or influence zones. On the right side, show a young Japanese-looking woman from waist up, facing forward, wearing a long straight split-color wig with pastel pink on one side and pastel blue on the other, a plain white T-shirt with the printed text “OKIHIRO AI Creative”, and a light pink skirt. She raises one index finger beside her face in a presenter pose. Her face is fully obscured by a large soft-edged rectangular blur block. Across the top, add huge distressed white Japanese headline text: {argument name=\"headline text\" default=\"AI戦国時代\"}. Beneath it, add a second line in bold gold Japanese text: {argument name=\"subheadline text\" default=\"性能だけの話じゃない\"}. Across the bottom, place a wide black banner with massive bold gold Japanese text: {argument name=\"bottom text\" default=\"空気を取った側が勝つ\"}. Make the typography oversized, gritty, and attention-grabbing, with slight glow and drop shadow. Use a color palette of black, electric blue, gold, magenta, and neon white, with intense contrast and thumbnail readability.", "prompt_preview": "A bold Japanese YouTube thumbnail about the AI competition era, 16:9 widescreen, high contrast, dramatic tech-news style. Use a dark futuristic control-room background filled with 3 glowing holographi"}, {"id": "75", "title": "超现实主义白酒品牌高端时尚海报", "title_en": "Surrealist Liquor Brand High Fashion Poster", "category": "海报与插画案例", "img": "images/poster_case60/output.jpg", "prompt": "Un póster publicitario surrealista de alta costura para Aguardiente Amarillo. La escena se sitúa en un estudio minimalista y monocromático de color naranja claro, con un suelo semirreflectante.\nEl foco central es una botella de Aguardiente Amarillo de tamaño descomunal y gigante, colocada en ángulo diagonal y que sirve como respaldo. Un modelo masculino de moda, de cabello largo y oscuro, vestido con un conjunto impecable y totalmente blanco —compuesto por una sudadera y pantalones de pierna ancha—, apoya toda su espalda contra la botella gigante en una postura relajada e inclinada. Mira hacia la derecha, de perfil, con la vista al frente y una expresión serena; calza zapatillas blancas de tamaño estándar.\nEn el fondo, la palabra \"AGUARDIENTE\" aparece escrita con una tipografía sans-serif condensada, blanca, masiva y en negrita, parcialmente oculta por la botella gigante y por el modelo para crear una sensación de profundidad. En la esquina superior derecha se lee: \"Creado por @HMontilla_\".\nEn la parte inferior central, una frase publicitaria en tipografía sans-serif blanca reza: \"El Aguardiente Amarillo de Manzanares es un icónico licor colombiano, originario de 1885 en Manzanares, Caldas\". La iluminación es suave, fría y uniforme, proyectando sombras tenues y un reflejo sutil de los sujetos sobre el suelo azul brillante. La estética general es limpia, moderna y de alto concepto.\n\nEstablecer la relación de aspecto en 3:4.", "prompt_preview": "Un póster publicitario surrealista de alta costura para Aguardiente Amarillo. La escena se sitúa en un estudio minimalista y monocromático de color naranja claro, con un suelo semirreflectante.\nEl foc"}, {"id": "75", "title": "东京迪士尼海洋前排战斗UI", "title_en": "Tokyo DisneySea Front-Row Battle UI", "category": "模型对比案例", "img": "images/comparison_case75/output.jpg", "prompt": "Create a hyper-detailed comedic Japanese arcade fighting game screenshot styled like a versus battle scene, using a real-world photo aesthetic with game UI overlaid on top. The scene shows an intense mock battle between two groups of theme-park fans competing for the front row at an outdoor show plaza in Tokyo DisneySea. Use a wide 16:9 composition. In the background, clearly show Mediterranean Harbor and Mount Prometheus under bright daytime skies, with the waterfront and DisneySea architecture visible. In the foreground, show exactly 10 young adult people in winter casual clothing, split into 2 opposing teams of 5, physically leaning, grabbing, reaching, and shoving in a tug-of-war-like scrum over position, with exaggerated competitive body language and frozen action as if in a fighting game. Faces should be anonymized with soft blurred blocks. Add floating character labels above each person with levels and names in Japanese. The overall tone is absurdly realistic, like a real candid photo transformed into a polished arcade game battle screen.\n\nAdd a full Japanese fighting-game HUD with glossy blue-versus-red interface styling. At the very top, place a center stage title bar reading \"東京ディズニーシー ミッキー広場 ショー最前列バトル\" and a large timer in the middle reading \"TIME 89\". In the top left, add a blue team header \"PLAYER1\" and team name \"最前列ガチ勢A\". In the top right, add a red team header \"RIVAL\" and team name \"ライバルグループB\". On the left side, stack exactly 5 blue player status panels with portraits, level, Japanese class-like nicknames, HP, SP, and BURST meters. The 5 left-side labels are: \"Lv.25 ガチ勢リーダー ユウキ\", \"Lv.24 筋肉マン タケシ\", \"Lv.23 眼鏡オタク シンジ\", \"Lv.23 開角心MAX ケント\", \"Lv.22 サポート要員 リョウ\". On the right side, stack exactly 5 red rival status panels with the labels: \"Lv.27 ライバルリーダー ダイキ\", \"Lv.26 パワフル代表 マサル\", \"Lv.24 戦略家 コウジ\", \"Lv.23 熱血漢 リク\", \"Lv.22 サポート女子 サキ\". Each panel should include numeric HP and SP values and segmented BURST gauges, styled like a Japanese arcade RPG-fighter interface.\n\nPlace exactly 10 in-battle nameplates above the fighters in the center scene, color-coded blue for the left team and red for the right team. The 10 labels are: \"Lv.24 タケシ\", \"Lv.25 ユウキ\", \"Lv.23 シンジ\", \"Lv.23 ケント\", \"Lv.22 リョウ\", \"Lv.27 ダイキ\", \"Lv.26 マサル\", \"Lv.23 リク\", \"Lv.22 サキ\", \"Lv.22 ミサキ\".\n\nAt the lower left, add a skill menu titled \"スキル\" listing exactly 5 skills with SP costs: \"ダッシュ突撃 SP 20\", \"肩押し強奪 SP 25\", \"荷物で場所確保 SP 15\", \"ロープくぐり SP 10\", \"本気の根性 SP 50\". Beneath that, add a dark description box explaining the highlighted skill \"本気の根性\" with the Japanese text: \"気合で相手を威圧し、どかす! 一定時間、相手が怯みやすくなる! (バーストゲージを大きく消費する) 効果時間:10秒\".\n\nAt the bottom center, add an item menu titled \"アイテム\" with exactly 5 item slots showing icons and counts: a water bottle \"x3\", a folded purple towel \"x2\", a blue drawstring bag \"x1\", a gray backpack \"x1\", and a boxed meal \"x2\". At the lower right, add a quest panel titled \"クエスト\" with the mission text \"ショー開始までに最前列を死守しろ!\" and condition text \"条件:ライバルグループを全員後ろに押し戻せ!\" and countdown text \"ショー開始まで:02:30\". Beside it, add a mini-map titled \"ミッキー広場MAP\" showing red and blue dots for both teams in the plaza. Along the very bottom edge, include small controller prompts in Japanese for actions such as skill use, item use, grab/push, and dash.\n\nUse dramatic, saturated lighting, crisp detail, realistic clothing folds, authentic plaza stone pavement, and a high-end Japanese game screenshot look. The image should feel like a ridiculous but believable crossover between a real Tokyo DisneySea crowd photo and a competitive arcade battle game interface.", "prompt_preview": "Create a hyper-detailed comedic Japanese arcade fighting game screenshot styled like a versus battle scene, using a real-world photo aesthetic with game UI overlaid on top. The scene shows an intense "}, {"id": "76", "title": "高级美食食谱海报优雅布局", "title_en": "Premium Food Recipe Poster Elegant Layout", "category": "海报与插画案例", "img": "images/poster_case76/output.jpg", "prompt": "Create a premium food preparation poster for\n [ DISH NAME ], with a beautiful hero dish, warm natural lighting, cream background, elegant step-by-step recipe layout, ingredients, cooking process, premium food photography, refined English typography, luxury restaurant advertisement style, clean design, rich colors, highly detailed, visually irresistible, cinematic masterpiece.", "prompt_preview": "Create a premium food preparation poster for\n [ DISH NAME ], with a beautiful hero dish, warm natural lighting, cream background, elegant step-by-step recipe layout, ingredients, cooking process, prem"}, {"id": "76", "title": "宫崎式短片流水线", "title_en": "Miyazaki-style short film pipeline", "category": "模型对比案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/comparison_case76/output.jpg", "prompt": "Given a story concept, generate a complete Miyazaki-style animated short film: write a 30-shot script → generate watercolor storyboard images (gpt-image-1) → plan SOFT/HARD transitions → produce video clips with Seedance 2.0 using first/last-frame binding → synthesize the original ambient piano score → stitch everything into a final MP4 with music.", "prompt_preview": "Given a story concept, generate a complete Miyazaki-style animated short film: write a 30-shot script → generate watercolor storyboard images (gpt-image-1) → plan SOFT/HARD transitions → produce video"}, {"id": "77", "title": "奢华时尚杂志封面黑白", "title_en": "Luxury Fashion Magazine Cover Black and White", "category": "海报与插画案例", "img": "images/poster_case77/output.jpg", "prompt": "Create a high fashion editorial magazine cover inspired by luxury fashion publications. Use the reference image of the male subject. Black and white portrait photography with a clean off white studio background. Subject is posed confidently from a low angle, looking slightly upward, sharp jawline, soft parted lips, tousled wavy hair with natural volume. Outfit includes a dark turtleneck layered under a textured tailored plaid blazer. Lighting is soft yet dramatic, creating sculpted facial shadows and elegant contrast.\nMagazine layout design with oversized serif masthead text at the top reading “VOGUE”, partially hidden behind the subject’s head. Minimal premium typography across the page. Add side text “FASHION”, issue date “2026 MAY”, left side headline “27 DIFFERENT STYLES”, and bold bottom right cover line “LOOK FAMOUS”. Include a small red translucent square overlay on one eye area with the word “CATCHY”.\nStyle should feel premium, modern, cinematic, clean composition, sharp focus, ultra realistic skin texture, editorial luxury aesthetic, balanced negative space, timeless fashion cover design. Vertical magazine ratio, high resolution.", "prompt_preview": "Create a high fashion editorial magazine cover inspired by luxury fashion publications. Use the reference image of the male subject. Black and white portrait photography with a clean off white studio "}, {"id": "78", "title": "超现实主义劳力士豪华手表时尚海报", "title_en": "Surrealist Rolex Luxury Watch Fashion Poster", "category": "海报与插画案例", "img": "images/poster_case78/output.jpg", "prompt": "A high-fashion surrealist poster for Rolex. A deep emerald green minimalist studio with a polished reflective floor. A massive Rolex watch stands upright like a monument. A male model in a tailored dark green suit leans casually against the watch face, wearing a matching Rolex.", "prompt_preview": "A high-fashion surrealist poster for Rolex. A deep emerald green minimalist studio with a polished reflective floor. A massive Rolex watch stands upright like a monument. A male model in a tailored da"}, {"id": "79", "title": "孔雀植物复古对称艺术印花", "title_en": "Peacock Botanical Vintage Symmetrical Art Print", "category": "海报与插画案例", "img": "images/poster_case79/output.jpg", "prompt": "symmetrical design featuring two elegant blue peacocks with detailed feather patterns, surrounded by blue floral elements, intricate vintage botanical ornament, soft beige background, classical floral decor style with rich navy and sky blue details, decorative art illustration --ar 3:2", "prompt_preview": "symmetrical design featuring two elegant blue peacocks with detailed feather patterns, surrounded by blue floral elements, intricate vintage botanical ornament, soft beige background, classical floral"}, {"id": "80", "title": "SPLASH时尚品牌超真实广告海报", "title_en": "SPLASH Fashion Brand Hyper-Realistic Campaign Poster", "category": "海报与插画案例", "img": "images/poster_case80/output.jpg", "prompt": "Create a hyper-realistic fashion poster for “SPLASH” featuring the same girl from the reference image (keep her face 100% identical). She is sitting confidently on a glossy, liquid-style 3D SPLASH logo with water splash effects. One leg relaxed, one bent, strong editorial pose.\nBackground has massive bold “SPLASH” text filling the frame, partially behind her. Add small tagline: “Own Your Style.”\nOutfit: modern black street-fashion (blazer, fitted top, trousers, sneakers).\nLighting: cinematic studio, soft key light + rim light, reflective highlights on liquid logo.\nStyle: luxury brand campaign (Zara / H&M), clean glossy environment.\nCamera: 85mm lens, shallow depth of field, 8K, ultra-detailed, photorealistic.", "prompt_preview": "Create a hyper-realistic fashion poster for “SPLASH” featuring the same girl from the reference image (keep her face 100% identical). She is sitting confidently on a glossy, liquid-style 3D SPLASH log"}, {"id": "80", "title": "视觉品牌拆解图", "title_en": "视觉品牌拆解图", "category": "模型对比案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/comparison_case80/output.jpg", "prompt": "请帮我生成一张视觉品牌拆解图，稍后我需要用来生成讲解的视频。", "prompt_preview": "请帮我生成一张视觉品牌拆解图，稍后我需要用来生成讲解的视频。"}, {"id": "81", "title": "前卫吉他雕塑时尚广告", "title_en": "Avant-Garde Guitar Sculpture Fashion Advertisement", "category": "海报与插画案例", "img": "images/poster_case81/output.jpg", "prompt": "Avant-garde fashion advertisement, oversized guitar positioned like sculpture, a guitarist in jeans casually seated on the a button as if furniture, giant word \"Plism Art\" behind in bold white typography, powder pastel studio background, reflective floor, luxury eyewear campaign aesthetic, ultra-clean layout, editorial magazine styling, Bold quote \" What are you listening\"   Tag : Create Own Change", "prompt_preview": "Avant-garde fashion advertisement, oversized guitar positioned like sculpture, a guitarist in jeans casually seated on the a button as if furniture, giant word \"Plism Art\" behind in bold white typogra"}, {"id": "81", "title": "公寓戏剧动画情节提要表", "title_en": "Apartment Drama Animation Storyboard Sheet", "category": "模型对比案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/comparison_case81/output.jpg", "prompt": "Create a new animation sheet, but this time it's a storyboard between an Indian man and an Indian woman in a dramatic scene inside an apartment. Ensure the elements of the apartment are in the scene, and include dialogue boxes, this is for 15 seconds so be careful of the cadence (sentences not too long), when a character speaks they should be the only one in frame.", "prompt_preview": "Create a new animation sheet, but this time it's a storyboard between an Indian man and an Indian woman in a dramatic scene inside an apartment. Ensure the elements of the apartment are in the scene, "}, {"id": "82", "title": "复古母子肖像修复体验", "title_en": "Restored Vintage Mother and Child Portrait", "category": "人像与摄影案例", "img": "images/portrait_case82/output.jpg", "prompt": "A restored vintage family snapshot, photographed indoors in soft natural light, showing a {argument name=\"adult subject\" default=\"young mother\"} seated and holding a {argument name=\"child subject\" default=\"toddler\"} on her lap in a close, centered waist-up portrait. The adult has short softly curled auburn hair in a voluminous 1960s-inspired bob, wears a sleeveless black dress and a thin gold necklace, and wraps both arms protectively around the child. The child has fine light blond hair and wears a plain white long-sleeve outfit. Compose the image with a warm nostalgic color cast, gentle film softness, subtle grain, and the look of a carefully repaired old printed photograph. Place them in front of a cream-colored curtain patterned with small brown teddy bear motifs, with a softly blurred interior window frame visible along the top background. Preserve realistic skin tones, natural posture, and the intimate family-photo feeling, as if an old damaged photograph has been professionally reimagined and restored. Square crop, centered composition, shallow depth of field, authentic analog photo texture, no modern styling, no text.", "prompt_preview": "A restored vintage family snapshot, photographed indoors in soft natural light, showing a {argument name=\"adult subject\" default=\"young mother\"} seated and holding a {argument name=\"child subject\" def"}, {"id": "82", "title": "异想天开的民间涂鸦改造", "title_en": "Whimsical Folk Doodle Transformation", "category": "模型对比案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/comparison_case82/output.jpg", "prompt": "Simplify all details into clean, flat shapes with a handmade, slightly imperfect feel, as if drawn on a sheet of white paper. The overall style should look cute, childlike, and whimsical.", "prompt_preview": "Simplify all details into clean, flat shapes with a handmade, slightly imperfect feel, as if drawn on a sheet of white paper. The overall style should look cute, childlike, and whimsical."}, {"id": "83", "title": "受损的老式母亲和孩子照片", "title_en": "Damaged Vintage Mother and Child Photo", "category": "人像与摄影案例", "img": "images/portrait_case83/output.jpg", "prompt": "A heavily damaged old family snapshot in faded black and white with a slight sepia cast, shown as a worn physical photograph scanned straight-on. The image depicts a seated woman holding a small child on her lap indoors, both centered in a simple portrait composition. The woman has short dark wavy hair and wears a dark sleeveless dress or pinafore layered over a lighter short-sleeved blouse. The child appears to be a toddler with very short light hair, wearing a light-colored outfit, facing the camera while sitting against the woman’s chest and arm. Behind them is a patterned curtain with small floral or leaf motifs, and above it a dark window area with a pale vertical window frame is visible near the top center. The print is severely deteriorated: extensive scratches, creases, emulsion damage, stains, blotches, and peeling cover the entire surface, with especially heavy white abrasion and loss of detail across the bottom third and scattered cracking throughout. Keep the overall look authentic to a mid-20th-century vernacular photo, low contrast, soft focus, and visibly aged paper texture. Add a rectangular blurred censor block over the woman’s face only, while the child’s face remains visible but faded. No text, no border, just the distressed archival photograph filling the frame.", "prompt_preview": "A heavily damaged old family snapshot in faded black and white with a slight sepia cast, shown as a worn physical photograph scanned straight-on. The image depicts a seated woman holding a small child"}, {"id": "83", "title": "室内设计情绪板发电机", "title_en": "Interior Design Mood Board Generator", "category": "模型对比案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/comparison_case83/output.jpg", "prompt": "GPT Image 2 室内设计情绪板生成器\n\n提示词：\n（室内设计情绪板生成器 / Interior Design Mood Board Generator）\n你是一名专业的室内设计 Mood Board 创作者。请基于用户提供的 [Space Type] 室内设计照片，生成一张 竖版 3:4 的高端室内设计情绪板。整体视觉参考专业室内设计提案图，呈现 [Style Keywords] 的审美特征，画面应具备 [Mood Keywords] 的空间氛围，并符合 [Branding Tone] 的高级设计表达。\n场景类型（Space Type）：[Space Type]\n画面布局要求\n上半部分：呈现一张高分辨率、照片级真实感的 [Space Type] 室内设计效果图。\n\n该效果图需要在空间结构、家具语言、材质关系、色彩搭配、光影氛围上与用户输入照片保持一致，同时提升为更完整、更精致、更具设计提案感的视觉呈现。\n\n重点体现：[Key Furniture Elements]、[Material Keywords]、[Color Palette]、[Lighting Style]。\n下半部分：展示与上方空间设计严格对应的材质与软装样本，包括：\n材料样板\n面料样本\n色卡\n饰面样本\n与该空间相关的木材、石材、金属、玻璃、织物、皮革或涂料样本\n\n所有样本必须与上方空间保持一致，并准确反映该设计方案中的核心材质与色彩逻辑。\n右下角：设置一个 Design Legend / Color Palette 信息框，统一展示本方案的：\n主色\n辅助色\n点缀色\n核心材质\n饰面说明\n风格关键词\n风格与输出要求\n专业室内设计公司级别的 Mood Board 版式\n极简、整洁、克制、有秩序的排版\n明确的视觉层级与留白控制\n材质、色彩、面料、饰面与上方空间完全匹配\n标签清晰、现代、简洁，具有高级编辑设计感\n整体气质需符合 [Style Keywords]\n呈现 [Render Quality]\n竖版 3:4 构图\n4K Ultra HD\n超高细节\n写实渲染\n直接用于图像生成\n标签要求\n每个材质或色彩样本配有清晰标签，标签内容围绕以下信息组织：\n\n[Label Language] 的材质名称、颜色名称、饰面名称或织物类型。\n\n标签风格应简洁、专业、排版规整，不喧宾夺主。\n主题定义\n[Space Type] Interior Design Mood Board\n\n风格方向：[Style Name]\n\n关键词：[Style Keywords], [Material Keywords], [Color Palette], [Mood Keywords]\n负面约束\n避免杂乱拼贴、避免廉价海报风、避免材质与空间不匹配、避免错误透视、避免低质字体、避免装饰元素过多、避免卡通感、避免过饱和色彩、避免信息层", "prompt_preview": "GPT Image 2 室内设计情绪板生成器\n\n提示词：\n（室内设计情绪板生成器 / Interior Design Mood Board Generator）\n你是一名专业的室内设计 Mood Board 创作者。请基于用户提供的 [Space Type] 室内设计照片，生成一张 竖版 3:4 的高端室内设计情绪板。整体视觉参考专业室内设计提案图，呈现 [Style Keywords] 的审美特"}, {"id": "84", "title": "水墨蚀刻家庭肖像", "title_en": "Ink-Etched Family Portrait", "category": "人像与摄影案例", "img": "images/portrait_case84/output.jpg", "prompt": "A black-and-white hand-drawn family portrait in the style of detailed pen-and-ink crosshatching on textured white paper, showing 4 people seated closely together in a casual candid composition. On the left, an adult man in a dark baseball cap worn backward and a dark T-shirt leans into the frame, with a crossbody sling bag worn across his chest and visible zipper details. On the right, an adult woman with curly hair tied up in a loose high bun wears a light T-shirt with large collegiate block letters reading {argument name=\"shirt text\" default=\"CITY\"}. In the center are 2 young children sitting close together, both with short curly hair and matching light-colored T-shirts printed all over with strawberries. The child on the left leans inward with one arm crossing the other child, and the child on the right tilts their head slightly upward. The adults frame the children protectively, creating a warm family snapshot feeling. Render the whole image as a monochrome etched illustration with dense fine-line hatching, engraved shadows, crisp contour lines, and a realistic yet artistic likeness, with no color, no background setting beyond a plain light paper texture, and a vertical portrait crop.", "prompt_preview": "A black-and-white hand-drawn family portrait in the style of detailed pen-and-ink crosshatching on textured white paper, showing 4 people seated closely together in a casual candid composition. On the"}, {"id": "84", "title": "甜甜圈抢劫故事板工作表", "title_en": "Donut Heist Storyboard Sheet", "category": "模型对比案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/comparison_case84/output.jpg", "prompt": "Title: “THE DONUT HEIST”\nSubtitle: “15s Comedic Storyboard – 9 Shots”\n\nStyle: full-color 3D animated storyboard sheet, cinematic cartoon characters, polished lighting, expressive faces, vibrant colors, red panel borders, blue camera/action arrows.\n\nCharacters: chubby food-obsessed raccoon with striped tail. Small hyperactive squirrel with fluffy tail.\n\nImportant: keep left-right continuity. Squirrel always rushes from screen left to right, looking toward the bench/raccoon, never away. Raccoon stays near the donut box. In panel 03, the raccoon hears rustling from screen left and looks that way.\n\nEach panel: timecode, shot type, camera move, short action note.\n\n01 0–1.5s Wide/static: raccoon finds donut box on park bench.\n02 1.5–3s Med/push-in: raccoon opens box in awe.\n03 3–4.5s MCU/pan: raccoon hears rustling from screen left and looks that way, suspicious.\n04 4.5–6s Wide/tracking: squirrel sprints toward bench, eyes locked on donuts.\n05 6–7.5s Med/push-in: raccoon protects donut box.\n06 7.5–9s Close/forward: squirrel crashes into raccoon, donuts fly.\n07 9–11s Close/tight: both scramble for falling donuts.\n08 11–13s Med/static: both freeze, holding half a donut.\n09 13–15s Wide/final hold: they glare, then bite at once.\n\nRight side: character sheet + palette: sunny park, green grass, raccoon grey-brown, squirrel orange-brown, pink icing.", "prompt_preview": "Title: “THE DONUT HEIST”\nSubtitle: “15s Comedic Storyboard – 9 Shots”\n\nStyle: full-color 3D animated storyboard sheet, cinematic cartoon characters, polished lighting, expressive faces, vibrant colors"}, {"id": "85", "title": "复古雕刻连帽衫肖像", "title_en": "Vintage Engraved Hoodie Portrait", "category": "人像与摄影案例", "img": "images/portrait_case85/output.jpg", "prompt": "A centered black-and-white vintage engraved portrait of a bearded man wearing a hooded sweatshirt with the hood up and a backward snapback cap visible under the hood. Show only the upper torso and head against a plain off-white paper background with subtle texture. Render the image in detailed pen-and-ink etching style with dense cross-hatching, fine parallel lines, and old book illustration shading. The figure faces forward in a calm, neutral pose. The cap has a visible snap closure band across the forehead area, slicked-back hair is visible above it, and a thick full beard extends below the face. The hoodie has two drawstrings hanging down at the chest. Keep the composition symmetrical and tightly framed like a classic engraved bust portrait, with no color, no modern graphic elements, and no background objects.", "prompt_preview": "A centered black-and-white vintage engraved portrait of a bearded man wearing a hooded sweatshirt with the hood up and a backward snapback cap visible under the hood. Show only the upper torso and hea"}, {"id": "85", "title": "酸面包师故事板", "title_en": "Sourdough Baker Storyboard", "category": "模型对比案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/comparison_case85/output.jpg", "prompt": "“Create a crisp, clean infographic storyboard poster for THE SOURDOUGH BAKER. Wide 16:9 layout, white background, black borders, bold black typography, premium Pixar 3D stylized rendering, bright warm colors — creamy dough whites, golden crust browns, warm flour dust, rich amber kitchen light, pops of green from herbs on the windowsill. Top header: THE SOURDOUGH BAKER TOTAL VIDEO TIME: 12 SECONDS 8 SHOTS · WARM · SLOW · BAKED WITH LOVE Legend icons: ACTION, HEAT, TIME HINT, INGREDIENT Same Pixar-style young male baker throughout — flour-dusted white apron, warm rustic kitchen, wooden counter, morning light streaming through the window. And one recurring character — a fluffy orange cat who takes the craft extremely seriously and is present in every single panel. 8 panels: Panel 1 — THE OPENER: Wide shot. Baker walks into his kitchen at dawn carrying a large flour bag under one arm. He drops it onto the wooden counter sending a dramatic puff of white flour into the warm morning light — flour cloud catching the golden sunlight beautifully. The orange cat is already sitting on the counter waiting, completely unbothered by the flour cloud, staring directly at the baker. They look at each other. The day begins. You know exactly what's about to happen. Panel 2 — THE MIX: Overhead locked shot. Baker's hands mixing flour, water and sourdough starter together in a large ceramic bowl — shaggy dough forming, the transformation beginning. The orange cat sits at the edge of the counter, head tilted, watching the bowl with complete concentration. Panel 3 — THE KNEAD: The hero comedy panel. Baker steps aside. The orange cat is on the counter, both front paws pressing and kneading the dough exactly like cats do in real life — slow rhythmic biscuit-making motion, eyes half closed in pure contentment. Baker watches from the side with a resigned smile. The cat is completely unbothered and deeply committed to the process. Panel 4 — THE FOLD: Side angle. Baker performs the stretch and fold — pulling the dough up and folding it over itself, the dough becoming smooth and elastic. Close-up on hands and dough. The orange cat watches from beside the bowl, one paw resting on the counter edge, supervising every movement. Panel 5 — THE SCORE: Close-up dramatic shot. Baker holds a razor lame above the risen dough, scoring a deep curved line across the surface — the blade catching the light. The orange cat sits in the background perfectly framed, watching with complete intensity as if this is the most important moment of the day. It is. Panel 6 — THE OVEN: Wide shot. Baker slides the dough inside the cast iron dutch oven, closes the heavy lid, slides it into the glowing oven. The orange cat sits directly in front of the oven door, staring at it, waiting. Will not move. Will never move. Panel 7 — THE REVEAL: The hero frame. Baker lifts the dutch oven lid — an enormous cloud of steam erupts upward, and beneath it the most perfect golden sourdough loaf, deeply scored crust cracked open, caramelized and blistered. The orange cat stands up on its hind legs trying to see over the counter edge, eyes wide, completely losing its composure for the first time. Panel 8 — THE SLICE: Wide warm shot. Baker slices through the loaf — perfect open crumb revealed inside, steam still rising, golden crust crackling. Butter placed on the warm slice, melting instantly. The orange cat sits beside the cutting board, one paw raised toward the bread. Baker looks at the cat. Cat looks at the bread. Baker smiles. Perfect ending. Footer: VIDEO FLOW: 8 shots × ~1.5s = 12 seconds. Flour drop to first slice. CAMERA TIPS: wide on opener with flour cloud, overhead on the mix, wide medium on the knead with cat in full view, side angle on the fold, close-up on the score, wide on the oven with cat guarding, hero wide shot on the steam reveal, warm wide on the final slice LIGHT & STYLE: warm golden morning light, creamy dough whites, deep golden crust.”", "prompt_preview": "“Create a crisp, clean infographic storyboard poster for THE SOURDOUGH BAKER. Wide 16:9 layout, white background, black borders, bold black typography, premium Pixar 3D stylized rendering, bright warm"}, {"id": "86", "title": "梦幻背光编辑肖像", "title_en": "Dreamy Backlit Editorial Portrait", "category": "人像与摄影案例", "img": "images/portrait_case86/output.jpg", "prompt": "A cinematic soft-focus portrait of a woman from behind and slightly in profile, framed from the upper torso up in a vertical composition. She has {argument name=\"hair color\" default=\"dark brown\"} hair styled in a loose messy updo with wispy strands catching the light. Her face is mostly hidden by her pose and hair, with only a small portion of one cheek visible. She wears a {argument name=\"dress color\" default=\"deep red\"} sleeveless dress with an open back or low-cut side, emphasizing her bare shoulder and upper back. One hand is raised delicately near her neck or shoulder, fingers relaxed. Use strong warm backlighting and rim light, with glowing golden highlights around the hair and skin, dreamy lens flare, and large circular bokeh in the blurred background. The image should feel intimate, elegant, and slightly sensual, like a high-end fashion or beauty editorial, with shallow depth of field, creamy blur, warm amber and rose tones, and a soft cinematic glow.", "prompt_preview": "A cinematic soft-focus portrait of a woman from behind and slightly in profile, framed from the upper torso up in a vertical composition. She has {argument name=\"hair color\" default=\"dark brown\"} hair"}, {"id": "86", "title": "情节提要网格模板", "title_en": "Storyboard Grid Template", "category": "模型对比案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/comparison_case86/output.jpg", "prompt": "Based on the content【 *****】, create a storyboard image in 16:9 ratio, 4K resolution.\n1️⃣ Basic Setup\nMain Title + Subtitle\nAspect Ratio\nLayout Design (3-column × 9-scene storyboard grid)\n2️⃣ Style Direction\nDirector-inspired visual style\nVisual keywords (for example: Ridley Scott / low-saturation atmospheric sci-fi)\n3️⃣ Storyboard Details\nFor each scene, clearly describe:\nCamera shot\nCharacter action\nVisual progression / scene transition\nSound effects / audio cues\n4️⃣ Visual Guidelines\nColor palette and tone\nCinematic language and lighting style\n(example: desaturated earthy tones + strong rim lighting)\n5️⃣ Bottom Information Section\nCharacter profiles\nOverall mood / tone\nAudio timeline / sound design notes\nTechnical specifications\n#AIArt #AIFilm #AIStoryboard", "prompt_preview": "Based on the content【 *****】, create a storyboard image in 16:9 ratio, 4K resolution.\n1️⃣ Basic Setup\nMain Title + Subtitle\nAspect Ratio\nLayout Design (3-column × 9-scene storyboard grid)\n2️⃣ Style Di"}, {"id": "87", "title": "3D卡通角色渲染", "title_en": "3D Cartoon Character Render", "category": "人像与摄影案例", "img": "images/portrait_case87/output.jpg", "prompt": "High-quality 3D CGI render of {argument name=\"character\" default=\"[character]\"} in a charming cartoon style, portrait composition showing head and shoulders. Highly stylized caricature with exaggerated, expressive features that are both playful and humorous. Smooth, polished rendering with clean materials and soft ambient lighting creating gentle shadows. Dynamic camera angle with stylish perspective. Minimalist bright {argument name=\"background color\" default=\"[color]\"} background that makes the character pop and stand out. Professional Pixar-like quality with glossy finish and cheerful mood.", "prompt_preview": "High-quality 3D CGI render of {argument name=\"character\" default=\"[character]\"} in a charming cartoon style, portrait composition showing head and shoulders. Highly stylized caricature with exaggerate"}, {"id": "87", "title": "爸爸煎饼故事板", "title_en": "Pancake Dad Storyboard", "category": "模型对比案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/comparison_case87/output.jpg", "prompt": "Create a crisp, clean infographic storyboard poster for THE PANCAKE DAD. Wide 16:9 layout, white background, black borders, bold black typography, premium Pixar 3D stylized rendering, bright warm colors — golden pancake yellows, rich amber maple syrup, fresh blueberry blues and purples, creamy whites, warm morning kitchen light.\nTop header:\n•THE PANCAKE DAD\n•TOTAL VIDEO TIME: 12 SECONDS\n•8 SHOTS · GOLDEN · FLUFFY · SATURDAY MORNING\n•Legend icons: ACTION, HEAT, TIME HINT, INGREDIENT\nSame Pixar-style dad throughout — warm smile, casual home clothes, no apron or chef uniform, messy morning hair, cozy bright home kitchen, morning sunlight streaming through the window. A child’s drawing on the fridge visible in the background. And one recurring character — a small girl in a pink t-shirt who appears in the final panel.\n8 panels:\nPanel 1 — THE OPENER: Wide shot. Dad stands at the kitchen counter in his casual clothes, morning light flooding in behind him. He holds a large flour bag with both hands and pours it into the mixing bowl — a generous cloud of white flour billowing up into the warm morning sunlight, catching the light beautifully. He waves the flour dust away from his face with a warm laugh. Messy, real, Saturday morning. The fridge behind him has a child’s drawing on it. You know exactly what’s being made.\nPanel 2 — THE CRACK: Extreme close-up. Dad cracks a fresh egg over the mixing bowl — the bowl already has flour and milk in it, golden yolk drops in slow motion into the batter mixture. Shell splits cleanly. The moment it all comes together.\nPanel 3 — THE STIR: Medium shot with dad visible. He whisks the batter in smooth circular motions, the mixture becoming smooth and pale yellow, tiny bubbles forming on the surface. Morning light catching the whisk. Relaxed and unhurried — this is his Saturday ritual.\nPanel 4 — THE POUR: Close-up side angle. Batter poured from the bowl onto a hot buttered pan — it spreads into a perfect circle, edges immediately beginning to set, tiny bubbles forming across the surface. The sizzle implied in every frame.\nPanel 5 — THE FLIP: The hero frame. Low angle dramatic shot — spatula slides under the pancake, dad flips it with one confident motion, pancake suspended perfectly in mid-air above the pan, golden underside revealed, dad’s face lit up with pure joy behind it.\nPanel 6 — THE STACK: Wide medium shot with dad visible. He slides the finished pancake onto a plate already holding two others — a perfect golden stack building up, steam rising from each layer. Dad looks genuinely pleased with himself.\nPanel 7 — THE SYRUP: Close-up beauty shot. Maple syrup poured from above in a slow golden arc over the stack — cascading down the sides, pooling at the base, fresh blueberries scattered around the plate. Liquid gold catching the morning light. Irresistible.\nPanel 8 — THE EAT: Wide warm shot. A small girl in a bright pink t-shirt sits at the kitchen table, eyes wide, mouth open, fork mid-bite into the stack, blueberries on the plate, syrup everywhere. Dad stands in the background arms crossed, warm proud smile. Saturday morning complete.\nFooter:\n•VIDEO FLOW: 8 shots × ~1.5s = 12 seconds. Flour cloud to first bite.\n•CAMERA TIPS: wide on the flour pour opener with flour cloud, extreme close-up on the egg crack, medium on the stir with dad visible, close-up on the batter pour, low angle dramatic on the flip, wide medium on the stack, beauty close-up on the syrup cascade, wide warm shot on the girl eating with dad in background\n•LIGHT & STYLE: warm golden Saturday morning light, fluffy pancake golds, rich amber maple syrup, fresh blueberry blues, bright pink t-shirt, creamy batter whites, Pixar vivid warm colors throughout\n•DAD NOTES: one dad, one Saturday, one very happy girl in a pink t-shirt. Golden, fluffy, and made with love.​​​​​​​​​​​​​​​​", "prompt_preview": "Create a crisp, clean infographic storyboard poster for THE PANCAKE DAD. Wide 16:9 layout, white background, black borders, bold black typography, premium Pixar 3D stylized rendering, bright warm colo"}, {"id": "88", "title acter. Beneath it, add the Spanish quote {argument name=\"quote\" default=\"A veces, para encontrarte... tienes que perderte en el mundo.\"}. Below that, add \"UNA PELÍCULA DE ESTUDIO LUMINARIA\" in small caps. At the bottom, add the release line {argument name=\"release text\" default=\"PRÓXIMAMENTE EN CINES\"} in large gold serif capitals, plus tiny production logos and credits along the footer, including a small studio emblem on the left. Rich blue, violet, and warm sunset orange palette, glossy poster lighting, romantic adventure mood, balanced composition, highly polished theatrical key art, vertical one-sheet film poster.", "prompt_preview": "A cinematic anime movie poster for a fictional film titled {argument name=\"headline text\" default=\"EL VIAJE DE LA LUNA DE PLATA\"}, in polished modern Japanese animation style with a natural, less over"}, {"id": "102", "title": "收藏人偶工作区照片", "title_en": "Collectible Figure Workspace Photo", "category": "人像与摄影案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/portrait_case102/output.jpg", "prompt": "Photorealistic high-quality studio photo of a modern digital art workspace, showing the concept of “from 3D virtual character to real collectible figure.”\n\nIn the foreground, a highly realistic collectible figurine of [Character Name / Character Identity] is placed on a round wooden display stand. The character has [facial features / appearance], [hairstyle], and a [expression / personality vibe]. The figure is wearing [outfit / costume]. The overall design is refined, premium, and instantly recognizable. The figurine should have realistic collectible statue quality, with subtle resin/sculpture material feel, while still looking highly believable and visually realistic.\n\nThe pose is [character pose], natural, stable, elegant, and display-worthy. Shot from a low-angle close-up perspective with slight wide-angle distortion, vertical composition, emphasizing the full figu In the foreground, a highly realistic collec"}, {"id": "102", "title": "动漫音乐训练营宣传海报", "title_en": "Anime Music Bootcamp Promo Poster", "category": "UI与社交媒体案例", "img": "images/ui_case102/output.jpg", "prompt": "Create a dramatic Japanese anime-style promotional thumbnail poster for an event, vertical 4:5 composition, ultra-detailed, cinematic, neon-lit, high contrast, designed like a social media announcement image. The main subject is a beautiful anime girl centered slightly right, shown from the waist up, with long flowing {argument name=\"hair color\" default=\"deep blue\"} hair blowing in the wind, decorated with small star hairpins, wearing a dark hoodie and large studio headphones around her neck, against a glowing sunset-to-night city skyline filled with sparkling lights, music-energy particles, lens flares, and flying glowing petals. Her face area is obscured by a soft rectangular blur block. Use a vivid palette of electric blue, violet, magenta, gold, and sunset orange. Fill the design with layered Japanese typography that is crisp, readable, and integrated into the art like a polished event advertisement. Include exactly 8 major text groups: top left copy reading 「始まるのは、キミと創る 音楽の物語。」 with a smaller subcopy beneath reading 「AIを使って、みんなで音楽をつくる特別な3日間。」; top right a glowing marquee sign reading 「GW連休!」 and a smaller neon box below reading 「みんなで最高の音楽をつくろう!」; center main title with small English text 「AI MUSIC BOOTCAMP 2」 above huge Japanese title text 「AI音楽 ブートキャンプ 2」; a gigantic gold metallic announcement across the middle reading 「開催決定!」; a date bar reading 「開催期間」 followed by 「5.2 SAT 土」 and 「5.4 MON 月」; a hashtag callout near the bottom reading 「参加はカンタン!! #AI音楽ブートキャンプ2 をつけて投稿するだけ!」; a lower encouragement line reading 「初心者も大歓迎! みんなで最高の音楽体験を!」; and 3 bottom feature captions with icons reading 「一緒に学ぶ 仲間とつながる」, 「AIで創る 新しい音楽体験」, and 「想いをカタチに 自分だけの1曲を」. On the left edge, add a vertical filmstrip with exactly 4 inset panels showing the same girl in music-related scen s/portrait_case105/output.jpg", "prompt": "Create a bold, high-contrast black and white portrait of a confident young man wearing a black leather jacket, facing slightly sideways with an intense expression. Use dramatic studio lighting with sharp shadows and detailed skin texture. Add strong red graphic elements over the image, including a horizontal red bar across the eyes, geometric shapes, thin lines, and framing boxes. Incorporate large bold typography, repeated faded text, and a motivational headline in bright red. The design should feel like a premium sports or streetwear campaign poster with a minimal textured grey background and black/white/grey/red palette only.", "prompt_preview": "Create a bold, high-contrast black and white portrait of a confident young man wearing a black leather jacket, facing slightly sideways with an intense expression. Use dramatic studio lighting with sh"}, {"id": "105", "title": "多面板图像板模板", "title_en": "Multi-Panel Image Board Template", "category": "UI与社交媒体案例", "img": "images/ui_case105/output.jpg", "prompt": "Create a {argument name=\"grid layout\" default=\"4x3\"} borderless grid where each panel is an independent image of the {argument name=\"subject\" default=\"a young woman\"}. Maintain strong subject consistency across all panels, with consistent color and lighting. Depict {argument name=\"theme\" default=\"childhood memories\"} with a {argument name=\"mood\" default=\"warm, nostalgic\"} mood in {argument name=\"style\" default=\"nostalgic cinematic realism\"} style. No text. No gap.", "prompt_preview": "Create a {argument name=\"grid layout\" default=\"4x3\"} borderless grid where each panel is an independent image of the {argument name=\"subject\" default=\"a young woman\"}. Maintain strong subject consiste"}, {"id": "106", "title": "手写的写实信件", "title_en": "Handwritten Realistic Letter", "category": "UI与社交媒体案例", "img": "images/ui_case106/output.jpg", "prompt": "Create a highly realistic image of a handwritten letter containing a ({argument name=\"message\" default=\"message or reflection carrying meanings of affection and loyalty to my account followers\"}) on lined paper, with very touching words written in liquid ink pen", "prompt_preview": "Create a highly realistic image of a handwritten letter containing a ({argument name=\"message\" default=\"message or reflection carrying meanings of affection and loyalty to my account followers\"}) on l"}, {"id": "107", "title": "18面板吉祥物品牌标识文档", "title_en": "18-Panel Mascot Brand Identity Document", "category": "广告创意案例", "img": "images/poster_case107/output.jpg", "prompt": "{\n  \"type\": \"18-panel brand identity and character design document\",\n  \"brand\": {\n    \"name\": \"{argument name=\\\"brand name\\\" default=\\\"沐阳 MUYANG TEA\\\"}\",\n    \"industry\": \"{argument name=\\\"industry\\\" default=\\\"tea shop\\\"}\",\n    \"colors\": [\"{argument name=\\\"primary color\\\" default=\\\"yellow\\\"}\", \"{argument name=\\\"secondary color\\\" default=\\\"green\\\"}\", \"white\", \"brown\", \"dark green\"]\n  },\n  \"subject\": \"{argument name=\\\"character description\\\" default=\\\"3D rendered cute Shiba Inu mascot wearing a green apron\\\"}\",\n  \"layout\": {\n    \"grid\": \"3 columns by 6 rows\",\n    \"sections\": [\n      {\n        \"title\": \"01 品牌DNA分析 / BRAND DNA ANALYSIS\",\n        \"elements\": [\"logo\", \"5 color swatches\", \"6 icons\", \"target audience charts\"]\n      },\n      {\n        \"title\": \"02 概念构思 / CONCEPT MOODBOARD\",\n        \"elements\": [\"5 photo references\", \"4 mood icons\", \"design equation\"]\n      },\n      {\n        \"title\": \"03 形态研究 / FORM STUDY\",\n        \"elements\": [\"4 logo anatomy icons\", \"4 evolution steps\", \"4 silhouettes\"]\n      },\n      {\n        \"title\": \"04 概念探索 / CONCEPT EXPLORATION\",\n        \"elements\": [\"12 line-art character sketches\"]\n      },\n      {\n        \"title\": \"05 精细线稿 / REFINED LINE ART\",\n        \"elements\": [\"3 rows of front ion text\\\" default=\\\"获取专属增长方案 ->\\\"}'\"],\n        \"visual\": \"3D render of a rocket ship taking off with purple and blue flames\"\n      }\n    ]\n  }\n}", "prompt_preview": "{\n  \"type\": \"UI/UX landing page mockup\",\n  \"theme\": \"dark mode, sleek modern aesthetic, glassmorphism, {argument name=\\\"primary accent color\\\" default=\\\"neon purple and blue\\\"} glowing accents\",\n  \"he"}, {"id": "108", "title": "动漫女孩和男人约会照片拼贴", "title_en": "Anime Girl and Man Date Photo Collage", "category": "UI与社交媒体案例", "img": "images/ui_case108/output.jpg", "prompt": "A 4x4 photo collage of 16 warm, cinematic lifestyle snapshots featuring a real adult man and an anime-style young woman companion posed together as if in casual date photos. The man has short dark hair, light skin, an average build, and wears a plain dark navy or black long-sleeve shirt; his face is intentionally obscured and softly blurred in every frame. The anime girl has long blonde twin ponytails, large blue eyes, light skin, and a slim petite build, wearing a black sleeveless top, layered silver necklaces including a cross pendant, black wrist accessories, a red plaid pleated mini skirt, and black-and-white striped thigh-high socks. Blend realistic photography with a convincingly integrated 2D anime character, keeping her clean cel-shaded look while matching the scene lighting, perspective, focus, and color grading so she appears naturally present beside him. Use moody evening tones, soft bokeh, shallow depth of field, and intimate candid couple energy. The 16 panels are: 1) close indoor portrait with both seated close together, the girl resting beside him; 2) nighttime city street side profile conversation under blurred streetlights; 3) indoors, both reading a book together, the girl leaning on his shoulder; 4) outdoor cafe table, both holding takeaway coffee cups; 5) restaurant table with multiple dishes visible, dining together; 6) mirror selfie in an elevator, the man holding a smartphone whi 福鞋穿在右脚上，左脚裸露，悬停在纹理奶油色的薄纱地毯上方，而第二个匹配的乐福鞋位于左下角的前景地毯上。这双鞋有光滑的黑色皮革鞋面，圆润的杏仁脚趾，开放的骡子风格的鞋跟，毛绒鞋跟"}, {"id": "117", "title": "Cinematic Chicken Momos广告海报", "title_en": "Cinematic Chicken Momos Ad Poster", "category": "UI与社交媒体案例", "img": "images/ui_case117/output.jpg", "prompt": "A hyper-realistic cinematic street-food advertisement poster for {argument name=\"brand name\" default=\"Licious\"} frozen {argument name=\"product name\" default=\"Chicken Momos\"}, shot in a dark premium studio with dramatic moody lighting, deep navy-black background, glossy black tabletop, and high contrast commercial food photography styling. The composition is a square social-media ad layout with oversized bold condensed white sans-serif headline text on the left reading {argument name=\"headline text\" default=\"PERFECTLY MADE.\"} stacked across two lines, and a smaller white subheadline beneath it reading {argument name=\"tagline text\" default=\"PRECISION IN EVERY BITE.\"}. Along the far left edge, add thin vertical small caps text reading “FRESH • CLEAN • CONTROLLED”. Across the upper-right background, repeat the phrase “CUT / STEAM / SERVE / REPEAT” in a subtle dark gray pattern, and faintly repeat “CUT / STEAM / SERVE / REPEAT” again near the bottom-left floor area as perspective text. Feature exactly 6 momos total: 5 intact steamed chicken momos floating and arranged dynamically across the center and right side, and 1 split-open momo in the center revealing juicy orange-brown chicken filling with herbs, with a glossy red-orange sauce droplet dripping downward from the opened dumpling. Scatter small chili flakes, herb bits, and seasoning particles suspended in the air around the momos for explosive motion. Place exactly 3 retail product boxes on the right side, staggered in depth, black packaging with the {argument name=\"brand name\" default=\"Licious\"} logo and red product title “CHICKEN MOMOS,” including food photography of the dumplings on the box front. At the bottom right foreground,
