thes\"},\"faces\":\"intentionally obscured by soft rectangular blur blocks over every visible face\"},\"layout\":{\"grid\":{\"rows\":4,\"columns\":4,\"count\":16,\"border\":\"thin white dividers, equal square cells\"},\"images\":[{\"position\":\"row 1 col 1\",\"description\":\"close cropped portrait of the woman in a white top at night, soft flash, dark background\"},{\"position\":\"row 1 col 2\",\"description\":\"close cropped blurred two-person selfie framing, both subjects partially visible, dark nighttime setting\"},{\"position\":\"row 1 col 3\",\"description\":\"young man standing at night and holding a compact silver camera up to his face, white shirt, distant lights behind him\"},{\"position\":\"row 1 col 4\",\"description\":\"woman on a beach or shoreline in low light, softly blurred, ocean horizon behind her\"},{\"position\":\"row 2 col 1\",\"description\":\"street candid of the man holding a camera near his face while walking outdoors in the evening, urban background with motion blur\"},{\"position\":\"row 2 col 2\",\"description\":\"close-up of the woman indoors or in a dim warm setting, hand raised near her face, flash-lit snapshot\"},{\"position\":\"row 2 col 3\",\"description\":\"blurred two-shot of the couple sitting close together by water at dusk, intimate candid composition\"},{\"position\":\"row 2 col 4\",\"description\":\"young man outdoors in greenery during daytime or early evening, looking down at a camera in his hands, white shirt and camera strap visible\"},{\"position\":\"row 3 col 1\",\"description\":\"woman close to the camera giving a peace sign, casual sleeveless top, sandy or beachlike background\"},{\"position\":\"row 3 col 2\",\"description\":\"back view of the man in a white shirt looking out over a cityscape at night from a high vantage point\"},{\"position\":\"row 3 col 3\",\"description\":\"woman indoors at night holding a compact camera directly toward the viewer, city lights beyond a window, flash aesthetic\"},{\"position\":\"row 3 col 4\",\"description\":\"tight cropped two-person selfie-like frame with both subjects partially visible, dark background\"},{\"position\":\"row 4 col 1\",\"description\":\"young man at the waterfront at dusk holding a camera to his eye, cloudy blue sky and distant shoreline behind him\"},{\"position\":\"row 4 col 2\",\"description\":\"soft night portrait of the woman on a city street with warm bokeh lights in the background\"},{\"position\":\"row 4 col 3\",\"description\":\"close intimate couple snapshot with both faces near each other, one subject making a peace sign, heavy blur and flash look\"},{\"position\":\"row 4 col 4\",\"description\":\"rear view of the woman walking alone down a warmly lit narrow street at night, shoulder-length hair and light top visible\"}]},\"composition\":\"each square feels like a memory fragment from one summer evening and a few nearby outings, varied framing, natural imperfection, casual amateur photography\",\"color_palette\":\"muted blues, warm tungsten yellows, soft skin tones, dark greens, charcoal night shadows, faded white clothing\",\"camera_look\":\"35mm point-and-shoot or disposable camera feel, shallow focus, motion blur, bloom around lights, occasional flash overexposure\",\"quality\":\"high-resolution collage with authentic analog softness, emotionally evocative and realistic\"}", "prompt_preview": "{\"type\":\"16-photo nostalgic contact sheet collage\",\"style\":\"dreamy film photography, soft blur, slightly underexposed, candid youthful romance, flash snapshots mixed with ambient dusk light, subtle gr"}, {"id": "119", "title": "仿生Skyray飞机海报", "title_en": "Biomimetic Skyray Aircraft Poster", "category": "海报与插画案例", "img": "images/poster_case119/output.jpg", "prompt": "{\"type\":\"biomimetic aerospace concept poster\",\"subject\":{\"vehicle\":\"futuristic aircraft concept\",\"name\":\"{argument name=\\\"vehicle name\\\" default=\\\"SKYRAY\\\"}\",\"inspiration\":\"{argument name=\\\"animal inspiration\\\" default=\\\"stingray\\\"}\",\"design\":\"blended-wing-body aircraft shaped like a manta ray or stingray, wide triangular planform, smooth organic curves, sharp pointed nose, slightly raised central spine, tapered wing tips curling subtly upward, dark graphite-black metallic skin with fine panel lines and faint blue illuminated accents along edges and seams\"},\"style\":{\"mood\":\"premium futuristic industrial design presentation\",\"rendering\":\"hyper-detailed cinematic 3D concept art mixed with blueprint visualization\",\"color_palette\":\"black, charcoal, gunmetal, silver, deep ocean blue, electric cyan highlights\",\"lighting\":\"low-key dramatic studio lighting with glossy reflections, cool rim light, subtle underwater ambience in the top inspiration strip\"},\"layout\":{\"background\":\"full black poster with faint technical grid lines and soft vignetting\",\"sections\":[{\"title\":\"header\",\"position\":\"top\",\"count\":3,\"labels\":[\"emblem mark\",\"SKYRAY\",\"INSPIRED BY THE SEA. ENGINEERED FOR THE SKY.\"]},{\"title\":\"evolution strip\",\"position\":\"upper middle\",\"count\":5,\"labels\":[\"realistic stingray underwater at far left\",\"top-view biological stingray study\",\"abstract aerodynamic line sketch\",\"faceted aircraft blueprint transition drawing\",\"final sleek aircraft concept at far right\"]},{\"title\":\"hero render\",\"position\":\"center\",\"count\":1,\"labels\":[\"large three-quarter view of the aircraft\"]},{\"title\":\"technical views grid\",\"position\":\"lower middle\",\"count\":6,\"labels\":[\"TOP\",\"SIDE\",\"FRONT\",\"REAR\",\"UNDERSIDE\",\"DETAIL\"]},{\"title\":\"footer text\",\"position\":\"bottom\",\"count\":1,\"labels\":[\"{argument name=\\\"body text\\\" default=\\\"A biomimetic high-speed aircraft concept shaped by the hydrodynamic elegance of the stingray. Its blended wing body, low-drag silhouette, and fluid control surfaces translate ocean-born efficiency into atmospheric performance.\\\"}\"]}],\"technical views\":{\"TOP\":\"top orthographic view with measurement ticks\",\"SIDE\":\"thin side profile with long smooth belly curve\",\"FRONT\":\"front orthographic view emphasizing broad wingspan and central cockpit hump\",\"REAR\":\"rear orthographic view showing narrow tail end and wing sweep\",\"UNDERSIDE\":\"underside three-quarter view\",\"DETAIL\":\"close-up crop of metallic skin, seam lines, and glowing blue edge strip\"},\"graphics\":{\"logo\":\"minimal four-point symmetrical emblem above title, resembling a stylized ray silhouette\",\"arrows\":\"4 thin cyan arrows connecting the 5 stages in the evolution strip\",\"typography\":\"widely spaced modern sans-serif uppercase text, clean luxury-tech branding\"},\"camera\":{\"hero render\":\"slightly elevated front-left three-quarter angle\",\"technical views\":\"orthographic\",\"inspiration image\":\"underwater side angle with light rays from above\"},\"quality\":\"ultra-clean, polished, high contrast, sharp, poster-ready, concept design board for aerospace branding or speculative industrial design\"}", "prompt_preview": "{\"type\":\"biomimetic aerospace concept poster\",\"subject\":{\"vehicle\":\"futuristic aircraft concept\",\"name\":\"{argument name=\\\"vehicle name\\\" default=\\\"SKYRAY\\\"}\",\"inspiration\":\"{argument name=\\\"animal ins"}, {"id": "119", "title": "动漫BL促销缩略图", "title_en": "Anime BL Promo Thumbnail", "category": "UI与社交媒体案例", "img": "images/ui_case119/output.jpg", "prompt": "A bright, polished anime-style promotional thumbnail with a summer romance atmosphere. The composition is split visually, with large typography on the left and two handsome young men on the right. On the left side, place layered translucent white panels with soft glow and sparkles over a sky-blue background, featuring large elegant serif text \"GPT\" in a blue gradient at the top and \"BL\" in a lavender-to-violet gradient below. Add three lines of Japanese text arranged between and under them: \"最新の画像生成で\", \"作って\", and \"遊んでみた\", in deep blue calligraphic Japanese type. Include subtle decorative accents such as small star glints, diagonal light streaks, dotted texture, and a cyan underline swoosh beneath the middle text. On the right side, show 2 anime boys from the waist up, leaning casually together beside a chain-link fence under leafy trees. The taller boy has tousled dark brown hair, a navy overshirt worn open over a white T-shirt, layered silver necklaces, and holds 1 plastic cup of iced coffee with a straw. The shorter boy has messy silver-white hair, a white T-shirt with a small crest emblem on the chest, black backpack straps over both shoulders, layered silver necklaces, and one small earring. Their poses are relaxed and intimate, with the dark-haired boy’s arm resting around the other. Use a luminous blue-and-white palette with soft sunlight, lens flare, bokeh, and a faint cityscape in the background, creating a clean social-media header or article thumbnail aesthetic.", "prompt_preview": "A bright, polished anime-style promotional thumbnail with a summer romance atmosphere. The composition is split visually, with large typography on the left and two handsome young men on the right. On "}, {"id": "120", "title": "道人三魂七宝海报", "title_en": "Taoist Three Souls Seven Po Poster", "category": "海报与插画案例", "img": "images/poster_case120/output.jpg", "prompt": "A highly detailed vertical Taoist esoteric infographic poster in the style of an ancient Chinese religious scroll, printed on aged beige rice paper with fine ornamental borders, inked calligraphy, faded stains, and classical diagram annotations. At the top center, large black brush-calligraphy title text reads {argument name=\"headline text\" default=\"道·三魂七魄\"}. Directly below the title is a smaller paragraph of classical Chinese explanatory text in neat calligraphy. The composition is perfectly symmetrical and centered on a glowing vertical spiritual axis made of white-gold energy, mist, and lightning-like qi currents running from the bottom of the page to the heavens. At the very top, above the axis, depict 3 seated Taoist immortals or deities on clouds in a golden celestial realm, arranged left, center, and right, with halos and flowing robes in muted green, cream, and blue. Beneath them, create a towering multi-layered cosmological body diagram made of 9 stacked circular realms or platforms connected by swirling clouds and luminous energy. The upper 5 larger realms represent the five zang organs as miniature mythic landscapes: 1 forested green realm labeled liver/wood, 1 fiery red-gold temple city realm labeled heart/fire, 1 yellow earth realm with terraces labeled spleen/earth, 1 silver-blue mountain-and-water realm labeled lung/metal, and 1 dark blue watery abyss realm labeled kidney/water. Place a glowing meditating figure in a bright orb at the center junction between the upper organ realms and lower spirit layers. Below these, add 7 progressively darker circular underworld-like realms for the seven po souls, each densely populated with tiny scenes of human figures, spirits, beasts, ritual activity, suffering, temptation, conflict, and karmic symbolism, all wrapped by drifting smoke and energy ribbons. At the very bottom, show a seated human figure in meditation within a root-like cavern or corporeal foundation, surrounded by chains, rocks, and embodied worldly attachments. Around the central column, include exactly 9 labeled side panels and diagrams in traditional Chinese layout: top left a bagua and yin-yang cosmology circle; top right a dotted numerological or constellation-like chart; left upper a boxed list for 3 souls; right upper a boxed list for 7 po souls; left middle a five-elements relationship diagram with 5 colored nodes; right middle a circular essence-qi-spirit cycle diagram with 3 nodes; left lower a vertical boxed list of 7 categories or stages; right lower a boxed correspondence table; bottom left a five-direction and five-element human-body relation chart; bottom right a standing and seated meridian or cultivation body diagram. Use many small Chinese labels throughout every section, with classical seal stamps in red. The overall palette is antique parchment, sepia ink, muted jade, cinnabar red, smoky gray, gold, teal, and indigo. The style should feel like a museum-quality Daoist metaphysical chart, ultra intricate, hand-painted gongbi plus ink wash illustration, sacred, mystical, scholarly, dense with symbolism, extremely fine linework, soft cloud layering, and high-resolution poster design.", "prompt_preview": "A highly detailed vertical Taoist esoteric infographic poster in the style of an ancient Chinese religious scroll, printed on aged beige rice paper with fine ornamental borders, inked calligraphy, fad"}, {"id": "120", "title": "夜晚的艺术家和空灵缪斯", "title_en": "Artist and Ethereal Muse at Night", "category": "UI与社交媒体案例", "img": "images/ui_case120/output.jpg", "prompt": "A cinematic anime-inspired digital illustration set at night inside a cozy artist's room with large window panes and a warm city glow outside. On the left, a young male artist with {argument name=\"hair color\" default=\"dark brown\"} messy hair sits at a cluttered desk in side profile, leaning forward with one hand near his mouth and the other drawing with a pen on a tablet or sketchbook. The desk is covered with exactly 1 pen cup filled with pencils, 1 coffee mug, 1 open laptop or pen-display showing a sunset landscape, 1 spiral sketchbook with manga-style character drawings, 2 additional drawing books or pads, 1 small stack of about 4 books, and many scattered art cards and printed illustrations. On the right, a luminous ethereal anime girl made of blue-white light appears life-sized, facing the artist with both hands gently extended toward him. Her form is translucent, delicate, and composed of glowing contour lines, starry particles, and flowing strands of light, with long windblown hair and a soft dress-like silhouette. Between them, a magical stream of golden and white light spirals upward from the artist's desk into the air, connecting creator and creation. Inside this swirling ribbon are exactly 12 to 16 floating image fragments and sketch pages: monochrome character sketches, scenic sunset paintings, small photo-like panels, and tiny icon-like cards, all orbiting in a curved arc from lower center to upper left and upper center. Around the upper half of the image, dozens of glowing musical notes float through the air, mixed with sparkling particles, creating the feeling that inspiration has become visible sound and memory. The palette is rich warm gold and amber on the artist's side, contrasted with cool electric blue and white on the spirit girl's side, with dramatic rim light, volumetric glow, intricate particles, and a dreamy emotional atmosphere. Composition is vertical, highly detailed, intimate, and poetic, evoking the relationship between {argument name=\"person one\" default=\"you\"} and {argument name=\"person two\" default=\"me\"} as artist and imagined muse, where drawings, music, memories, and fantasy physically manifest in the room. Add a small handwritten note card on the desk with {argument name=\"note text\" default=\"二人だけの物語\"}, and display one prominent artwork on the desk and one floating scenic panel using {argument name=\"scene theme\" default=\"sunset sky over a distant city\"}.", "prompt_preview": "A cinematic anime-inspired digital illustration set at night inside a cozy artist's room with large window panes and a warm city glow outside. On the left, a young male artist with {argument name=\"hai"}, {"id": "121", "title": "复古Claude Shannon信息图表海报", "title_en": "Vintage Claude Shannon Infographic Poster", "category": "海报与插画案例", "img": "images/poster_case121/output.jpg", "prompt": "{\"type\":\"vintage editorial infographic poster\",\"subject\":\"Claude Shannon and information theory\",\"style\":{\"era\":\"1940s Bell Labs archival poster\",\"look\":\"aged cream paper, blueprint drafting grid, thin ink linework, muted navy and charcoal printing, subtle stains and paper wear, technical illustration mixed with newspaper editorial design\",\"rendering\":\"high-detail diagrammatic collage with engraved portrait, scientific charts, labeled panels, and hand-drawn signal graphics\"},\"poster\":{\"headline\":\"Claude Shannon — The Architecture of Information\",\"subheadline\":\"How uncertainty became measurable, and communication became engineering.\",\"topRightMeta\":{\"note\":\"NOTE TOSELF No. 6713–2\",\"date\":\"MAY 1948\",\"subject\":\"A Mathematical Theory of Communication\"},\"layout\":{\"sections\":[{\"title\":\"left archival sidebar\",\"position\":\"far left vertical column\",\"count\":5,\"labels\":[\"BELL LABORATORIES MURRAY HILL, N.J.\",\"ENGINEERING THE INTANGIBLE\",\"CLAUDE E. SHANNON 1916–2001\",\"TOOLS OF THE INFORMATION AGE\",\"quote panel\"]},{\"title\":\"THE COMMUNICATION MODEL\",\"position\":\"upper middle wide panel\",\"count\":5,\"labels\":[\"1 INFORMATION SOURCE\",\"2 ENCODER\",\"3 CHANNEL\",\"4 DECODER\",\"5 DESTINATION\"]},{\"title\":\"ENTROPY: THE MEASURE OF UNCERTAINTY\",\"position\":\"upper right box\",\"count\":4,\"labels\":[\"H(X) = −Σ p(x) log2 p(x)\",\"PROBABILITY DISTRIBUTION p(x)\",\"MORE EVEN MORE MAXED UNCERTAINTY\",\"MORE LOPSIDED LESS UNCERTAINTY\"]},{\"title\":\"lower theory panels\",\"position\":\"middle to lower band\",\"count\":3,\"labels\":[\"A ENTROPY — uncertainty before a message is known\",\"B NOISE — randomness that corrupts transmission\",\"C Redundancy & Error Correction — structure added so signals can survive failure\"]},{\"title\":\"THEORY THAT TRANSFORMED CIVILIZATION\",\"position\":\"bottom horizontal timeline\",\"count\":8,\"labels\":[\"1840s TELEGRAPHY\",\"1876+ TELEPHONE NETWORKS\",\"1930s–40s DIGITAL COMPUTERS\",\"1950s–60s SATELLITE COMMUNICATION\",\"1970s INTERNET PROTOCOLS\",\"1980s–90s DATA COMPRESSION\",\"1990s–2000s CRYPTOGRAPHY\",\"2010s+ AI & INFORMATION SYSTEMS\"]}],\"centerpiece\":\"a large abstract cloud of blue and gray signal noise, dots, lines, and waveforms behind the communication model, with arrows moving left to right through the five stages\"},\"visualElements\":{\"portrait\":{\"subject\":\"{argument name=\\\"scientist name\\\" default=\\\"Claude Shannon\\\"}\",\"placement\":\"left-center\",\"style\":\"black-and-white archival seated portrait at a desk with the face intentionally obscured by a pale square censor block, wearing suit and tie, writing on paper\"},\"objectsLeft\":[\"rotary telephone on desk\",\"open notebook or papers\",\"technical console with CRT screen and knobs behind portrait\",\"small icon row of 4 tools: oscilloscope, signal meter, relay, punched tape\"],\"communicationModel\":[\"book and symbols under source\",\"binary digits under encoder\",\"large noisy channel cloud with wave overlays\",\"binary digits and interpretation under decoder\",\"light bulb icon under destination\"],\"chartsAndDiagrams\":[\"bar chart for entropy probabilities\",\"two low vs high entropy mini bar charts\",\"tree diagram and entropy notation\",\"signal distortion sketches labeled thermal noise, cross talk, distortion\",\"error-correction binary pipeline from original message to recovered message\"],\"bottomDecor\":[\"small waveform legend with sine wave, digital signal, and noise\",\"archival stamp or footer on lower right\"]},\"color\":{\"background\":\"warm ivory paper\",\"primaryInk\":\"dark navy\",\"secondaryInk\":\"charcoal gray\",\"accent\":\"faded steel blue\"},\"composition\":\"symmetrical wide poster with dense boxed annotations, fine border lines, and a museum-quality educational infographic feel\",\"textDensity\":\"very high, with many small labels, formulas, captions, and historical notes in a carefully organized grid\",\"aspectRatio\":\"16:9 landscape\"}", "prompt_preview": "{\"type\":\"vintage editorial infographic poster\",\"subject\":\"Claude Shannon and information theory\",\"style\":{\"era\":\"1940s Bell Labs archival poster\",\"look\":\"aged cream paper, blueprint drafting grid, thi"}, {"id": "122", "title": "陈恩水墨致敬海报", "title_en": "Ink-Wash Tribute Poster for Chen Uen", "category": "海报与插画案例", "img": "images/poster_case122/output.jpg", "prompt": "Create a vintage editorial poster on aged rice paper celebrating {argument name=\"artist name\" default=\"CHEN UEN\"}, designed like a museum infographic mixed with Chinese ink wash illustration and calligraphy. The format is a single vertically oriented poster with a weathered parchment background, ink splatters, faded handwritten annotations, red seal stamps, and a scholarly, archival atmosphere. At the very top, place large black Chinese calligraphy for the name 鄭問, followed by a slash and the romanized name {argument name=\"romanized name\" default=\"CHEN UEN\"} in large serif capitals, with a small red seal beside it. Under the title, add the subtitle {argument name=\"subtitle text\" default=\"The Taiwanese Master Who Turned Comics into Ink-Born Epic\"} in elegant reddish-brown serif text. In the center, feature a dramatic painterly scene of 1 seated male artist in a loose white shirt at a desk, holding a brush over paper, his face intentionally obscured by a soft rectangular blur. Behind him, surround him with a swirling halo-like storm of monochrome ink-brush warriors and historical figures: exact count 9 visible character figures, including armored generals, swordsmen, and mounted riders, emerging from explosive black brushwork and smoke-like ink textures. On the left side, create a vertical section titled “Life & Milestones” with a black brushstroke header and smaller Chinese subtitle text. List exactly 6 timeline entries with red year markers and bilingual captions: 1958 born in Taiwan, 1983 Warrior Panther, 1989 Abi Sword, 1990 Heroes of the Eastern Zhou, 1991 Japan Cartoonists Association Award, 2017 legacy continues. Below that, add a small section titled “Ink in Detail” containing exactly 4 boxed brush studies labeled with short English captions: Dry brush texture, Ink wash gradient, Splatter energy, Bold contour line. On the right side, create a vertical section titled “Visual Method” with a black brushstroke header and smaller Chinese subtitle text. Include exactly 5 stacked boxed studies with image-and-caption layout: Brush as blade, Ink as atmosphere, Anatomy as fate, History as theatre, Speed lines become calligraphy. In the lower center, create a section titled “Major Works Constellation” with a dark brushstroke heading. Arrange exactly 5 circular work nodes around a central ink ring with Chinese calligraphy inside. Label the 5 nodes: Abi Sword, Heroes of the Eastern Zhou, Assassin Biographies, Magical Super Asia, Game character design legacy. Each circle contains a distinct monochrome or muted-color ink illustration, with subtle connecting marks like a constellation diagram. At the lower right, add a section titled “Studio Notes” containing exactly 6 visible objects: 4 hanging calligraphy brushes, 1 ink bowl, and 1 painter’s palette with blue and red pigment; beneath them place a sketchbook page with light pencil figure studies. Across the bottom, add a wide section titled “Why He Matters” with a black brushstroke header and smaller Chinese subtitle text, followed by a paragraph of serif body text in English describing his importance to comics, painting, calligraphy, cinema, and epic storytelling. Use a restrained palette of sepia, black ink, off-white paper, muted gray, with small accents of deep red and occasional blue. The whole image should feel like a refined cultural tribute poster, dense but balanced, highly detailed, painterly, and authentic to Chinese ink aesthetics.", "prompt_preview": "Create a vintage editorial poster on aged rice paper celebrating {argument name=\"artist name\" default=\"CHEN UEN\"}, designed like a museum infographic mixed with Chinese ink wash illustration and calli"}, {"id": "123", "title": "水象星座生肖人物海报", "title_en": "Water Signs Zodiac Character Poster", "category": "海报与插画案例", "img": "images/poster_case123/output.jpg", "prompt": "{\"type\":\"Chinese zodiac-style character infographic poster\",\"subject\":\"twelve zodiac character list, water signs edition\",\"language\":\"Traditional Chinese\",\"format\":\"vertical poster\",\"style\":{\"overall\":\"elegant anime-inspired character catalog with editorial infographic layout\",\"rendering\":\"soft polished digital illustration, pastel gradients, delicate sparkles, ornamental border design\",\"mood\":\"dreamy, celestial, refined, feminine, aquatic\"},\"canvas\":{\"aspect_ratio\":\"2:3\",\"background\":\"very light pearl white with pale blue-lavender tint, subtle texture, thin decorative frame with filigree corners and tiny stars\"},\"header\":{\"title\":\"{argument name=\\\"headline text\\\" default=\\\"十二星座角色清單|水象星座\\\"}\",\"subtitle\":\"感受・直覺・共鳴\",\"icons\":[\"small stars\",\"water droplet emblem in top right\",\"curled cloud-like line art in top left\"]},\"layout\":{\"sections_count\":3,\"sections\":[{\"title\":\"巨蟹座 Cancer\",\"position\":\"top panel\",\"theme_color\":\"powder blue\",\"zodiac_symbol\":\"Cancer glyph inside circle at left\",\"constellation\":\"Cancer constellation at upper right\",\"count\":6,\"labels\":[\"元素:水\",\"概念:情感守護者,把人放在心上\",\"性格:溫柔、敏感、顧家\",\"行動原則:先確認感受,再保護重要的人\",\"戀愛傾向:慢慢靠近,越熟越黏\",\"人際怪癖:嘴上說沒事,實際會記很久\"],\"character\":{\"identity\":\"same young woman model reimagined as zodiac character\",\"pose\":\"half-body portrait, facing forward, arms gently wrapped around a large seashell pillow\",\"hair\":\"long dark hair in a low ponytail\",\"outfit\":\"light blue celestial slip dress with lace trim and sheer cardigan embroidered with stars and moons\",\"accessories\":\"minimal jewelry\",\"background\":\"soft blue night sky with crescent moon, seashell, sparkling stars, stylized ocean wave and tiny water droplets\"},{\"title\":\"天蠍座 Scorpio\",\"position\":\"middle panel\",\"theme_color\":\"deep violet\",\"zodiac_symbol\":\"Scorpio glyph inside circle at left\",\"constellation\":\"Scorpio constellation at upper right\",\"count\":6,\"labels\":[\"元素:水\",\"概念:深海偵察者,情緒有深度\",\"性格:專注、神秘、意志強\",\"行動原則:先觀察,再一擊到位\",\"戀愛傾向:愛得深,重忠誠與獨占感\",\"人際怪癖:越在乎越不說,會偷偷試探\"],\"character\":{\"identity\":\"same young woman model reimagined as zodiac character\",\"pose\":\"half-body portrait, one hand near chin in a composed, enigmatic gesture\",\"hair\":\"long dark ponytail\",\"outfit\":\"black semi-sheer dress with gothic details and a dark plum off-shoulder shawl\",\"accessories\":\"dangling earrings and layered necklace\",\"background\":\"dark purple celestial sea scene with crescent moon, bubbles, stars, and curling misty water shapes\"},{\"title\":\"雙魚座 Pisces\",\"position\":\"bottom panel\",\"theme_color\":\"lavender\",\"zodiac_symbol\":\"Pisces glyph inside circle at left\",\"constellation\":\"Pisces constellation at upper right\",\"count\":6,\"labels\":[\"元素:水\",\"概念:夢境共感者,靠直覺導航\",\"性格:浪漫、柔軟、有想像力\",\"行動原則:先感受,再順流找答案\",\"戀愛傾向:容易心動,渴望靈魂陪伴\",\"人際怪癖:常把別人的情緒也一起感受\"],\"character\":{\"identity\":\"same young woman model reimagined as zodiac character\",\"pose\":\"half-body portrait, one hand lifted as if balancing floating bubbles, other hand resting lightly at chest\",\"hair\":\"long dark ponytail with a pale flower hair ornament\",\"outfit\":\"translucent lavender fantasy dress with soft draped sleeves and shimmering fabric\",\"accessories\":\"delicate earrings and necklace\",\"background\":\"pale lilac underwater-celestial blend with bubbles, sparkles, and flowing translucent wave forms\"}],\"dividers\":\"three horizontal framed panels with thin ornamental borders\"},\"footer\":{\"center_icon\":\"small blue seashell emblem\",\"decorations\":[\"tiny stars\",\"fine scrollwork\"]},\"constraints\":[\"all three zodiac entries must use the same woman as the base character with different styling, clothing, pose, and mood\",\"text should be clean, editorial, and readable\",\"each panel should clearly separate illustration area on the left and text block on the right\",\"maintain cohesive water-element theme across all 3 signs\",\"do not include the other nine zodiac signs in this image\"]}", "prompt_preview": "{\"type\":\"Chinese zodiac-style character infographic poster\",\"subject\":\"twelve zodiac character list, water signs edition\",\"language\":\"Traditional Chinese\",\"format\":\"vertical poster\",\"style\":{\"overall\""}, {"id": "124", "title": "土象星座生肖人物海报", "title_en": "Earth Signs Zodiac Character Poster", "category": "海报与插画案例", "img": "images/poster_case124/output.jpg", "prompt": "{\"type\":\"vintage zodiac character infographic poster\",\"theme\":\"earth signs only\",\"language\":\"Traditional Chinese\",\"style\":{\"overall\":\"elegant editorial infographic with soft anime-inspired live-action portrait compositing\",\"palette\":\"warm beige, cream, taupe, olive-gray, muted brown, antique gold\",\"mood\":\"stable, refined, calm, practical\",\"texture\":\"aged paper background with subtle speckles and thin ornamental borders\",\"rendering\":\"clean high-resolution print poster, soft lighting, delicate botanical and celestial line art\"},\"poster\":{\"orientation\":\"vertical\",\"aspect_ratio\":\"3:4\",\"title\":\"十二星座角色清單|土象星座\",\"subtitle\":\"穩定・務實・沉著\",\"decorations\":[\"ornamental corner filigree\",\"small gold sparkles\",\"botanical branches\",\"mountain illustrations\",\"thin panel dividers\"],\"sections_count\":3},\"layout\":{\"sections\":[{\"title\":\"金牛座 Taurus\",\"position\":\"top\",\"count\":1,\"labels\":[\"元素:土\",\"概念:感官收藏家,穩穩生活\",\"性格:務實、耐心、重享受\",\"行動原則:先確認值得,再長線投入\",\"戀愛傾向:慢熱但專情,重安全感\",\"人際怪癖:對喜歡的人會默默餵食\"]},{\"title\":\"處女座 Virgo\",\"position\":\"middle\",\"count\":1,\"labels\":[\"元素:土\",\"概念:秩序管理者,細節控場\",\"性格:理性、細膩、可靠\",\"行動原則:先整理,再精準出手\",\"戀愛傾向:用照顧和實際行動表達喜歡\",\"人際怪癖:嘴上挑剔,心裡其實很在乎\"]},{\"title\":\"摩羯座 Capricorn\",\"position\":\"bottom\",\"count\":1,\"labels\":[\"元素:土\",\"概念:登峰實幹家,目標導向\",\"性格:穩重、自律、有責任感\",\"行動原則:先規劃,再穩定推進\",\"戀愛傾向:慢熟務實,願意長期承諾\",\"人際怪癖:關心常包裝成提醒與安排\"]}],\"centerpiece\":\"three stacked horizontal character cards, each with a portrait on the left and text profile on the right\"},\"character\":{\"identity\":\"the same young East Asian woman appears in all 3 sections\",\"age\":\"early 20s\",\"hair\":\"long dark brown to black hair in a low ponytail with side part\",\"face\":\"soft feminine features, natural makeup, calm expression\",\"customization\":\"keep the same base character across all zodiac entries, differentiated by wardrobe, pose, props, and themed background motifs\"},\"cards\":[{\"sign\":\"Taurus\",\"symbol\":\"♉\",\"portrait\":{\"pose\":\"waist-up, slightly turned, holding a ceramic mug with both hands\",\"outfit\":\"cream knit sleeveless top under a soft sage-gray cardigan with delicate floral embroidery\",\"expression\":\"gentle, relaxed, nurturing\",\"props_count\":1,\"props\":[\"mug\"]},\"background\":\"large pale circular halo, floral branch illustration, soft botanical motifs, small mountain drawing in upper right\",\"visual_concept\":\"comfort, sensuality, domestic calm, slow living\"},{\"sign\":\"Virgo\",\"symbol\":\"♍\",\"portrait\":{\"pose\":\"waist-up, one hand holding a pen near the chin, the other arm holding an open notebook or planner\",\"outfit\":\"light cream blouse with a bow tie collar under a pale sage vest with gold buttons\",\"expression\":\"thoughtful, analytical, composed\",\"props_count\":2,\"props\":[\"pen\",\"notebook\"]},\"background\":\"fine geometric diagram lines, botanical sprigs, diamond emblem with leaf motif\",\"visual_concept\":\"order, precision, intelligence, organization\"},{\"sign\":\"Capricorn\",\"symbol\":\"♑\",\"portrait\":{\"pose\":\"waist-up, arms crossed, confident upright stance\",\"outfit\":\"charcoal tailored blazer over a dark vest and crisp white shirt, small round lapel pin\",\"expression\":\"serious, disciplined, self-assured\",\"props_count\":0,\"props\":[]},\"background\":\"dramatic layered mountain landscape in sepia tones with subtle star-like sparkles\",\"visual_concept\":\"ambition, endurance, authority, climbing toward goals\"}],\"typography\":{\"title_font\":\"classic high-contrast serif Chinese type\",\"sign_name_font\":\"large bold Chinese serif with elegant italic Latin zodiac name\",\"body_font\":\"clean readable Chinese print font\",\"icon_style\":\"filled circular brown icons next to each bullet line\"},\"composition\":{\"margin\":\"generous cream margins\",\"panel_style\":\"rounded rectangular panels with thin gold-brown borders\",\"spacing\":\"even vertical stacking with narrow separators\",\"text_alignment\":\"left-aligned profile bullets on the right side of each card\"}", "prompt_preview": "{\"type\":\"vintage zodiac character infographic poster\",\"theme\":\"earth signs only\",\"language\":\"Traditional Chinese\",\"style\":{\"overall\":\"elegant editorial infographic with soft anime-inspired live-action"}, {"id": "125", "title": "火星座生肖人物海报", "title_en": "Fire Sign Zodiac Character Poster", "category": "海报与插画案例", "img": "images/poster_case125/output.jpg", "prompt": "A polished vertical infographic poster in elegant East Asian editorial style, themed around the fire signs of the zodiac using one consistent female character reimagined in three different costumes. Cream parchment background with thin ornamental borders, small corner flourishes, tiny sparkles, and warm red-orange-gold accents throughout. Large Chinese headline at the top reading {argument name=\"headline text\" default=\"十二星座角色清單|火象星座\"}, with a smaller subheading beneath reading {argument name=\"subheading text\" default=\"熱情・行動・勇氣\"}, and a decorative flame icon at the top right. The layout contains exactly 3 stacked profile panels with rounded rectangular borders and generous margins: Aries on top, Leo in the middle, Sagittarius on the bottom. Each panel is split visually with the character on the left and a text/spec area on the right, plus a zodiac symbol badge on the far left and a small constellation diagram on the far right.\n\nUse the same young East Asian woman in all 3 panels, slim build, long dark hair in a high ponytail, shown from about thigh-up to waist-up, facing slightly toward camera, styled as a fashion-model zodiac character sheet. Keep facial features neutral and refined, clean beauty lighting, soft airbrushed illustration-photo composite look.\n\nPanel 1: Aries. Chinese title and English subtitle: \"牡羊座 Aries\". Dominant color scheme: vivid red with warm coral highlights. Zodiac symbol badge shows Aries glyph. Constellation on the right. Behind the character, faint circular mystical line art and flame motifs. Outfit: sporty warrior idol styling with a white crop top, red open short-sleeve jacket with gold trim, red belt, and red wrist wraps or fingerless arm accessories. Pose: confident, energetic, one fist raised near the shoulder and the other hand on her hip. Include exactly 6 info lines with small circular icons before each line, all in Chinese: 1) \"元素:火\" 2) \"概念:點火者,直覺先行\" 3) \"性格:熱情、直接、好勝\" 4) \"行動原則:先衝再修正\" 5) \"戀愛傾向:心動就追,喜歡熱烈互動\" 6) \"人際怪癖:嫌節奏太慢時會自己接手\".\n\nPanel 2: Leo. Chinese title and English subtitle: \"獅子座 Leo\". Dominant color scheme: gold, champagne, and soft amber. Zodiac symbol badge shows Leo glyph. Constellation on the right. Background includes radiant sunburst styling and a faint majestic lion illustration silhouette behind the character. Outfit: glamorous regal gown in pale gold with ornate embroidery, jeweled bodice details, flowing translucent cape sleeves, elegant necklace, and a small crown or tiara. Pose: poised and queenly, one hand lightly touching the chest or collarbone, shoulders open, projecting confidence and star power. Include exactly 6 info lines with small circular icons before each line, all in Chinese: 1) \"元素:火\" 2) \"概念:舞台中心,自帶光芒\" 3) \"性格:大方、自信、要面子\" 4) \"行動原則:先定氣場,再帶隊前進\" 5) \"戀愛傾向:喜歡被偏愛,也樂於寵人\" 6) \"人際怪癖:明明在意,卻要裝沒事\".\n\nPanel 3: Sagittarius. Chinese title and English subtitle: \"射手座 Sagittarius\". Dominant color scheme: rust red, burnt orange, brown leather, and warm ivory. Zodiac symbol badge shows Sagittarius glyph. Constellation on the right. Background features faint compass-circle graphics and flame accents. Outfit: adventurous archer styling with an ivory blouse, red scarf, brown leather harness straps, utility belt, and arm bracers. Pose: dynamic action shot drawing a bow, arrow aimed to the right, with a small glowing spark at the bow grip or arrow rest. Include exactly 6 info lines with small circular icons before each line, all in Chinese: 1) \"元素:火\" 2) \"概念:自由旅人,邊走邊發現\" 3) \"性格:樂觀、坦率、好奇\" 4) \"行動原則:先出發,路上再找答案\" 5) \"戀愛傾向:喜歡輕鬆真誠,不愛被綁住\" 6) \"人際怪癖:聊到一半常被新鮮事帶走\".\n\nOverall design should feel premium, feminine, mystical, and collectible, like a social-media-ready zodiac character list poster. Use elegant serif-style Chinese typography for the main sign names and italic calligraphic English for Aries, Leo, and Sagittarius. Keep all text crisp, aligned, and readable. Add one small decorative fire emblem centered near the bottom border. Aspect ratio 3:4 portrait.", "prompt_preview": "A polished vertical infographic poster in elegant East Asian editorial style, themed around the fire signs of the zodiac using one consistent female character reimagined in three different costumes. C"}, {"id": "125", "title": "品牌拼贴社交模板", "title_en": "Brand Collage Social Template", "category": "UI与社交媒体案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/ui_case125/output.jpg", "prompt": "[BRAND NAME = CHANGE TO YOUR BRAND].\nAct as a Social Media Art Director and Digital Collage Artist specializing in bold, youth-oriented brand content for Instagram and digital campaigns. PHASE 1: CONCEPTUAL FRAMEWORK Create a dynamic digital collage that merges fashion photography with graphic design chaos. This is controlled rebellion – a composition that feels spontaneous and energetic while maintaining brand coherence. The aesthetic is anti-polished: torn edges, layered textures, hand-drawn elements, and bold color blocking that screams confidence and movement. PHASE 2: MODEL & PHOTOGRAPHY - Subject: One model (diverse casting, age 18-30) in a dynamic, confident pose - Pose Energy: 80% attitude, 20% natural – sitting, jumping, mid-motion, or power stance (avoid static standing) - Outfit: Street style/athleisure that aligns with [BRAND NAME] aesthetic – casual but styled - Hero Product: Feature 1 signature [BRAND NAME] product prominently (sneakers, bag, apparel) – this is the visual anchor - Photography Style: Editorial fashion cutout – model extracted from background with clean edges - Camera Angle: Slight low angle to empower subject (hero perspective) - Crop: Full body or 3/4 body showing hero product clearly - Background Removal: Model cut out cleanly for layering over collage elements PHASE 3: COLOR BLOCKING FOUNDATION - Primary Color Blob: Large organic shape (40-60% of composition) in bold, saturated brand color behind/around model - Shape Style: Irregular, hand-painted aesthetic – think Photoshop brush strokes or torn paper texture (NOT perfect geometric shapes) - Color Selection (Autonomous): Choose 1 hero color from [BRAND NAME] palette: - Texture: Visible brush strokes, grain, or subtle noise (15-25% opacity) – avoid flat digital fills - Placement: Blob positioned to frame model without obscuring key product details PHASE 4: GRAPHIC ELEMENTS LAYER Add 3-5 abstract graphic elements scattered across composition: - Element Types: - Color Palette: Use 2-3 accent colors total (main blob color + 1-2 contrasting tones from brand palette) - Placement: Asymmetric scatter – top-left and bottom-right zones primarily (avoid center crowding) - Scale: Mix small (5% of canvas) and medium (15% of canvas) elements – nothing overpowering - Aesthetic: Analog/handmade feel – imperfect circles, rough edges, visible texture PHASE 5: TYPOGRAPHY INTEGRATION - Brand Logo: Clean [BRAND NAME] logo placed in upper-left or upper-right quadrant (10-15% of width) - Slogan/Tagline: If [BRAND NAME] has an iconic slogan, integrate it using: - Supporting Copy: Optional 1-line descriptor (e.g., \"A MOMENT OF YOUR STYLE\") in smaller uppercase sans-serif - Type Treatment: Mix of aligned and slightly rotated text (2-5° angles) for dynamic energy - Hierarchy: Logo largest → Slogan medium → Copy smallest PHASE 6: TEXTURE & BACKGROUND - Base Layer: Off-white or light gray textured background (NOT pure white) - Texture Options (Autonomous selection): - Color: RGB 245-250 (near-white with warmth) – maintains brightness while adding depth - Treatment: Texture should be felt, not seen – enhances tactility without competing with foreground PHASE 7: COMPOSITION RULES - Layout: Asymmetric balance – model off-center, graphic elements counter-balance - Breathing Room: 15-20% negative space (textured background visible) to prevent claustrophobia - Layering Order: Background texture → Color blob → Graphic elements → Model (cutout) → Typography top layer - Focal Point: Model + hero product = primary focus (60% visual weight), graphics support (40%) - Movement: Diagonal lines and angled elements create directional flow (top-left to bottom-right or vice versa) PHASE 8: BRAND INTELLIGENCE (AUTONOMOUS) Autonomously adapt composition based on [BRAND NAME] personality: - Streetwear/Sportswear (Nike, Adidas, Supreme): - Luxury Streetwear (Balenciaga, Off-White, Gucci): - Beauty/Lifestyle (Glossier, Fenty, Skims): - Tech/Modern (Apple, Tesla, Beats): PHASE 9: SOCIAL MEDIA FOOTER (OPTIONAL) - Bottom Strip: Clean white or light gray bar at bottom 8-10% of frame - Content: Social media handles (Instagram, Facebook, Twitter) in small sans-serif - Layout: Three-column grid with platform icons or text handles - Aesthetic: Minimal and professional – contrast with chaotic collage above TECHNICAL SPECS: - Aspect Ratio: 4:5 (Instagram feed) or 1:1 (square social post) - Resolution: 2400x3000px minimum (high-quality for zoom and detail) - Color Mode: sRGB, vibrant saturation (Instagram-optimized) - File Aesthetic: Digital collage that mimics analog craft (Photoshop + hand-drawn hybrid) - Model Photography: 85mm lens, f/2.8, shallow depth of field on original shoot (before cutout) - Style Reference: Nike social campaigns, Spotify wrapped graphics, Gen Z Instagram aesthetics, Hypebeast x streetwear collabs - Mood: Confident, energetic, youthful, authentic chaos, anti-corporate polish", "prompt_preview": "[BRAND NAME = CHANGE TO YOUR BRAND].\nAct as a Social Media Art Director and Digital Collage Artist specializing in bold, youth-oriented brand content for Instagram and digital campaigns. PHASE 1: CONC"}, {"id": "126", "title": "Air Sign十二生肖人物海报", "title_en": "Air Sign Zodiac Character Poster", "category": "海报与插画案例", "img": "images/poster_case126/output.jpg", "prompt": "{\"type\":\"Chinese zodiac-themed character infographic poster\",\"format\":\"vertical poster\",\"aspect_ratio\":\"3:4\",\"style\":\"clean pastel editorial infographic with anime-inspired fashion photography, soft magical accents, elegant horoscope design, premium magazine layout\",\"background\":{\"color\":\"warm ivory\",\"border\":\"thin decorative gold frame with small ornamental corners and tiny sparkles\",\"top_right_motif\":\"large pale air-element swirl ornament\"},\"title_block\":{\"headline\":\"十二星座角色清單|風象星座\",\"subheadline\":\"靈活・交流・思辨\",\"alignment\":\"top center\",\"headline_color\":\"deep desaturated blue\",\"subheadline_color\":\"muted gold\"},\"subject\":{\"count\":3,\"description\":\"the same young East Asian woman used as the base character appears in 3 separate horoscope panels, each shown from about thigh-up to waist-up with long dark hair and soft feminine styling, photographed frontally and integrated into illustrated pastel zodiac backdrops\"},\"layout\":{\"sections\":[{\"title\":\"雙子座 Gemini\",\"position\":\"top panel\",\"count\":1,\"theme_color\":\"butter yellow and cream\",\"zodiac_symbol\":\"Gemini glyph inside a circle on the left\",\"constellation\":\"small Gemini constellation in the upper right\",\"character_pose\":\"playful double peace signs raised beside her face\",\"outfit\":\"pale yellow cardigan over a white ribbed crop top, light bottoms, yellow belt, delicate necklace\",\"background_motifs_count\":4,\"background_motifs\":[\"speech bubble icon\",\"sparkles\",\"curved flowing lines\",\"soft dots\"],\"text_items_count\":6,\"text_items\":[\"元素:風\",\"概念:資訊玩家,靈感跳接\",\"性格:機靈、善聊、多變\",\"行動原則:先交流,再快速轉向\",\"戀愛傾向:喜歡有趣互動與腦力火花\",\"人際怪癖:話題切換速度快到像開分頁\"]},{\"title\":\"天秤座 Libra\",\"position\":\"middle panel\",\"count\":1,\"theme_color\":\"blush pink and pastel lavender\",\"zodiac_symbol\":\"Libra glyph inside a circle on the left\",\"constellation\":\"small Libra constellation in the upper right\",\"character_pose\":\"one hand raised open-palmed as if presenting balance, the other hand near her chin in an elegant thoughtful pose\",\"outfit\":\"pink blazer draped over shoulders, pastel pink-and-blue wrapped dress, jeweled belt, earrings, necklace, bracelet\",\"background_motifs_count\":4,\"background_motifs\":[\"scales illustration\",\"flowing ribbon-like swirls\",\"sparkles\",\"soft gradient haze\"],\"text_items_count\":6,\"text_items\":[\"元素:風\",\"概念:關係設計師,追求平衡\",\"性格:優雅、圓融、審美強\",\"行動原則:先衡量,再找最順解法\",\"戀愛傾向:重氛圍與互相體面\",\"人際怪癖:選太久,但又很會照顧場面\"]},{\"title\":\"水瓶座 Aquarius\",\"position\":\"bottom panel\",\"count\":1,\"theme_color\":\"lavender, icy blue, and silver\",\"zodiac_symbol\":\"Aquarius glyph inside a circle on the left\",\"constellation\":\"small Aquarius constellation in the upper right\",\"character_pose\":\"holding and tilting a futuristic transparent vessel as glowing water-like energy pours out in looping streams\",\"outfit\":\"metallic silver crop top and skirt set with translucent iridescent jacket, futuristic straps, reflective accessories\",\"background_motifs_count\":4,\"background_motifs\":[\"glowing circular energy rings\",\"constellation lines\",\"sparkles\",\"light trails\"],\"text_items_count\":6,\"text_items\":[\"元素:風\",\"概念:未來觀察員,規則改革者\",\"性格:獨立、理想派、腦洞大\",\"行動原則:先思考原理,再另闢路線\",\"戀愛傾向:重精神共鳴,也需要個人空間\",\"人際怪癖:忽冷忽熱,其實是在充電\"]}],\"panel_count\":3},\"typography\":{\"languages\":[\"Traditional Chinese\",\"English zodiac names\"],\"headline_font\":\"elegant high-contrast serif\",\"body_font\":\"clean legible Chinese serif or sans-serif hybrid\",\"zodiac_english\":\"italic calligraphic serif\"},\"visual_rules\":{\"each_panel_has\":8,\"panel_elements\":[\"left zodiac glyph badge\",\"center-left character\",\"right text block\",\"English zodiac name\",\"small constellation\",\"pastel illustrated background motifs\",\"thin panel border\",\"6 bullet-style info lines with icons\"],\"spacing\":\"generous margins and symmetrical alignment\",\"render_quality\":\"high resolution, crisp print-ready infographic\"}", "prompt_preview": "{\"type\":\"Chinese zodiac-themed character infographic poster\",\"format\":\"vertical poster\",\"aspect_ratio\":\"3:4\",\"style\":\"clean pastel editorial infographic with anime-inspired fashion photography, soft m"}, {"id": "126", "title": "时装明细表", "title_en": "Outfit Breakdown Chart", "category": "UI与社交媒体案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/ui_case126/output.jpg", "prompt": "Create a clean vertical fashion infographic from the uploaded portrait. Preserve the same face identity, hairstyle, body shape, and overall outfit style. Place the full-body character in the center in a relaxed T-pose, facing forward. Surround the character with realistic photo-style outfit breakdown elements, connected by thin arrows.\n\nInclude separate cutout sections for: head details, cardigan, sailor top, inner blouse, plaid skirt, bag, socks, loafers, color palette, styling notes, and fabric texture. Add 3–4 head close-ups from different angles at the top. Use short English handwritten-style labels and concise bullet points.\n\nVisual style: soft pastel cream and blush-pink background, clean fashion board layout, elegant magazine-style composition, sweet preppy aesthetic, realistic fabric textures, delicate borders, small bow and heart doodles, airy and polished design. Keep the text short, readable, and fully in English. Original vertical aspect ratio.\n\nNegative Prompt:\n\nChinese text, long text, messy layout, old parchment background, yellow aged paper, blurry details, distorted face, changed identity, extra limbs, bad hands, duplicated body, unrealistic fabric, cartoon style, anime style, 3D render, watermark, logo, unreadable typography, overcrowded design, harsh colors, low resolution.", "prompt_preview": "Create a clean vertical fashion infographic from the uploaded portrait. Preserve the same face identity, hairstyle, body shape, and overall outfit style. Place the full-body character in the center in"}, {"id": "127", "title": "藏族礼帽民族志版", "title_en": "Ethnographic Plate for Tibetan Ceremonial Hat", "category": "海报与插画案例", "img": "images/poster_case127/output.jpg", "prompt": "Using REFERENCE_0 and REFERENCE_1, create a clean ethnographic archive plate focused on the ceremonial hat. Use REFERENCE_0 as the historical Tibetan context and silhouette reference, and REFERENCE_1 as the color, material, and ornament reference for the hat. Isolate and reconstruct the hat as a museum-style object study, removing the seated body as the main subject. Present the hat on an off-white document page as a scholarly catalog sheet in Chinese with small romanization. Add 8 numbered callouts around the object with fine dashed leader lines, each pointing to a specific structural detail. The centerpiece should be one large three-quarter underside view of the hat. Also include exactly 4 supplementary views/details: 1 side-profile wearing sketch with a faint line-drawn bust, 1 underside interior view, 1 top-down view, and 2 square close-up material swatches. Add exactly 4 thread-color samples near the lower right: blue, red, white, and yellow. At the top center, add the large title {argument name=\"headline text\" default=\"唐徐帽\"} with the romanization {argument name=\"romanization\" default=\"(thang zhwa)\"} beneath it, plus a smaller subtitle describing it as a summer ceremonial hat of high-ranking Tibetan monks. In the upper left, add a boxed metadata panel with multiple short Chinese fields, and in the upper right add a plate number reading {argument name=\"plate number\" default=\"图版 No. 27\"}. At the bottom, add one bordered note paragraph in Chinese. Overall style: meticulous archival infographic, anthropological catalog illustration, historically informed, precise woven texture, ivory-gold base with blue and red ornament, elegant print layout, thin rules and decorative divider marks, high-detail object rendering on a plain paper background.", "prompt_preview": "Using REFERENCE_0 and REFERENCE_1, create a clean ethnographic archive plate focused on the ceremonial hat. Use REFERENCE_0 as the historical Tibetan context and silhouette reference, and REFERENCE_1 "}, {"id": "127", "title": "配方信息图表布局", "title_en": "Recipe Infographic Layout", "category": "UI与社交媒体案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/ui_case127/output.jpg", "prompt": "Create step-by-step recipe infographic for creamy garlic mushroom pasta, top-down view, minimal style on white background, ingredient photos labeled: \"200g spaghetti\", \"150g mushrooms\", \"3 garlic cloves\", \"200ml cream\", \"1 tbsp olive oil\", \"parmesan\", \"parsley\", dotted lines showing process steps with icons (boiling pot, sauté pan, mixing), final plated pasta shot at the bottom", "prompt_preview": "Create step-by-step recipe infographic for creamy garlic mushroom pasta, top-down view, minimal style on white background, ingredient photos labeled: \"200g spaghetti\", \"150g mushrooms\", \"3 garlic clov"}, {"id": "128", "title": "复古PRS吉他谱系海报", "title_en": "Vintage PRS Guitar Lineage Poster", "category": "海报与插画案例", "img": "images/poster_case128/output.jpg", "prompt": "{\"type\":\"luxury vintage guitar comparison infographic poster\",\"subject\":\"a highly detailed, vertically oriented PRS electric guitar lineup chart designed like a premium museum poster or collector's reference board\",\"style\":\"ornate, dark, glossy, high-contrast, gold-foil typography, elegant wood-and-metal textures, symmetrical grid layout, premium catalog aesthetic, subtle vintage patina, ultra sharp graphic design\",\"branding\":{\"main headline\":\"THE LEGENDARY LINEAGE OF {argument name=\\\"brand name\\\" default=\\\"PRS GUITARS\\\"}\",\"subheadline\":\"EVERY ICON. EVERY LINE. ONE HERITAGE.\",\"signature\":\"Paul Reed Smith\",\"left seal\":\"PAUL REED SMITH GUITARS\",\"right seal\":\"MADE IN MARYLAND U.S.A.\"},\"palette\":{\"background\":\"black and deep charcoal with dark figured wood accents\",\"primary\":\"antique gold\",\"secondary\":\"cream\",\"accent colors\":[\"deep green\",\"teal\",\"royal blue\",\"purple\",\"gold\",\"burgundy\"]},\"layout\":{\"format\":\"single-page vertical poster\",\"header\":{\"position\":\"top\",\"elements\":[\"large central title\",\"small tagline below\",\"script signature\",\"2 circular emblems in upper left and upper right\",\"3 horizontal legend boxes under the title\"]},\"sections\":[{\"title\":\"PRESTIGE TIER KEY\",\"position\":\"upper left below title\",\"count\":6,\"labels\":[\"SE\",\"S2\",\"CE\",\"CORE\",\"WOOD LIBRARY\",\"PRIVATE STOCK\"]},{\"title\":\"PICKUP ICON KEY\",\"position\":\"upper center-right below title\",\"count\":7,\"labels\":[\"HH\",\"HSH\",\"P-90\",\"SOAP\",\"58/15\",\"TCI\",\"Bass\"]},{\"title\":\"TONAL CHARACTER KEY\",\"position\":\"upper right below title\",\"count\":7,\"labels\":[\"Warm / Vintage\",\"Balanced / All-around\",\"Bright / Articulate\",\"High Gain / Modern\",\"Blues / Classic Rock\",\"Metal / Progressive\",\"Funk / Soul / Clean\"]},{\"title\":\"CORE\",\"position\":\"first main row left label\",\"count\":7,\"labels\":[\"Custom 24\",\"McCarty 594\",\"DGT (David Grissom)\",\"Custom 22\",\"Hollowbody II\",\"SC 594\",\"row category panel\"]},{\"title\":\"S2\",\"position\":\"second main row left label\",\"count\":6,\"labels\":[\"S2 Custom 24\",\"S2 McCarty 594\",\"S2 Standard 24\",\"S2 Vela\",\"S2 Singlecut\",\"S2 Mira\"]},{\"title\":\"SE\",\"position\":\"third main row left label\",\"count\":6,\"labels\":[\"SE Custom 24\",\"SE Standard 24\",\"SE Paul's Guitar\",\"SE Santana\",\"SE Hollowbody II\",\"SE Mark Holcomb\"]},{\"title\":\"CE\",\"position\":\"fourth main row left label\",\"count\":6,\"labels\":[\"CE 24\",\"CE 22\",\"CE 24 Semi-Hollow\",\"CE 24 Floyd\",\"CE 24 Satin\",\"CE Bass\"]},{\"title\":\"BOLT-ON SERIES\",\"position\":\"fifth main row left label\",\"count\":6,\"labels\":[\"NF 53\",\"Silver Sky\",\"NF 3\",\"NF 53 Satin\",\"DGT Bolt-On\",\"Studio\"]},{\"title\":\"PRIVATE STOCK\",\"position\":\"sixth main row left label\",\"count\":6,\"labels\":[\"Dragon I\",\"Frostbite\",\"#4004\",\"The Tree of Life\",\"#8731\",\"PS DGT\"]}],\"footer\":{\"position\":\"bottom\",\"elements\":[\"small badge at lower left\",\"centered company line\",\"right-side script signature\"]},\"content grid\":{\"total guitar models shown\":37,\"card design\":\"each product card contains a guitar render, model name, year, small pickup icons, a short descriptive blurb, and origin/wood specs at the bottom\",\"row side panels\":6},\"visual details\":{\"guitars\":\"front-facing electric guitars with varied body shapes and highly polished figured maple tops, metallic and transparent finishes, some solid colors, some natural wood\",\"typography\":\"all caps serif headlines, small serif body text, script signature accents\",\"borders\":\"thin decorative gold rules around every panel and the full poster\",\"lighting\":\"studio-lit instruments against dark panel backgrounds\",\"render quality\":\"clean infographic precision with realistic product renders\"},\"camera\":\"straight-on flat poster view, no perspective distortion, centered composition\",\"quality\":\"ultra detailed, print-ready, high-resolution editorial infographic, luxury brand poster\"}", "prompt_preview": "{\"type\":\"luxury vintage guitar comparison infographic poster\",\"subject\":\"a highly detailed, vertically oriented PRS electric guitar lineup chart designed like a premium museum poster or collector's re"}, {"id": "128", "title": "个人色彩分析图形板", "title_en": "Personal Color Analysis Graphic Board", "category": "UI与社交媒体案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/ui_case128/output.jpg", "prompt": "Create a personal color analysis graphic using this portrait. Point out which season colour suits the subject best. Show side-by-side clothing color comparisons to highlight which colors suit the subject best. List out what texture/accessories/hairstyle suit the subject best. Make it visual-first, with short labels only and no paragraphs.", "prompt_preview": "Create a personal color analysis graphic using this portrait. Point out which season colour suits the subject best. Show side-by-side clothing color comparisons to highlight which colors suit the subj"}, {"id": "129", "title": "阿里山一日游海报", "title_en": "Alishan One-Day Travel Poster", "category": "海报与插画案例", "img": "images/poster_case129/output.jpg", "prompt": "Create a vintage illustrated travel poster in traditional Chinese for {argument name=\"destination name\" default=\"阿里山國家風景區\"}, designed as a one-day itinerary infographic with a split vertical layout. The left panel is a parchment-textured itinerary card in warm beige with ornate gold Art Nouveau borders and dark brown typography, and the right panel is a dramatic painted fantasy-realism map scene of a mountain journey at sunrise and sunset tones. At the top of the left panel, large headline text reads {argument name=\"headline text\" default=\"阿里山國家風景區一日遊\"}. Beneath it, include a short centered tagline in traditional Chinese: 「一座高山,五個經典景點。難忘的奇幻旅程。」 with a small decorative mountain divider. The left panel must contain exactly 5 numbered itinerary stops stacked vertically, each with a circular black-and-gold number badge, a small vignette illustration, a bold location name, a time in parentheses, and a short Chinese description. The 5 stops are: 1. 「阿里山車站」 at 「(8:00 AM)」 with a wooden mountain railway station illustration and description 「開啟探索神木與森林的旅程。」 2. 「阿里山森林鐵路」 at 「(9:30 AM)」 with a red-and-black steam train illustration and description 「穿越森林,體驗百年林鐵風情。」 3. 「神木區棧道」 at 「(11:30 AM)」 with giant cedar trees and elevated wooden boardwalk illustration and description 「漫步千年巨木下,感受森林靈氣。」 4. 「姊妹潭」 at 「(1:30 PM)」 with a tranquil forest lake and pavilion illustration and description 「欣賞靜謐湖光,聆聽自然樂章。」 5. 「小笠原山展望台」 at 「(4:00 PM)」 with a wooden observation deck above clouds at sunset illustration and description 「觀賞壯闊山景與雲海,欣賞日落。」 The right panel should depict a continuous glowing golden path winding through exactly 5 numbered map markers that match the left panel labels in order, with black-and-gold marker plaques reading: 1 「阿里山車站」, 2 「阿里山森林鐵路」, 3 「神木區棧道」, 4 「姊妹潭」, 5 「小笠原山展望台」. Show stop 1 as a rustic alpine wooden station perched on a cliff among pine forests; stop 2 as a small steam locomotive traveling on a curved mountain railway with smoke drifting upward; stop 3 as towering ancient red cypress trees with a spiral and zigzag wooden walkway around the trunks; stop 4 as an emerald lake surrounded by dense forest with a small pavilion and arched bridge; stop 5 as a lookout deck on a peak above a sea of clouds, facing a glowing sunset. The environment should feature layered mountain ranges, mist-filled valleys, evergreen forests, golden-hour light, luminous cloud seas, and a romantic painterly atmosphere with rich detail. At the bottom right, add a decorative compass rose labeled N, E, S, W, plus a dark green and gold information box with exactly 2 stats in traditional Chinese: 「總距離 ~9公里 / 5.6英里」 and 「預計時間 全天 - 14,500步」. Overall style: premium touris omposition, subject standing still, body straight, arms relaxed but structured, head slightly turned, gaze outward into space, minimal reflections, soft even lighting, shallow depth f/1.2 isolating subject despite distance, cinematic silence, full beige suit, white t-shirt, white sleek sneakers, Peter Lindbergh influence\nFrame 4 (Dynamic Close-Up Tilt)\nClose-up with strong diagonal tilt, subject leaning into frame, shoulders sharply angled, one arm crossing body, head tilted sideways, gaze slightly off camera, tight crop cutting part of body, soft lighting wrapping contours, shallow depth f/1.2 isolating face plane, intense proximity and tension, full beige suit, white t-shirt visible, Peter Lindbergh influence\nFrame 5 (Motion Step Forward)\nMid shot, subject stepping forward dynamically, one leg extended, weight shifting, arms slightly swinging with controlled motion, shoulders rotated, head facing forward, gaze ahead, slight motion blur on edges, futuristic curved walls passing behind, soft studio lighting, shallow depth f/1.2, transitional energy frame, full beige suit, white t-shirt, white sleek sneakers, Peter Lindbergh influence\nFrame 6 (Final Grounded Frame)\nFull body frontal shot, subject standing firmly, legs slightly apart, arms held with controlled tension, shoulders squared, head facing forward, gaze into camera, symmetrical composition slightly offset, minimal futuristic background, soft lighting emphasizing structure, shallow depth f/1.2, strong final impact frame, subtle athletic readiness, full beige suit, white t-shirt, white sleek sneakers, Peter Lindbergh influence\n\nNegative Commands (apply to all frames):\nno text, no watermark, no low quality, no cartoonish style\n\nAspect Ratio: 3:4", "prompt_preview": "Frame 1 (Top-Down Establishing)\nExtreme top-down shot in futuristic white curved hall, subject centered but compressed against smooth reflective floor, body aligned straight but slightly angled, arms "}, {"id": "130", "title": "舞蹈动作参考表", 8–12px. Every card uses only Step 1 colors, type, and copy. CARDS — in order: 1. LOGO LOCKUP (wide, top-left) — brand color BG, official logo/wordmark, oversized cropped logo mark as structural graphic. No photo. 2. EDITORIAL PHOTO (mid-left) — dark photo from brand world, manifesto headline in brand type over image, wordmark small at bottom. 3. CAMPAIGN BANNER (wide, bottom-left) — flat accent color BG, real event/campaign headline bold-condensed left side, action photo cropped into right side. 4. STORY FORMAT (tall, center full-height) — full-bleed photo, oversized display type partially cropped by edges, date/location detail top. Mobile story proportions. 5. TYPOGRAPHIC POSTER (upper center-right) — vivid accent BG, campaign headline with one letter replaced by a real brand-world object, edition tag below. 6. COLOR PALETTE (center-right) — vertical equal stripes, one per brand color, color name labeled bottom each stripe. No photo. Zero decoration. 7. PRODUCT MOCKUP (upper right) — studio photo of real brand product or branded device/interface, neutral BG, accurate logo/color/type placement. 8. TYPE PATTERN (lower right) — brand name/slogan repeated as all-over pattern at varied sizes/angles, editorial photo overlaid and color-treated to integrate. RULE: A person who knows this brand must immediately confirm every card belongs to it. Output quality: Behance brand identity case study / agency pitch deck.", "prompt_preview": "Full-blown brand identity system [BRAND NAME] — Brand Identity Moodboard STEP 1 — DECODE THE BRAND Extract from real brand guidelines only: - Colors: full official palette (primary, secondary, neutral"}, {"id": "145", "title": "霓虹耐克Lumina广告海报", "title_en": "Neon Nike Lumina Ad Poster", "category": "广告创意案例", "img": "images/poster_case145/output.jpg", "prompt": "一张高能量垂直耐克时尚活动海报，展示了一位单身运动的年轻女性在未来主义霓虹灯工作室背景下跳跃。她被捕捉到一个动态的空中姿势，一只膝盖向上弯曲，另一只腿向后折叠，一只手臂向外伸展，另一只手臂在胸前弯曲，传达运动和力量。她的脸被以脸部为中心的干净矩形模糊块遮挡。她穿着一件短款虹彩白色连帽风衣，配有黑色拉链和耐克小圆木", "prompt_preview": "一张高能量垂直耐克时尚活动海报，展示了一位单身运动的年轻女性在未来主义霓虹灯工作室背景下跳跃。她被捕捉到一个动态的空中姿势，一只膝盖向上弯曲，另一只腿向后折叠，一只手臂向外伸展，另一只手臂在胸前弯曲，传达运动和力量。她的脸被以脸部为中心的干净矩形模糊块遮挡。她穿着一件短款虹彩白色连帽风衣，配有黑色拉链和耐克小圆木"}, {"id": "145", "title": "景观建筑委员会", "title_en": "Landscape Architecture Board", "category": "UI与社交媒体案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/ui_case145/output.jpg", "prompt": "Generate a 3:4 vertical, competition-grade landscape architecture presentation board. The board blends photorealistic aerial rendering with refined architectural diagram language, in the style of a high-end international landscape competition submission. Mood: calm, atmospheric, regenerative, ecological, scientific yet poetic. Layout (three stacked zones): 1. Top zone: analytical ecological diagrams and mapping overlays. 2. Middle zone: a large aerial landscape rendering as the primary focal image. 3. Bottom zone: a continuous sectional cut through the ecological landscape system. Top analytical zone: • Simplified ecological maps with soft, transparent color overlays. • Ultra-thin linework in white and pale gray. • Diagrams of water flow, circulation systems, ecological networks, habitat zones, and landscape connectivity. • Dashed lines for movement and flow. • Minimal annotations and soft ecological icons. • Floating overlay effect sitting above the rendering. • Very light pastel tones, high transparency, clean spacing, no dense clutter. Middle aerial rendering: • Bird's-eye view of an ecological restoration landscape. • Wetlands, ponds, flowing water systems, vegetation patches, bioswales, regenerative terrain. • Soft, slightly desaturated palette of greens, browns, and muted water blues. • Atmospheric depth with subtle haze in the distance. • Gentle human and ecological activity: walking paths, birds, small environmental interactions. • Wide landscape depth, smooth terrain transitions, calm cinematic environmental lighting. • Soft paper-texture finish integrated into the rendering. Bottom sectional cut: • Continuous section through terrain and ecological systems. • Soil layers, hydrology, groundwater movement, vegetation roots, ecological restoration processes, water filtration systems. • Thin white or pale linework, muted tones, minimal color. • Arrows indicating water movement and ecological flow. • Elegant architectural drafting quality, seamlessly merged into the board. Diagram language: extremely thin and precise linework, slightly softened edges (no harsh vector look), minimal labels, clean scientific notation, soft ecological symbols, balanced between scientific clarity and poetic visualization. Color system: • Base: desaturated greens, earthy browns, muted blue water tones. • Overlay: pale green, soft cyan, light beige, translucent pastel layers. • Avoid saturated accents, harsh contrast, bright reds, or overly graphic colors. Texture and atmosphere: soft atmospheric rendering, slight environmental haze, diffused lighting, subtle paper-grain or printed board texture, refined competition-board aesthetic. Format: 3:4 vertical architectural competition board composition. #AIart #GPTImage2", "prompt_preview": "Generate a 3:4 vertical, competition-grade landscape architecture presentation board. The board blends photorealistic aerial rendering with refined architectural diagram language, in the style of a hi"}, {"id": "146", "title": "街头运动鞋海报广告", "title_en": "Streetwear Sneaker Poster Ad", "category": "广告创意案例", "img": "images/poster_case146/output.jpg", "prompt": "为{argument name = \"brand name\" default = \"NESS STUDIO\"}制作大胆的街头服装海报广告，其中一名年轻成人模特以低角度时尚姿势随意坐在地上，一只膝盖抬起，一条腿伸向镜头，因此前面的运动鞋看起来超大且占主导地位。模特穿着深棕色超大皮夹克，黑色衬衫，浅蓝色宽松牛仔裤，白色袜子，厚实的黑白灰色运动鞋，鞋底和{argum", "prompt_preview": "为{argument name = \"brand name\" default = \"NESS STUDIO\"}制作大胆的街头服装海报广告，其中一名年轻成人模特以低角度时尚姿势随意坐在地上，一只膝盖抬起，一条腿伸向镜头，因此前面的运动鞋看起来超大且占主导地位。模特穿着深棕色超大皮夹克，黑色衬衫，浅蓝色宽松牛仔裤，白色袜子，厚实的黑白灰色运动鞋，鞋底和{argum"}, {"id": "146", "title": "平面设计作品集模型", "title_en": "Graphic Design Portfolio Mockup", "category": "UI与社交媒体案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/ui_case146/output.jpg", "prompt": "Create a premium graphic design portfolio mockup in a professional creative studio style. Show a clean, elegant workspace presentation featuring multiple graphic design project cards arranged in a refined grid layout, a modern laptop screen displaying a portfolio homepage, and several printed posters laid out neatly on the desk and mounted on the wall. Use a polished creative-director aesthetic with soft shadows, subtle depth, realistic materials, and a high-end studio atmosphere. Include sleek typography placeholders, branding samples, editorial-style poster designs, business cards, stationery, notebook, pen, coffee cup, desk lamp, and small plant for a realistic studio setup. The design should have a clean grid layout, balanced spacing, soft realistic shadows, premium lighting, and neutral luxury tones such as black, white, warm beige, gray, champagne, and cream. Make the laptop screen show a minimal portfolio interface with project thumbnails, navigation menu, and bold hero text. Add multiple portfolio project cards such as logo design, brand identity, poster design, packaging design, social media design, UI/UX design, and advertising campaign mockups. Arrange everything professionally with a modern minimalist style, sharp details, clean typography, elegant composition, and a premium creative agency presentation look. Style: high-end graphic design portfolio, modern creative studio, luxury branding mockup, clean desk setup, realistic shadows, editorial layout, minimalist premium design, professional presentation, 4K, ultra-detailed.", "prompt_preview": "Create a premium graphic design portfolio mockup in a professional creative studio style. Show a clean, elegant workspace presentation featuring multiple graphic design project cards arranged in a ref"}, {"id": "147", "title": "社论大阪六卫衣广告", "title_en": "Editor
