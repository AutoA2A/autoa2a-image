"images/character_case9/output.jpg", "prompt": "# 混沌としたメモ書き・記号の集合体からキャラクターの顔を浮かび上がらせるアート\n\n--- スタイル\n- 白い紙の上に黒インクで描かれた大量の手書きメモ、数式、記号、ランダムな線。\n- 紙いっぱいに散らばる書き殴り風のカオス。\n- 所々に赤インクの強調(ライン、塗り潰し、マーカー風の塊)。\n- アナログのノート落書きのような質感。\n\n--- 構図\n- ランダムなメモや記号が全体を覆い尽くす。\n- 黒インクの線や文字の密度が「キャラクターの顔」の位置に集中する。\n- 結果として、混沌の中から「与えられたキャラクターの顔のシルエット・表情」がうっすら浮かび上がる。\n- 顔は写実的ではなく、カオスの断片が集まって形を成す。\n\n--- 色彩\n- モノクロ(黒・白)を主体に構成。\n- 赤インクをアクセントとして散発的に配置。\n- 彩度は抑えめ、アナログの紙とインク感を重視。\n\n--- 表現要素\n- 読めるようで読めない文字列、日本語や英数字が混在。\n- 数式記号、矢印、点、斜線、クロス、ドリップ(インクの飛び散り)。\n- キャラクターの顔の目や髪の輪郭は、メモや記号の配置の「余白」や「濃淡」で浮かび上がる。\n\n--- 禁止事項\n- 顔を直接的に描き込む写実ポートレート。\n- デジタル処理的で整然とした幾何学模様。\n- カラフルな彩色や過飽和表現。\n- ロゴ、透かし、人工的なCG感。\n\n--- Definition of Done (DoD)\n- 全体は「混沌としたメモ・記号の集合体」として成立している。  \n- 与えられたキャラクターの顔が、混沌の濃淡・配置から自然に浮かび上がる。  \n- 色はモノクロ+赤アクセントのみ。  \n- 紙とインクの手描き的質感を保持している。", "prompt_preview": "# 混沌としたメモ書き・記号の集合体からキャラクターの顔を浮かび上がらせるアート\n\n--- スタイル\n- 白い紙の上に黒インクで描かれた大量の手書きメモ、数式、記号、ランダムな線。\n- 紙いっぱいに散らばる書き殴り風のカオス。\n- 所々に赤インクの強調(ライン、塗り潰し、マーカー風の塊)。\n- アナログのノート落書きのような質感。\n\n--- 構図\n- ランダムなメモや記号が全体を覆い尽くす。\n- "}, {"id": "9", "title": "Style-to-UI设计系统", "title_en": "Style-to-UI Design System", "category": "UI与社交媒体案例", "img": "images/ui_case9/output.jpg", "prompt": "用这种风格帮我生成一套UI设计系统，包含网页、移动端、卡片、控件、按钮以及其它。把这套视觉风格作为参考生成网页。我尝试了宇宙、飞行、蝴蝶主题。", "prompt_preview": "用这种风格帮我生成一套UI设计系统，包含网页、移动端、卡片、控件、按钮以及其它。把这套视觉风格作为参考生成网页。我尝试了宇宙、飞行、蝴蝶主题。"}, {"id": "10", "title": "Sam Altman滑板场快照", "title_en": "Sam Altman Skatepark Snapshot", "category": "人像与摄影案例", "img": "images/portrait_case10/output.jpg", "prompt": "“山姆·奥尔特曼在一个没有人的滑板场玩滑板。”", "prompt_preview": "“山姆·奥尔特曼在一个没有人的滑板场玩滑板。”"}, {"id": "10", "title": "浏览器游戏广告创意海报", "title_en": "Browser Game Ad Creative Poster", "category": "海报与插画案例", "img": "images/poster_case10/output.jpg", "prompt": "以下の文字を必ず入れて、1:1のポスターを作成してください。書籍・講座・イベント告知に使える、プロの広告デザイナーが作ったような高品質な仕上がりにしてください。\n\n広告クリエイティブ制作\n思いついたら、もう遊べる。 AI×ブラウザゲームづくりは、マジで楽しい。 むずかしそうで、実ははじめやすい。 コードがわからなくても、はじめの一本は作れる", "prompt_preview": "以下の文字を必ず入れて、1:1のポスターを作成して  "title": "GPT-Image-2细节展示", "title_en": "GPT-Image-2 Detail Showcase", "category": "模型对比案例", "img": "images/comparison_case10/output.jpg", "prompt": "以眼部特写图片为基础，生成3:4的四屏构图超写实眼部特写，四屏按春夏秋冬上下排序。\n\n第一屏：眼眸中带着绽粉樱色的美瞳，睫毛缀满迷你春花，脸颊散落樱瓣与黄蕊小花，粉蝶萦绕眉眼，浅金发丝轻垂，下方簇簇樱花怒放，画面中央\"SPRING\"白色艺术字点缀，风格细腻唯美，光影柔和，色彩粉嫩治愈，下面用书法体写着春；\n\n第二屏：眼眸中带着着清荷色的美瞳，睫毛饰以粉莲与绿荷，脸颊挂着晶莹水珠，粉瓣、绿荷点缀其间，蜻蜓轻绕，浅金发丝若隐若现，画面中央\"Summer\"白色艺术字凸显，光影通透流光感，色彩清透凉爽，下面用书法体写着夏；\n\n第三屏：眼眸中带着金黄红相间的美瞳，睫毛饰以橙红枫叶，脸颊散落金红秋叶，橙蝶翩跹眉眼间，浅金发丝隐约可见，画面中央\"AUTUMN\"白色艺术字醒目，光影暖金流光，色彩浓郁温暖，下面用书法笔写着秋；\n\n第四屏：眼眸中带着雪花蓝色的美瞳，睫毛覆满冰晶雪片，脸颊散落白色雪花与红色腊梅，银白蝴蝶翩跹眉眼，浅金发丝朦胧似雪，画面中央\"WINTER\"白色艺术字亮眼，光影冷冽蓝白流光，色彩清透纯净，下面用书法体写着冬。\n\n整体呈现梦幻眼眸四季交替的唯美梦幻治愈画面，微调各屏的光影强度，让画面氛围感更浓郁。", "prompt_preview": "以眼部特写图片为基础，生成3:4的四屏构图超写实眼部特写，四屏按春夏秋冬上下排序。\n\n第一屏：眼眸中带着绽粉樱色的美瞳，睫毛缀满迷你春花，脸颊散落樱瓣与黄蕊小花，粉蝶萦绕眉眼，浅金发丝轻垂，下方簇簇樱花怒放，画面中央\"SPRING\"白色艺术字点缀，风格细腻唯美，光影柔和，色彩粉嫩治愈，下面用书法体写着春；\n\n第二屏：眼眸中带着着清荷色的美瞳，睫毛饰以粉莲与绿荷，脸颊挂着晶莹水珠，粉瓣、绿荷点缀其间"}, {"id": "11", "title": "韩国偶像3x3网格肖像", "title_en": "Korean Idol 3x3 Grid Portrait", "category": "人像与摄影案例", "img": "images/portrait_case11/output.jpg", "prompt": "9:16垂直，韩国偶像肖像拍摄， 3x3网格（ 9帧） ，所有图像中相同的人，一致的面部特征和造型，柔和的黑雾滤镜效果，降低对比度，绽放亮点，光源周围微妙的发光", "prompt_preview": "9:16垂直，韩国偶像肖像拍摄， 3x3网格（ 9帧） ，所有图像中相同的人，一致的面部特征和造型，柔和的黑雾滤镜效果，降低对比度，绽放亮点，光源周围微妙的发光"}, {"id": "11", "title": "超现实锦鲤星云插图", "title_en": "Surreal Koi Nebula Illustration", "category": "海报与插画案例", "img": "images/poster_case11/output.jpg", "prompt": "一幅超现实主义数字插画风格，采用低角度仰拍视角。画面描绘了一条巨型彩色锦鲤遨游在梦幻般的星云中，四周环绕着色彩鲜艳的星云与气泡。画面中央还站着一个小人，背对观众，神情平静地仰望空中这条巨大的锦鲤，锦鲤头向下看着小人。整体画面呈现出强烈的大小对比，氛围空灵又梦幻。比例9:16", "prompt_preview": "一幅超现实主义数字插画风格，采用低角度仰拍视角。画面描绘了一条巨型彩色锦鲤遨游在梦幻般的星云中，四周环绕着色彩鲜艳的星云与气泡。画面中央还站着一个小人，背对观众，神情平静地仰望空中这条巨大的锦鲤，锦鲤头向下看着小人。整体画面呈现出强烈的大小对比，氛围空灵又梦幻。比例9:16"}, {"id": "11", "title": "班加罗尔GTA 6花卉市场", "title_en": "GTA 6 in Bangalore Flower Market", "category": "角色设计案例", "img": "images/character_case11/output.jpg", "prompt": "{argument name=\"game\" default=\"gta 6\"} in {argument name=\"location\" default=\"Bangalore’s market flower\"} in India , include modern English typography in a clean, elegant layout (not vertical).\nMain headline:\nSweet Strawberry Bliss.\nSupporting line (smaller text):\nMade with real strawberries. Smooth. Creamy. Irresistible.\nAdd a small circular badge showing the price:\n$5.80.\nLighting: soft natural daylight, warm highlights, shallow depth of field, high-end commercial food photography style.\nMood: fresh, premium, modern, and inviting — aligned with upscale U.S. dessert branding.", "prompt_preview": "Ultra-realistic product photography of a rich strawberry soft-serve ice cream in a crispy waffle cone, styled with a clean, modern premium aesthetic. The soft serve is a vibrant natural pink, thick an"}, {"id": "23", "title": "剪影宇宙叙事海报", "title_en": "Silhouette Universe Narrative Poster", "category": "模型对比案例", "img": "images/comparison_case23/output.jpg", "prompt": "请根据【主题：xxx】自动生成一张高审美的“轮廓宇宙 / 收藏版叙事海报”风格作品。不要将画面局限于固定器物或常见容器，不要优先默认瓶子、沙漏、玻璃罩、怀表之类的常规载体，而是由 AI 根据主题自行判断并选择一个最契合、最有象征意义、轮廓最强、最适合承载完整叙事世界的主轮廓载体。这个主轮廓可以是器物、建筑、门、塔、拱门、穹顶、楼梯井、长廊、雕像、侧脸、眼睛、手掌、头骨、羽翼、面具、镜面、王座、圆环、裂缝、光幕、阴影、几何结构、空间切面、舞台框景、抽象符号或其他更有创意与主题代表性的视觉轮廓，要求合理布局。优先选择最能放大主题气质、最能形成强烈视觉记忆点、最能体现史诗感、神秘感、诗意感或设计感的轮廓，而不是最安全、最普通、最常见的容器。\n\n画面的核心不是简单把世界装进某个物体里，而是让完整的主题世界自然生长在这个主轮廓之中、之内、之上、之边界里或与其结构融为一体，形成一种“主题宇宙依附于一个象征性轮廓展开”的高级叙事效果。主轮廓必须清晰、优雅、有辨识度，并在整体构图中占据核心地位。轮廓内部或边界中需要自动生成与主题强绑定的完整叙事世界，内容应当丰富、饱满、层次清晰，包括最能代表主题的标志性场景、核心建筑或空间结构、象征符号与隐喻元素、角色关系或文明痕迹、远景中景近景的空间递进、具有命运感和情绪张力的氛围层次，以及门、台阶、桥梁、水面、烟雾、路径、光源、遗迹、机械结构、自然景观、抽象形态、生物或道具等叙事细节。所有元素必须统一、自然、有主次、有层级地融合，像一个完整世界真实孕育在这个轮廓结构之中，而不是简单拼贴、裁切填充、素材堆叠或模板化背景。\n\n整体构图需要具有强烈的收藏版海报气质与高级设计感，大结构稳定，主轮廓强烈明确，内部世界具有纵深、秩序和呼吸感，细节丰富但不拥挤，内容丰满但不杂乱，可以适度加入小比例人物剪影、远处建筑、光柱、门洞、桥、阶梯、回廊、倒影、天光或远景结构来增强尺度感、故事感与史诗感。整体画面要安静、宏大、凝练、富有余味，不要平均铺满，不要廉价热闹，不要无重点堆砌。\n\n风格融合收藏版电影海报构图、高级叙事型视觉设计、梦幻水彩质感与纸张印刷品气质，强调纸张颗粒感、边缘飞白、水彩刷痕、轻微晕染、空气透视、柔和雾化、局部体积光、光雾穿透、大面积留白与克制版式，让画面看起来像设计师完成的高端收藏版视觉作品，而不是普通 AI 跑图。整体气质要高级、诗意、宏大、神圣、怀旧、安静、具有传说感和叙事感。\n\n色彩由 AI 根据主题自动判断并匹配最合适的高级配色方案，但必须保持统一、克制、耐看、低饱和、高级，不要杂乱高饱和，不要廉价霓虹感，不要塑料数码感。配色可以围绕黑金灰、冷蓝灰、雾白灰、褐红米白、暗铜、旧纸色、 \n- 多个圆角模块化信息分区\n- 清楚的标题层级与重点标签\n- 简洁但丰富的百科内容\n- 可视化评分、要点总结或Top 5模块\n\n内容栏目请根据主题自动适配,优先从这些方向中选择并合理组合:\n基础档案、分类信息、外观特征、习性/生态、形成机制/结构组成、生长或使用条件、养护或维护建议、风险与注意事项、适合人群或适用场景、优缺点对比、快速评分卡。\n\n视觉要求:\n浅色干净背景,柔和配色,轻阴影,精致小图标,圆角信息框,整洁排版,信息密度高但不拥挤,阅读体验好。整体必须像真正可以发布、阅读、收藏、系列化生产的科普百科卡,而不是广告图。\n\n请不要做成普通商业宣传海报。要突出“知识整理 + 模块信息 + 图鉴式展示”的特征。", "prompt_preview": "请根据【主题】生成一张高质量竖版「科普百科图」。 \n\n这张图不是普通海报,也不是单纯插画,而是一张兼具“图鉴感、百科感、信息结构感、收藏感”的模块化科普信息图。整体风格参考高级博物图鉴、现代百科书页、生活方式知识卡和社交媒体高传播信息图的结合。\n\n请让画面包含:\n- 一个清晰漂亮的主题主视觉\n- 若干局部特征放大细节\n- 多个圆角模块化信息分区\n- 清楚的标题层级与重点标签\n- 简洁但丰富的百科内"}, {"id": "39", "title": "特朗普和金直播PK截图", "title_en": "Trump and Kim Livestream PK Screenshot", "category": "UI与社交媒体案例", "img": "images/ui_case39/output.jpg", "prompt": "1、生成特朗普和金正恩在抖音直播间打PK的截图  \n2、生成不知火舞的小红书主页截图  \n3、生成图片: 手写在教室黑板上的出师表全文,真实感的粉笔字迹,晴朗白天用iPhone手机实拍  \n4、生成图片: T-800机器人的淘宝商品详情页,展示: 机器人的正面侧面背面三视图, 产品价格, 产品细节, 功能和使用场景等", "prompt_preview": "1、生成特朗普和金正恩在抖音直播间打PK的截图  \n2、生成不知火舞的小红书主页截图  \n3、生成图片: 手写在教室黑板上的出师表全文,真实感的粉笔字迹,晴朗白天用iPhone手机实拍  \n4、生成图片: T-800机器人的淘宝商品详情页,展示: 机器人的正面侧面背面三视图, 产品价格, 产品细节, 功能和使用场景等"}, {"id": "39", "title": "山姆·奥特曼棒球广播", "title_en": "Sam Altman Baseball Broadcast", "category": "模型对比案例", "img": "images/comparison_case39/output.jpg", "prompt": "サムアルトマンがメジャーリーガーでバットを構えている。よくあるようなテレビ画面の構図", "prompt_preview": "サムアルトマンがメジャーリーガーでバットを構えている。よくあるようなテレビ画面の構図"}, {"id": "40", "title": "虚构动漫电影海报", "title_en": "Fictional Anime Movie Poster", "category": "海报与插画案例", "img": "images/poster_case40/output.jpg", "prompt": "架空のアニメ映画のポスターをGPT image2で作成。", "prompt_preview": "架空のアニメ映画のポスターをGPT image2で作成。"}, {"id": "40", "title": "日本AI游戏开发概述幻灯片提示", "title_en": "Japanese AI Game Dev Overview Slide Prompt", "category": "UI与社交媒体案例", "img": "images/ui_case40/output.jpg", "prompt": "横長のパワポ画像ここで生成してみて　どのモデル使ってるか判定するから、今のAIゲーム開発の概要をまとめた1枚パワポで　日本語で\n\nゲーム開発の技術に関して、工数ベースでどこにパワーかかるかの分析資料といかに量産が大事かについての説明とかのパワポ画も作って", "prompt_preview": "横長のパワポ画像ここで生成してみて　どのモデル使ってるか判定するから、今のAIゲーム開発の概要をまとめた1枚パワポで　日本語で\n\nゲーム開発の技術に関して、工数ベースでどこにパワーかかるかの分析資料といかに量産が大事かについての説明とかのパワポ画も作って"}, {"id": "40", "title": "根据视频内容和当前帧，使用GPT生成YouT...", "title_en": "Based on the video content and this current frame, use GPT to generate a YouT...", "category": "模型对比案例", "img": "images/case_case61/output.jpg", "prompt": "Based on the video content and this current frame, use GPT to generate a YouTube thumbnail that fits the video. You can reference the style of the image I gave you, but replace the logo on the right side of AE with theChatCut logo. I'll attach the logo for you.", "prompt_preview": "Based on the video content and this current frame, use GPT to generate a YouTube thumbnail that fits the video. You can reference the style of the image I gave you, but replace the logo on the right s"}, {"id": "41", "title": "产品广告重新设计", "title_en": "Product Ad Redesign", "category": "海报与插画案例", "img": "images/poster_case41/output.jpg", "prompt": "この商品広告をプロのデザイナー目線でリデザインして。\n今のトレンド、ターゲットに合わせた洗練されたデザインで。", "prompt_preview": "この商品広告をプロのデザイナー目線でリデザインして。\n今のトレンド、ターゲットに合わせた洗練されたデザインで。"}, {"id": "41", "title": "根据生成的字符帮助我生成屏幕截图...", "title_en": "based on the generated character help me generate a screenshot of screenshot ...", "category": "UI与社交媒体案例", "img": "images/ui_case63/output.jpg", "prompt": "based on the generated character help me generate a screenshot of screenshot of an pvp game themed around *zelda: wind breaker*", "prompt_preview": "based on the generated character help me generate a screenshot of screenshot of an pvp game themed around *zelda: wind breaker*"}, {"id": "41", "title": "生成2020年最重要事件的图像", "title_en": "Generate an image of the most significant event of 2020", "category": "模型对比案例", "img": "images/case_case65/output.jpg", "prompt": "Generate an image of the most significant event of 2020", "prompt_preview": "Generate an image of the most significant event of 2020"}, {"id": "42", "title": "广州市黑暗幻想海报", "title_en": "Dark-Fantasy Guangzhou City Poster", "category": "海报与插画案例", "img": "images/poster_case42/output.jpg", "prompt": "平面插画,东方幻想风格高端城市海报设计,竖版9:16构图,整体采用对角线+S型流动构图,从左下向右上延展,画面以深邃黑色为背景,自上而下渐变至浓烈暗红色,形成强烈冷暖对比与空间纵深,背景带微弱星尘与颗粒质感。画面中央一条金色流动能量线条如火焰般蜿蜒贯穿,自底部向上延伸,具有流体质感、粒子光效与渐变高光,局部带细微能量碎屑与体积光。\n\n金色流光中逐层浮现广州城市地标建筑群:广州塔为视觉核心,比例突出,周围融合珠江新城高楼群、猎德大桥及现代与岭南建筑元素,建筑采用“精细线描 + 金色发光体块”表现,轮廓清晰、细节丰富,在金色光晕映衬下仿佛悬浮于虚空,形成超现实空间层次,远景轻微雾化增强纵深感。\n\n画面底部为一位东方白发女性形象,长发飘逸,如烟似雾,与金色流光自然衔接并逐渐融合,发丝半透明带渐变光感,姿态柔美,双目微闭,神情宁静,怀抱一束多彩鲜花,花间点缀微光粒子与星点效果,象征人与城市能量的精神连接,人物细节适度简化以突出整体设计感。\n\n光影集中于金色流线、建筑与人物轮廓,形成强烈明暗对比与视觉聚焦,整体氛围宏大、神秘、具有东方神话意境且略带治愈感。色彩以黑与暗红为基底,高亮鎏金为主视觉强调,金色具备丰富明暗层次,辅以小面积高饱和花束色彩点缀,整体高级克制。\n\n页面文字与画面融合排版:顶部居中宋体大字“广州·中国”,下方小字“2026/04/20”,再下方小字“LIYUE”,文字采用淡金色或柔和暖白色,与整体光影统一。高品质细节,电影级光影表现,体积光与粒子细节丰富,画面干净无噪点,超高清8K分辨率,商业级海报质感。", "prompt_preview": "平面插画,东方幻想风格高端城市海报设计,竖版9:16构图,整体采用对角线+S型流动构图,从左下向右上延展,画面以深邃黑色为背景,自上而下渐变至浓烈暗红色,形成强烈冷暖对比与空间纵深,背景带微弱星尘与颗粒质感。画面中央一条金色流动能量线条如火焰般蜿蜒贯穿,自底部向上延伸,具有流体质感、粒子光效与渐变高光,局部带细微能量碎屑与体积光。\n\n金色流光中逐层浮现广州城市地标建筑群:广州塔为视觉核心,比例突出"}, {"id": "42", "title": "使用此图像创建着陆页，作为样式和颜色灰度的参考...", "title_en": "Create a landing page using this image as a reference for style and color gra...", "category": "UI与社交媒体案例", "img": "images/ui_case64/output.jpg", "prompt": "Create a landing page using this image as a reference for style and color grading.", "prompt_preview": "Create a landing page using this image as a reference for style and color grading."}, {"id": "42", "title": "编辑此图片，使总金额变为244.5泰铢。您可以更改此...", "title_en": "Edit this image so that total amount changes to 244.5 baht. You can change th...", "category": "模型对比案例", "img": "images/case_case66/output.jpg", "prompt": "Edit this image so that total amount changes to 244.5 baht. You can change the quantity of each of the stacks of coins until we hit the target total.", "prompt_preview": "Edit this image so that total amount changes to 244.5 baht. You can change the quantity of each of the stacks of coins until we hit the target total."}, {"id": "43", "title": "李佳琪口红直播背景", "title_en": "Li Jiaqi Lipstick Livestream Background", "category": "UI与社交媒体案例", "img": "images/ui_case88/output.jpg", "prompt": "李佳琦直播间背景，口红矩阵展示墙，暖光氛围灯，文案OMG买它", "prompt_preview": "李佳琦直播间背景，口红矩阵展示墙，暖光氛围灯，文案OMG买它"}, {"id": "43", "title": "生成2001年最重要事件的图像", "title_en": "Generate an image of the most significant event of 2001", "category": "模型对比案例", "img": "images/case_case67/output.jpg", "prompt": "Generate an image of the most significant event of 2001", "prompt_preview": "Generate an image of the most significant event of 2001"}, {"id": "44", "title": "Apple Pods Pro 3耳机电子商务信息图", "title_en": "Apple Pods Pro 3 Headphone E-Commerce Infographic", "category": "UI与社交媒体案例", "img": "images/ui_case44/output.jpg", "prompt": "High-impact e-commerce infographic for \"Apple Pods Pro 3\" \npremium wireless over-ear headphones.\n\nFOREGROUND - PRODUCT HERO SHOT\nExtreme close-up of a hand holding a sleek, \nmatte-white premium over-ear headphone toward the camera \nat a slight angle. The headphone features:\n- Glossy white ear cushions with soft memory foam padding\n- Brushed aluminum silver headband with subtle Apple Pods \n  Pro 3 embossed branding\n- Black mesh speaker grille visible on the ear cup face\n- A tiny glowing green LED status indicator on the \n  right ear cup edge\n- Subtle touch-control icons etched on the outer cup surface\n\nMacro-lens shallow depth of field — hand and headphone \nslightly blurred at edges to create cinematic depth. \nProduct remains razor-sharp in center frame.\n\nCENTRAL SUBJECT — MODEL\nIn the mid-ground: a smiling young woman with freckles \nand wavy pastel-pink hair. She wears:\n- A vibrant lime-green knit beanie\n- A psychedelic black and white-striped long-sleeve shirt\n- The white over-ear headphones resting stylishly \n  around her neck (not on ears) — one hand casually \n  touching the ear cup\n\nExpression: relaxed, confident, joyful. \nShe is glancing slightly off-camera with a natural smile.\n\nBACKGROUND & ATMOSPHERE\nClean soft-focus studio backdrop — light gray gradient \nfading to warm white at center. \n\nAtmospheric overlays:\n- Diagonal rainbow prism lens flares cutting across \n  upper-left to lower-right\n- Soft pastel light leaks in pink and yellow at corners\n- 4–5 blurred white over-ear headphones floating \n  artistically in the background at various depths \n  and rotation angles\n- Subtle bokeh circles from background studio lights\n\nLighting: Soft professional three-point studio lighting. \nKey light from upper-left, fill light right side. \nRim light behind model for separation. \nGlossy highlights on headphone surfaces catching light naturally.\n\nTYPOGRAPHY & LAYOUT — Sans-Serif, Clean white \nTOP CENTER (behind model, large background text):\n→ Massive bold oversized text: \"HEADPHONES\"\n   Semi-transparent white, spanning full width behind subject\n\nTOP RIGHT CORNER:\n→ Bold clean text: \"Apple Pods Pro 3\"\n   Subtitle smaller text: \"Over-Ear Wireless\"\n\nMID LEFT:\n→ Icon: small sound wave symbol\n→ Bold text: \"Premium Sound\"\n→ Sub-text: \"Active Noise Cancellation + Transparency Mode\"\n\nMID RIGHT:\n→ Extra-large bold numeral: \"40\"\n→ Smaller text below: \"hours of battery life\"\n\nLOWER LEFT:\n→ Extra-large bold numeral: \"0\"\n   with \"to\" beside it → then bold \"100%\"\n→ Sub-text: \"Fast charge — 10 min = 3hrs playback\"\n\nBOTTOM RIGHT:\n→ Extra-large bold numeral: \"1\"\n→ Sub-text: \"Year Warranty Included\"\n\nBOTTOM CENTER (fine print style):\n→ Small elegant text: \n   \"Bluetooth 5.4  |  Hi-Res Audio Certified  \n    |  Foldable Design  |  USB-C Charging\"\n\nTECHNICAL SPECS\nResolution: 8K ultra-sharp\nStyle: Commercial product photography meets \n       editorial fashion advertising\nColor Palette: White, lime green, pastel pink, \n               rainbow prism accents\nFocus: Tack-sharp on headphone product — \n       shallow DOF on everything else\nLens: 85mm macro, slight low angle\nRender Quality: Hyperrealistic, clean ad aesthetic, \n                vibrant yet professional color grading", "prompt_preview": "High-impact e-commerce infographic for \"Apple Pods Pro 3\" \npremium wireless over-ear headphones.\n\nFOREGROUND - PRODUCT HERO SHOT\nExtreme close-up of a hand holding a sleek, \nmatte-white premium over-e"}, {"id": "45", "title": "科幻电影海报", "title_en": "Science Fiction Movie Poster", "category": "海报与插画案例", "img": "images/poster_case45/output.jpg", "prompt": "Create a Science fiction movie poster", "prompt_preview": "Create a Science fiction movie poster"}, {"id": "45", "title": "Apple Pods Pro 3耳塞电子商务信息图", "title_en": "Apple Pods Pro 3 Earbuds E-Commerce Infographic", "category": "UI与社交媒体案例", "img": "images/ui_case45/output.jpg", "prompt": "High-impact e-commerce infographic for \"Apple Pods Pro 3\" wireless earbuds.", "prompt_preview": "High-impact e-commerce infographic for \"Apple Pods Pro 3\" wireless earbuds."}, {"id": "46", "title": "清爽夏日乌冬面广告", "title_en": "Refreshing Summer Udon Ad", "category": "海报与插画案例", "img": "images/poster_case46/output.jpg", "prompt": "少し暑くなってきた今の時期に、さわやかにさっぱりしたい、みずみずしさ、みたいなところをもっと強く感じたい。冷たいうどんやナス、つゆを口に含んだ時の爽快感、みたいなものをもっと感じるように", "prompt_preview": "少し暑くなってきた今の時期に、さわやかにさっぱりしたい、みずみずしさ、みたいなところをもっと強く感じたい。冷たいうどんやナス、つゆを口に含んだ時の爽快感、みたいなものをもっと感じるように"}, {"id": "46", "title": "美容产品商业营销照片", "title_en": "Beauty Product Commercial Marketing Photograph", "category": "UI与社交媒体案例", "img": "images/ui_case46/output.jpg", "prompt": "A high-resolution commercial marketing photograph features a young woman with sleek dark hair and a pink ribbed top in a neutral grey studio setting, centered behind a glossy Ellie Beauty spray bottle held prominently in the foreground. The composition is energized by vibrant, lime-green graphic \"swooshes\" and floating pill-shaped callouts that highlight product features like \"glossy finish\" and \"upto 450°F protection\" in bold black sans-serif text. The lighting is professionally diffused, casting soft highlights on the model’s face while creating a sharp, vertical reflection on the metallic green-to-gold gradient bottle label. Topping the scene is a large, lime-green headline in the upper right asking, \"What does it do?\", altogether creating a clean, modern, and high-contrast aesthetic with a shallow depth of field that keeps the product and the model's focused expression in sharp relief.", "prompt_preview": "A high-resolution commercial marketing photograph features a young woman with sleek dark hair and a pink ribbed top in a neutral grey studio setting, centered behind a glossy Ellie Beauty spray bottle"}, {"id": "47", "title": "手写医疗处方表", "title_en": "Handwritten Medical Prescription Sheet", "category": "海报与插画案例", "img": "images/poster_case47/output.jpg", "prompt": "生成一张手写中/西医药方图", "prompt_preview": "生成一张手写中/西医药方图"}, {"id": "47", "title": "AAA电子游戏截图概念设计", "title_en": "AAA Video Game Screenshot Concept Design", "category": "UI与社交媒体案例", "img": "images/ui_case47/output.jpg", "prompt": "generate screenshots from a AAA video game based off what The Sims Castaways sequel could look like. https://t.co/aL7hMdUYvj", "prompt_preview": "generate screenshots from a AAA video game based off what The Sims Castaways sequel could look like. https://t.co/aL7hMdUYvj"}, {"id": "48", "title": "硅谷2026宣传海报", "title_en": "Silicon Valley 2026 Promo Poster", "category": "海报与插画案例", "img": "images/poster_case48/output.jpg", "prompt": "A refined 2026 Silicon Valley city promotional poster with a futuristic yet elegant atmosphere.\n\nDouble exposure composition, preserving an S-shaped sense of flowing movement. On a pure white textured background, in the lower-right corner, a miniature figure dressed in sleek modern techwear is releasing a long ribbon of luminous silver-blue light. The ribbon flows gracefully through the air, showing a soft silk-like texture, and as it drifts toward the upper-left, it magically transforms into a grand landscape of rolling hills, coastline, data streams, and illuminated urban terrain.\n\nWithin this flowing “river of light,” overlay a hand-drawn panoramic map of Silicon Valley, blending technology, nature, innovation, and California sunlight. The scene feels visionary, expansive, sophisticated, and inspiring.\n\nInclude iconic Silicon Valley and Bay Area elements: Stanford University arches, Apple Park, Google campus-inspired buildings, Meta-like glass offices, Tesla-style innovation imagery, venture capital offices on Sand Hill Road, Palo Alto tree-lined streets, San Jose skyline, the Santa Cruz Mountains, San Francisco Bay, highways, autonomous vehicles, startup labs, semiconductor patterns, AI data centers, and subtle circuit-board textures.\n\nSurrounded by soft mist, golden California light, floating clouds, and delicate digital particles. Rich colors, complex structure, highly detailed, grand and breathtaking, yet still fresh and minimal because of the large areas of white space.\n\nIn the lower-left corner, elegant typography reads “SILICON VALLEY 2026” with a vertical promotional slogan: “Where Ideas Shape Tomorrow.” Beautiful editorial layout, graceful spacing, clear and complete lettering, premium city branding poster, cinematic lighting, sophisticated details, 9:16 aspect ratio.", "prompt_preview": "A refined 2026 Silicon Valley city promotional poster with a futuristic yet elegant atmosphere.\n\nDouble exposure composition, preserving an S-shaped sense of flowing movement. On a pure white textured"}, {"id": "48", "title": "研究LIME药物设计并制作详细的信息图表", "title_en": "Research LIME Drug Design and make a detailed infographic about it", "category": "模型对比案例", "img": "images/case_case83/output.jpg", "prompt": "Research LIME Drug Design and make a detailed infographic about it", "prompt_preview": "Research LIME Drug Design and make a detailed infographic about it"}, {"id": "49", "title": "日本超市促销传单", "title_en": "Japanese Supermarket Sale Flyer", "category": "海报与插画案例", "img": "images/poster_case49/output.jpg", "prompt": "『賑やかで魅力的なスーパーマーケットの折り込みチラシの画像。上部には「特売」の大きな文字と今週の日付。カラフルな商品写真(野菜・果物・牛肉・鮮魚)、赤枠の価格タグ、「超目玉商品」「家計応援」のキャッチ...』", "prompt_preview": "『賑やかで魅力的なスーパーマーケットの折り込みチラシの画像。上部には「特売」の大きな文字と今週の日付。カラフルな商品写真(野菜・果物・牛肉・鮮魚)、赤枠の価格タグ、「超目玉商品」「家計応援」のキャッチ...』"}, {"id": "49", "title": "抖音直播销售截图", "title_en": "Douyin Livestream Sales Screenshot", "category": "模型对比案例", "img": "images/case_case84/output.jpg", "prompt": "生成一个抖音直播的截图 里面是一个美女在直播，在卖丝袜和内衣，她的在线人数是99996，热度是18+，有个叫小互的大哥，给她刷了一个飞机礼物", "prompt_preview": "生成一个抖音直播的截图 里面是一个美女在直播，在卖丝袜和内衣，她的在线人数是99996，热度是18+，有个叫小互的大哥，给她刷了一个飞机礼物"}, {"id": "50", "title": "黑暗史诗概念海报", "title_en": "Dark Epic Concept Poster", "category": "海报与插画案例", "img": "images/poster_case50/output.jpg", "prompt": "围绕【主题】自动生成一张顶级暗黑史诗概念海报 / 电影感信息图海报。\n\n唯一需要输入的变量只有:\n【主题】:___特朗普的思考____ \n\n除【主题】之外,其余全部由 AI 自动适配完成,包括但不限于:\n- 核心主体(自动判断更适合人物、守护者、战士、产品、器物、雕像、抽象象征或其他主视觉对象)\n- 中央承载结构(自动判断更适合王座、石座、祭坛、机械基座、遗迹、高台或其他支撑体)\n- 环境空间(自动判断更适合洞穴、神殿、废墟、深渊、地下宫殿、密室或其他封闭史诗空间)\n- 上方开口与光源形式(自动判断更适合月光、神光、能量束、审判之光、圣光或其他单一强光)\n- 象征元素(自动判断更适合骷髅、徽记、残碑、纹章、符文、能量环、神性符号等)\n- 色彩体系\n- 材质组合\n- 标题、副标题、辅助文案\n- 排版与整体叙事气质\n\n【总风格】\n高预算 90 年代好莱坞史诗大片海报气质,融合 cinematic matte painting、超写实摄影质感、极强明暗对比、厚重空间叙事、暗黑英雄主义与仪式感构图。整体必须像一张真正的电影主海报,而不是普通插画或电商图。\n\n【核心结构锁定】\n整张海报必须保留以下结构基因:\n1. 一个巨大、压迫感极强的黑暗封闭空间\n2. 一束从上方斜向切入的强烈体积光,作为画面的第一视觉秩序\n3. 中央偏右或光束终点位置的核心主体与承载结构\n4. 左下角作为高密度标题与信息锚点\n5. 四周保留大量纯黑或近黑负空间,形成电影感呼吸区\n\n【自动适配规则】\nAI 必须依据【主题】自动推导最适合的视觉系统:\n- 如果【主题】偏暗黑英雄、复仇、正义、孤独、宿命,则自动偏向石质王座、孤高人物、冷色神光、废墟或洞穴感空间\n- 如果【主题】偏神秘、幽灵、潜行、幻影、夜行,则自动偏向月光、迷雾、冷蓝色体积光、深渊式黑暗空间\n- 如果【主题】偏权力、统治、王者、秩序,则自动强化 throne / altar / crown-like symbol / ritual space 的表达\n- 如果【主题】偏科技、AI、未来、机械,则自动将王座和空间替换为机械神座、能量基座、金属洞窟、工业神殿等未来化形态\n- 如果【主题】偏产品、品牌、器物,则自动把核心主体替换为最合适的 hero object,并保留被神光审判式凸显的史诗构图\n\n【画布与色彩系统】\n- 背景底层必须是极深、近乎吞噬一切的黑暗空间\n- 主环境色由 AI 根据【主题】自动决定,但整体必须克制,以暗色为主\n- 强光区域色彩必须高度集中,只服务于体积光与主体高光\n- 主题色 / 强调色只能集中用于主视觉核心,不允许全画面泛滥\n- 必须建立明确的“黑暗底色 + 单一主光 + 少量主题强调色”的层级秩序\n\n【构图与视觉重力】\n- 采用强烈的斜向张力与向中心汇聚的视觉引导\n- 视觉重力从上方光源强势落下,最终压在核心主体之上\n- 主体必须处于被命运、审判、神性或权力照中的位置\n- 边缘必须自然融入黑暗,不能出现无意义背景填充\n- 所有元素必须服务于唯一的主叙事核心\n\n【材质与光影】\n- 不使用轮廓线,不使用平面化描边\n- 完全依赖体积光、阴影切割、反射、高光、雾气、粉尘、湿润岩石或其他真实材质来建构画面\n- 材质必须形成明显对比,例如:\n  粗粝岩石 / 冷硬金属 / 柔韧织物 / 古老石雕 / 湿润表面 / 尘雾光柱\n- 光束必须具有强烈 Tyndall effect,真实、厚重、可感知体积密度\n\n【排版系统】\n- 整体 80% 视觉,20% 文字\n- AI 根据【主题】自动生成主标题、副标题和底部信息块\n- 主标题应尽量简洁、有气势、有电影海报感\n- 若主题更适合中文,则优先中文;若更适合英文,则自动英文;也可双语,但必须统一\n- 主标题可沿光束垂直排布,仿佛由光本身构成\n- 左下角设置一个高密度信息模块,包括副标题、小字信息、电影 credits 风格占位文字或品牌说明\n- 文字必须锐利、干净、真实嵌入环境,不得廉价漂浮\n\n【模块结构 —— 必须严格保持 3 块】\n[MOD 1: TOP-TO-CENTER BEAM]\n从顶部开口斜向切下的巨大体积光柱,作为第一视觉通道,并承载主标题或主视觉文字。\n\n[MOD 2: CENTER-RIGHT CORE]\n位于光束终点的核心主体与承载结构,形成整张海报的权力中心 / 命运中心 / 叙事中心。\n\n[MOD 3: BOTTOM-LEFT TEXT]\n位于左下角负空间中的高密度排版区,包含副标题、说明文字、credits 风格信息块、品牌信息或活动信息。\n\n【作者署名】\n在底部角落自然加入作者署名:\n@a9quant\n署名要小而清晰,精致、克制、高级,不喧宾夺主,像正式电影概念海报或艺术作品落款。\n\n【输出要求】\n输出为单张统一构图海报。\n所有视觉系统必须内部一致,不能有风格污染。\n画面必须具备:暗黑感、史诗感、压迫感、仪式感、命运感、电影完成度。\n最大细节密度,超清,电影级,印刷级,高端成片质感。", "prompt_preview": "围绕【主题】自动生成一张顶级暗黑史诗概念海报 / 电影感信息图海报。\n\n唯一需要输入的变量只有:\n【主题】:___特朗普的思考____ \n\n除【主题】之外,其余全部由 AI 自动适配完成,包括但不限于:\n- 核心主体(自动判断更适合人物、守护者、战士、产品、器物、雕像、抽象象征或其他主视觉对象)\n- 中央承载结构(自动判断更适合王座、石座、祭坛、机械基座、遗迹、高台或其他支撑体)\n- 环境空间(自"}, {"id": "50", "title": "社交应用匹配成功屏幕", "title_en": "Social App Match Success Screen", "category": "模型对比案例", "img": "images/case_case86/output.jpg", "prompt": "社交App匹配成功界面，两个用户资料卡碰撞爱心特效", "prompt_preview": "社交App匹配成功界面，两个用户资料卡碰撞爱心特效"}, {"id": "51", "title": "普拉提工作室广告海报", "title_en": "Pilates Studio Ad Poster", "category": "海报与插画案例", "img": "images/poster_case51/output.jpg", "prompt": "ピラティス教室の広告画像を作成したい テキストはよりユーザーが登録をするのに惹かれるような文言にし、画像内には女性がピラティスを実際に行っている様子を映して", "prompt_preview": "ピラティス教室の広告画像を作成したい テキストはよりユーザーが登録をするのに惹かれるような文言にし、画像内には女性がピラティスを実際に行っている様子を映して"}, {"id": "51", "title": "Lu Bu Boss设计表", "title_en": "Lu Bu Boss Design Sheet", "category": "模型对比案例", "img": "images/case_case91/output.jpg", "prompt": "吕布游戏Boss设定，赤兔马方天画戟，暗黑进化形态双形态对比", "prompt_preview": "吕布游戏Boss设定，赤兔马方天画戟，暗黑进化形态双形态对比"}, {"id": "52", "title": "6块时尚活动提示配方", "title_en": "6-Block Fashion Campaign Prompt Formula", "category": "海报与插画案例", "img": "images/poster_case57/output.jpg", "prompt": "Old money Hamptons editorial, tall blonde woman late 20s, serene el 、秩序、资本、统治,则自动偏向王座、冠冕、机械、神殿、红幕、金属、权力结构\n- 如果主题偏科技、AI、芯片、未来,则自动偏向机械结构、能量核心、光束、深色金属、全息感\n- 如果主题偏奢侈品、高定、稀缺、收藏,则自动偏向珠宝、镜面材质、黑金体系、展台、博物馆式布光\n- 如果主题偏人物、IP、角色,则自动以人物为主视觉核心,并自动匹配对应世界观与象征系统\n- 如果主题偏城市、文明、史诗、命运,则自动转化为宏大叙事型空间结构与仪式感场景\n\n【构图规则】\n- 绝对高级感\n- 强烈中心秩序,整体统一\n- 允许中轴对称或接近中轴的史诗级构图\n- 视觉重力明确,从上到下形成清晰的层级落点\n- 边缘负空间干净、克制、有呼吸感\n- 不允许无意义装饰,不允许风格污染,不允许多个系统互相打架\n\n【视觉质量】\n- 超高细节\n- 体积光清晰\n- 材质真实\n- 反射、折射、阴影、雾气、景深自然\n- 每个元素都像经过工业级视觉总监审美控制\n- 整体达到高端品牌 campaign key visual / luxury invitation poster / conceptual editorial poster 水准\n\n【排版系统】\n- 整体为 90% 视觉,10% 文字\n- AI 根据【主题】自动生成最匹配的主标题和副标题\n- 标题必须简洁、锋利、有气势\n- 文案分布在安全负空间内,不压主体\n- 若主题适合中文,则优先生成中文标题;若主题更适合英文,则自动生成英文标题;也可中英结合,但必须统一高级\n- 文字必须尽量少而准,不要堆字\n\n【署名要求】\n在画面底部角落自然加入作者署名:\n@a9quant\n署名要小,但清晰、精致、高级,不喧宾夺主,像顶级视觉作品中的正式作者落款。\n\n【输出要求】\n输出为单张统一构图海报。\n自动根据【主题】完成全部视觉决策。\n画面必须具备史诗感、秩序感、控制力、仪式感、商业完成度。\n最大细节密度,超清,电影级,印刷级,高端成片质感。", "prompt_preview": "请围绕【主题】自动生成一张顶级概念海报 / 信息图式电影海报。\n\n唯一输入变量只有:\n【主题】:__中国历史上的皇帝排名_         \n\n要求 AI 根据这个主题,自动推导并统一设计以下全部视觉系统,不需要我额外指定:\n- 核心主体(可以自动判断更适合人物、产品、建筑、器物、符号、场景或抽象意象)\n- 底部支撑结构\n- 上方悬浮符号或精神象征\n- 场景包裹元素\n- 隐喻系统\n- 色彩层级\n-"}, {"id": "56", "title": "地铁坦诚电话快照", "title_en": "Subway Candid Phone Snapshot", "category": "模型对比案例", "img": "images/case_case96/output.jpg", "prompt": "地铁上低头看手机的美丽女人，偷拍照片。\n\n能免费试一次 ⬇️", "prompt_preview": "地铁上低头看手机的美丽女人，偷拍照片。\n\n能免费试一次 ⬇️"}, {"id": "57", "title": "主题科学百科全书卡片", "title_en": "Theme Science Encyclopedia Card", "category": "海报与插画案例", "img": "images/poster_case54/output.jpg", "prompt": "请根据【主题】生成一张高质量竖版「科普百科图」。 \n\n这张图不是普通海报,也不是单纯插画,而是一张兼具“图鉴感、百科感、信息结构感、收藏感”的模块化科普信息图。整体风格参考高级博物图鉴、现代百科书页、生活方式知识卡和社交媒体高传播信息图的结合。\n\n请让画面包含:\n- 一个清晰漂亮的主题主视觉\n- 若干局部特征放大细节\n- 多个圆角模块化信息分区\n- 清楚的标题层级与重点标签\n- 简洁但丰富的百科内容\n- 可视化评分、要点总结或Top 5模块\n\n内容栏目请根据主题自动适配,优先从这些方向中选择并合理组合:\n基础档案、分类信息、外观特征、习性/生态、形成机制/结构组成、生长或使用条件、养护或维护建议、风险与注意事项、适合人群或适用场景、优缺点对比、快速评分卡。\n\n视觉要求:\n浅色干净背景,柔和配色,轻阴影,精致小图标,圆角信息框,整洁排版,信息密度高但不拥挤,阅读体验好。整体必须像真正可以发布、阅读、收藏、系列化生产的科普百科卡,而不是广告图。\n\n请不要做成普通商业宣传海报。要突出“知识整理 + 模块信息 + 图鉴式展示”的特征。", "pro ortrait", "category": "模型对比案例", "img": "images/case_case101/output.jpg", "prompt": "根据真实历史对杨玉环的形象描述，生成一张杨贵妃真实照片，画质为iPhone 15 pro", "prompt_preview": "根据真实历史对杨玉环的形象描述，生成一张杨贵妃真实照片，画质为iPhone 15 pro"}, {"id": "62", "title": "纵横比： 9:16垂直", "title_en": "Aspect Ratio: 9:16 Vertical", "category": "海报与插画案例", "img": "images/poster_case85/output.jpg", "prompt": "Aspect Ratio: 9:16 Vertical\n\n【IDENTITY & REALISM (CRITICAL PRIORITY)】\n\nThe subject is an adult female whose facial features and bone structure must 100% perfectly match the provided FACE_REF image. Eye spacing, nose bridge, jawline, and cheekbone structure must be exact; no identity drift is allowed. Skin texture must be photorealistic, showing pores and fine details—do not over-smooth or apply an Instagram filter look.\n\n【PHOTOGRAPHY & CINEMATOGRAPHY】\n\nA high-end editorial fashion photograph with a cinematic quality, rivaling covers of Vogue, Harper’s Bazaar, or ELLE.\n\nLens & Focus: Use an 85mm lens (for medium shot) or 50mm/70mm (for full body) with a shallow depth of field. The subject's eyes must be perfectly sharp.\n\nLighting: Natural winter daylight supplemented by soft, professional fill light. Gold ornaments and precious stones should have realistic specular highlights without being blown out. Embroidery textures must be incredibly sharp and tactile.\n\nColor Grading: Rich, cinematic colors. The red walls and the attire's main color must be distinct and clean, not muddy. The overall image should feel deep, textured, and expensive.\n\nComposition: A clean magazine cover layout with deliberate negative space at the top or sides for typography. No torn paper or hand-drawn effects.\n\n【SETTING: FORBIDDEN CITY WINTER】\n\nThe location is a red-walled long corridor in the Beijing Forbidden City.\n\nEnvironment: Visible details include vermilion walls, red pillars, intricate carved windows, and painted wooden beams with strong perspective depth. The scene must be clean: no tourists, modern signs, or watermarks.\n\nWeather Condition (Selected Randomly):\n\n[If Snowfall selected]: Fine snowflakes are gently falling.\n\n[If Post-Snow selected]: The air is crisp and clear, with remnant snow on the eaves and steps.\n\n【WARDROBE: MING DYNASTY HEAVY INDUSTRY COUTURE】\n\nThe subject wears opulent, multi-layered Ming Dynasty ceremonial Hanfu. The aesthetic is gold-heavy, dense tassels, phoenix crown, large-area woven gold embroidery, complex layering, dignified and luxurious.\n\nStructure: A visible, crisp white standing inner collar provides a clean boundary. Over this is a structured duijin ao (jacket) with wide sleeves, topped by a heavy xiapei/pibo (stole) structure held by a large central yajin ornament.\n\nFabric & Craft: The main fabric is real zhijin jin (woven gold brocade) with palpable fiber texture. The embroidery is heavy industry—using panjin goldwork, couched gold", "prompt_preview": "Aspect Ratio: 9:16 Vertical\n\n【IDENTITY & REALISM (CRITICAL PRIORITY)】\n\nThe subject is an adult female whose facial features and bone structure must 100% perfectly match the provided FACE_REF image. Ey"}, {"id": "62", "title": "超现实日本未来主义城市插图", "title_en": "Surreal Japanese Futuristic City Illustration", "category": "模型对比案例", "img": "images/case_case102/output.jpg", "prompt": "参考这张图的透视和风格，绘制一张更加精细的超高清插画，表现超现实主义的日式未来都市，要能看清很小的细节，包括街道上的传统文化游行的人，小巷里的黑帮，烟花巷的舞女，疲惫的社畜，楼房的窗户里也有各式各样的人物，学习的学生，吵架的夫妻，玩游戏的宅男，以及更多的发挥细节。讽刺现实拥挤中的无聊，都市繁华下的孤独，无意义的人生中又有一种病态的美感。画面要有极高的审美价值 ，不能因为拼内容而损失美和协调感，比例是9:16", "prompt_preview": "参考这张图的透视和风格，绘制一张更加精细的超高清插画，表现超现实主义的日式未来都市，要能看清很小的细节，包括街道上的传统文化游行的人，小巷里的黑帮，烟花巷的舞女，疲惫的社畜，楼房的窗户里也有各式各样的人物，学习的学生，吵架的夫妻，玩游戏的宅男，以及更多的发挥细节。讽刺现实拥挤中的无聊，都市繁华下的孤独，无意义的人生中又有一种病态的美感。画面要有极高的审美价值 ，不能因为拼内容而损失美和协调感，比例"}, {"id": "63", "title": "杭州西湖旅游海报", "title_en": "Hangzhou West Lake Travel Poster", "category": "海报与插画案例", "img": "images/poster_case87/output.jpg", "prompt": "帮我生成一个介绍杭州西湖的海报", "prompt_preview": "帮我生成一个介绍杭州西湖的海报"}, {"id": "63", "title": "Tushan Yaya幻想魅力肖像摄影", "title_en": "Tushan Yaya Fan
