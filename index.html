te black, massive yellow steel I-beams crossing the ceiling horizontally, concrete floor sealed in high-gloss black epoxy with the BVB09 crest inlaid in signal yellow resin at center, glowing from LED underlighting.\n\nBack wall: the entire wall is a recreation of the Gelbe Wand the Yellow Wall standing terrace at Signal Iduna Park a full-width photorealistic mural of 81,000 fans in yellow and black holding a massive tifo, receding into the distance, backlit from behind the wall to create depth and glow.\nIn front of the mural: a raised steel platform with a \nblack steel railing like a stadium terrace edge.\n\nLeft wall: raw black steel display wall — welded steel frame shadow boxes containing Bundesliga trophies, DFB-Pokal cups, Champions League runners-up plates in industrial mounts, all under harsh yellow spotlights. Between display boxes: \nBVB yellow jerseys framed in welded black steel frames, \nno names visible.\n\nCenter: two enormous black leather industrial recliners \nfacing a massive curved screen showing match footage \nunder Yellow Wall atmosphere, signal yellow cup holders built into the armrests.\nRight wall: black steel bar unit with yellow LED backlit shelving, yellow and black branded glassware, industrial pipe bar rail, three black steel bar stools with yellow leather seats.\n\nFloor detail: yellow painted hazard stripes along the \nperimeter of the room, like factory safety markings, \nadding to the industrial authenticity.\n\nCeiling: cluster of oversized industrial pendant lights \nin matte black steel with signal yellow interior, \ncasting pools of sharp yellow light across the black epoxy floor.\n\nWindow: steel-framed industrial window showing Signal Iduna Park stadium exterior at night, yellow exterior lights glowing through the Ruhr Valley fog.\n\nAtmosphere: raw industrial power, signal yellow burning against matte black, steel and concrete and light — the most intensecolour contrast of all twelve rooms. Photorealistic, 35mm, cinematic.", "prompt_preview": "Photorealistic interior render, ultra-luxury industrial football war room and man cave, wide vertical 9:16. Borussia Dortmund signal yellow and black palette throughout.\n\nArchitecture: the room feels "}, {"id": "277", "title": "卡哇伊穆斯林咖啡馆", "title_en": "Kawaii Muslim Cafe Scene", "category": "海报与插画案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/poster_case277/output.jpg", "prompt": "Cute kawaii-style lifestyle photography, adorable chibi-inspired Muslim characters with soft rounded faces and blush cheeks, pastel aesthetic cafe environment, cozy playful atmosphere, ultra soft lighting, handmade paper-cutout illustration effect mixed with realistic photography, pastel blue, cream, pink, and beige color palette, whimsical interior design, toy-store aesthetic, cozy Korean cafe vibes, oversized cute props like giant ice cream decorations and pastel foam blocks, soft textured surfaces, minimal shadows, dreamy mood, wholesome friendship energy, aesthetic Instagram composition, highly detailed clothing fabrics, modest fashion with hijab styling, cute cartoon proportions, cozy storytelling scene, soft matte textures, handcrafted diorama look, warm emotional atmosphere, clean composition, adorable character expressions, Japanese kawaii aesthetic mixed with modern lifestyle photography, ultra detailed, playful and comforting vibe, Pinterest trending style, soft focus depth of field, pastel cinematic color grading, 8k.\n\nScene Variations:", "prompt_preview": "Cute kawaii-style lifestyle photography, adorable chibi-inspired Muslim characters with soft rounded faces and blush cheeks, pastel aesthetic cafe environment, cozy playful atmosphere, ultra soft ligh"}, {"id": "278", "title": "马拉喀什水彩旅行海报", "title_en": "Marrakech Watercolor Travel Poster", "category": "海报与插画案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/poster_case278/output.jpg", "prompt": "Vintage watercolor travel poster of Marrakech, Morocco with a warm beige textured background. Top features ornate Islamic geometric motif, text 'WELCOME TO MARRAKECH' in large serif terracotta font, subtitle 'WHERE TRADITION INSPIRES EVERY JOURNEY' with decorative diamond dividers. \n\nForeground shows a cozy rooftop café scene: wrought iron table and chair with mosaic top, Moroccan teapot and glass of tea, chalkboard sign reading 'EXPLORE THE COLORS OF MOROCCO' with a hand-drawn sketch of a Moroccan gate and palm tree below. Include a hanging black sign 'CAFÉ DE LA MÉDINA', potted cactus, ceramic vases, a lantern, and a colorful Berber rug draped over a stone wall.\n\nBackground depicts the Medina skyline with terracotta buildings, palm trees, the Koutoubia Mosque minaret, market stalls with umbrellas, crowds, and the Atlas Mountains in the distance under a soft sky with birds. Bougainvillea flowers and vines frame the left side. \n\nBottom center has a palm tree icon with text 'MOROCCO' and small decorative motifs. Soft watercolor style, warm earthy tones, nostalgic travel poster aesthetic, vertical 2:3 aspect ratio.\"", "prompt_preview": "Vintage watercolor travel poster of Marrakech, Morocco with a warm beige textured background. Top features ornate Islamic geometric motif, text 'WELCOME TO MARRAKECH' in large serif terracotta font, s"}, {"id": "279", "title": "复古旅行海报拼贴", "title_en": "Retro Travel Poster Collage", "category": "海报与插画案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/poster_case279/output.jpg", "prompt": "Generate a retro travel poster collage style main visual for \"[Country Name] TRAVEL POSTERS\".\n\nOverall Layout:\n\nAntique beige paper background\n\nLarge, bold country names at the top (e.g., JAPAN / ITALY / FRANCE)\n\nCentral Subheading:\n\n“TRAVEL POSTERS FROM AROUND THE WORLD.”\n\n“CREATED ENTIRELY WITH CHATGPT USING JUST ONE PROMPT.”\n\nBottom: 2x3 six-grid poster layout\n\nEach grid represents a different city/region\n\nThin white borders between posters\n\nOverall resembling a high-end retro travel magazine cover + Midcentury travel poster design\n\nVisual Style:\n\nScandinavian Travel Poster\n\nMidcentury Modern\n\nVintage Editorial Design\n\nRetro Tourism Advertisement\n\nHigh-end minimalist typography\n\nWarm golden sunset lighting\n\nAntique printing texture\n\nCinematic lighting\n\nNo cartoonish feel\n\nHigh resolution\n\nExquisite details\n\nSoft retro color tones (beige, caramel, amber gold, dark brown)\n\nTypography heavy design\n\nCinematic composition\n\nPoster layout Aesthetic\n\nEach poster panel must include:\n\nCity name in English (extra large font)\n\nCountry name\n\nSmall slogan\n\nCoordinate numbers\n\nMinimalist icon\n\nRepresentative local landmark\n\nRetro travel poster composition\n\nPlease generate the following six city themes:\n\n1. [City 1] — [Representative attractions/atmosphere]\n\n2. [City 2] — [Representative attractions/atmosphere]\n\n3. [City 3] — [Representative attractions/atmosphere]\n\n4. [City 4] — [Representative attractions/atmosphere]\n\n5. [City 5] — [Representative attractions/atmosphere]\n\n6. [City 6] — [Representative attractions/atmosphere]\n\nAll text must be in English.\n\nThe overall style should resemble:\nhighend vintage travel advertisement poster,\neditorial layout design,\nretro tourism campaign,\nluxury magazine aesthetic,\nwarm cinematic sunset lighting,\nultra detailed,\n8k,\nclean typography,\nmuseum poster quality.", "prompt_preview": "Generate a retro travel poster collage style main visual for \"[Country Name] TRAVEL POSTERS\".\n\nOverall Layout:\n\nAntique beige paper background\n\nLarge, bold country names at the top (e.g., JAPAN / ITAL"}, {"id": "280", "title": "宁静城市旅游插画", "title_en": "Serene City Travel Illustration", "category": "海报与插画案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/poster_case280/output.jpg", "prompt": "[CITY] = Seoul\n[COUNTRY] = South Korea\n[LANDMARK] = a recognizable landmark or scenic element of [CITY]\n\nCreate a serene architectural travel illustration inspired by [CITY], [COUNTRY], in a soft hand-drawn watercolor and ink style.\n\nMain concept:\nShow a quiet, charming street-side house or small building inspired by the everyday atmosphere of [CITY], [COUNTRY], while subtly incorporating [LANDMARK] in the composition.\nThe landmark should appear naturally in the background, distance, or surrounding scenery, so the image clearly feels connected to [CITY], [COUNTRY] without losing the calm residential mood.\n\nVisual style:\ndelicate hand-drawn architectural illustration,\nsoft watercolor washes,\nthin ink outlines,\nslightly imperfect sketch lines,\nwarm sunlit atmosphere,\ngentle pastel palette,\nsubtle paper texture,\nquiet travel sketchbook aesthetic,\nminimal yet detailed composition,\ncalm editorial illustration mood,\npoetic everyday scenery,\ncozy and refined visual tone,\nno photorealism,\nno harsh contrast,\nno saturated colors,\nno dramatic lighting.\n\nScene:\nA peaceful small house, café, studio, or local building with simple walls, a tiled or regionally inspired roof, painted doors or windows, and several potted plants arranged naturally in front.\nInclude subtle local architectural details and everyday design elements that feel authentic to [CITY], [COUNTRY].\nIncorporate [LANDMARK] as a softly integrated city symbol — for example, visible above rooftops, in the distance, or as part of the surrounding skyline or landscape.\nThe overall scene should feel quiet, elegant, warm, and locally rooted.\n\nComposition:\nlandscape travel-poster format,\nwide horizontal layout,\nlarge open sky occupying the upper half or upper-left area,\nmain building placed across the lower portion of the composition,\nbalanced negative space,\nfront-facing or slightly angled composition,\npotted plants and small objects along the base,\nlandmark subtly placed in the background or upper distance,\nclean and spacious layout,\nminimal but emotionally rich composition.\n\nTypography:\nInclude the city name “[CITY]” clearly in the image.\nRender “[CITY]” as elegant travel-poster typography, large but refined, placed prominently in the sky area or upper portion of the composition.\nOptionally include “[COUNTRY]” in smaller text beneath or near the city name.\nThe text should feel integrated into the poster design, not like a random overlay.\nUse clean, tasteful lettering that matches the calm watercolor travel-poster mood.\n\nColor palette:\npale sky blue,\nwarm cream,\nterracotta,\nmuted blue accents,\nolive and soft green,\nlight earthy browns,\nsoft natural neutrals.\n\nTexture:\nvisible watercolor paper grain,\ntransparent paint layering,\nsoft handmade brush texture,\ngentle ink-and-wash finish.\n\nMood:\npeaceful,\nsunny,\nquiet,\nnostalgic,\ncozy,\nrefined,\npoetic,\ncalm everyday travel atmosphere.\n\nImportant:\nThe image should express both the intimate charm of a local building and the identity of [CITY], [COUNTRY] through the inclusion of [LANDMARK].\nDo not make the landmark too dominant; it should support the mood rather than overpower the house scene.\nThe city name “[CITY]” must be visible and clearly readable in the final image.\n\nAspect ratio: 4:3 or 3:2\n\nCreator: @hermes_agent_kr on Threads", "prompt_preview": "[CITY] = Seoul\n[COUNTRY] = South Korea\n[LANDMARK] = a recognizable landmark or scenic element of [CITY]\n\nCreate a serene architectural travel illustration inspired by [CITY], [COUNTRY], in a soft hand"}, {"id": "281", "title": "2026年水彩日历海报", "title_en": "Watercolor 2026 Calendar Poster", "category": "海报与插画案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/poster_case281/output.jpg", "prompt": "使用上传的第一张图作为【整体风格与版式参考】，使用上传的第二张图作为【人物身份参考】。\n\n请生成一张完整的 2026 年全年日历插画海报。\n\n画面风格：\n保留参考图一的手绘水彩插画风格，温暖米白纸张背景，细腻墨线勾勒，柔和水彩晕染，轻微纸张纹理，带有季节感的小装饰元素，如花草、雪花、爱心、纸飞机、星星、云朵、树叶、相机、书本、咖啡杯、礼物、圣诞树等。整体氛围温柔、治愈、干净、生活感强，像一本手账风全年日历。\n\n版式要求：\n采用 3 列 × 4 行的全年月历排版，共 12 个月份。\n顶部居中写大标题：“2026”，使用手写感黑色笔刷字体。\n每个月份标题格式为：\n“01 January”\n“02 February”\n“03 March”\n一直到\n“12 December”。\n\n每个月份区域都包含：\n1. 月份英文标题\n2. 小型日历日期表\n3. 一位人物插画\n4. 对应季节的小场景装饰\n\n人物要求：\n将参考图一中的男性人物全部替换为参考图二中的女性人物。\n保持参考图二人物的核心特征：\n年轻亚洲女性，长棕黑色头发，空气刘海，戴细框眼镜，五官精致，表情温柔自然，略带安静、微醺、慵懒感。\n\n人物服装参考：\n宽松白色衬衫，黑色内搭，黑色短裙，黑色丝袜，黑色鞋子，细项链或 choker。\n服装需要融入手绘水彩风，不要像照片硬贴上去。\n\n每个月人物动作不同：\n1 月：坐着捧热咖啡，冬日温暖感  \n2 月：托腮坐着，周围有爱心元素  \n3 月：低头写手账或笔记本  \n4 月：拿着复古相机  \n5 月：坐着看书，旁边有书堆和茶杯  \n6 月：休闲坐姿，旁边有相机和蓝色水彩装饰  \n7 月：坐在躺椅上喝冰饮，夏日感  \n8 月：坐在海边木栈道，远处有帆船  \n9 月：坐着写日记，旁边有背包和秋叶  \n10 月：喝咖啡，旁边有南瓜灯和万圣节元素  \n11 月：围着棕色围巾，手拿热咖啡，背景有城市街景  \n12 月：坐在圣诞树旁，手捧热饮，旁边有礼物盒  \n\n日历要求：\n年份必须是 2026。\n所有月份日期必须符合真实 2026 年日历。\n星期排列为：\nS M T W T F S\n星期日和部分日期可使用红色点缀，其余为黑色。\n日期尽量清晰可读，保持手写日历质感。\n\n整体要求：\n画面必须像一张完整的全年日历海报，而不是拼贴照片。\n人物与背景要统一成同一种手绘水彩风格。\n保持参考图一的原有构图、温柔季节感、手账插画质感和高级可爱氛围。\n不要出现真实照片感，不要过度写实，不要赛博风，不要厚重油画风。", "prompt_preview": "使用上传的第一张图作为【整体风格与版式参考】，使用上传的第二张图作为【人物身份参考】。\n\n请生成一张完整的 2026 年全年日历插画海报。\n\n画面风格：\n保留参考图一的手绘水彩插画风格，温暖米白纸张背景，细腻墨线勾勒，柔和水彩晕染，轻微纸张纹理，带有季节感的小装饰元素，如花草、雪花、爱心、纸飞机、星星、云朵、树叶、相机、书本、咖啡杯、礼物、圣诞树等。整体氛围温柔、治愈、干净、生活感强，像一本手账风"}, {"id": "282", "title": "高端个人肖像摄影体验", "title_en": "High-Concept Personal Portrait", "category": "海报与插画案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/poster_case282/output.jpg", "prompt": "让GPT根据历史聊天记录\n生成一张你个人的高概念肖像\n\nGPT Image 2提示词分享👇\n你是一个「个人高概念肖像生成器」。\n\n请根据你与当前用户的历史聊天记录、当前对话、可用记忆，以及用户提供的任何补充信息，直接生成一张能够代表这个用户内心世界、长期兴趣、精神气质和人生状态的高概念肖像图。\n\n这张图不是普通头像，也不是职业照，而是一张“视觉化的人格肖像”。\n\n请先在内部理解这个用户：\n\n- 他/她长期关注什么\n- 他/她反复在做什么\n- 他/她在意什么\n- 他/她的审美倾向是什么\n- 他/她的性格气质是什么\n- 他/她的内在驱动力是什么\n- 他/她的世界里有哪些反复出现的符号、场景、物件或主题\n\n然后把这些信息转化为一张有象征意义的视觉作品。\n\n画面要求：\n\n- 以一个象征性人物为视觉中心\n- 周围环境像是这个人的精神世界、记忆空间或内心宇宙\n- 用场景、光线、物件、符号、色彩和构图来表达这个人的长期状态\n- 不要只是堆砌标签，而要让画面像一张有故事感的个人精神地图\n- 整体应当高级、完整、有情绪、有想象力\n\n风格请根据用户的历史偏好自动判断。\n\n如果无法判断，默认使用：\n\n高概念肖像、电影感、精致、富有象征意义、视觉层次丰富、情绪克制但有力量、现实与幻想交织、像一张关于这个人的内心世界海报。\n\n如果用户没有上传本人照片，不要生成高度写实的真实本人脸，可以使用象征性人物、背影、侧脸、剪影或抽象化人物。\n\n如果用户上传了本人照片，并明确要求使用本人形象，请在保持人物身份特征的基础上进行高概念创作。\n\n不要输出分析。\n不要输出提示词。\n不要解释创作过程。\n直接生成图片。\n\n除非用户明确要求“输出提示词”“解释画面”“分析我是什么样的人”，否则只生成最终图像。", "prompt_preview": "让GPT根据历史聊天记录\n生成一张你个人的高概念肖像\n\nGPT Image 2提示词分享👇\n你是一个「个人高概念肖像生成器」。\n\n请根据你与当前用户的历史聊天记录、当前对话、可用记忆，以及用户提供的任何补充信息，直接生成一张能够代表这个用户内心世界、长期兴趣、精神气质和人生状态的高概念肖像图。\n\n这张图不是普通头像，也不是职业照，而是一张“视觉化的人格肖像”。\n\n请先在内部理解这个用户：\n\n- 他"}, {"id": "283", "title": "梦落琴弦幻想钢琴插画", "title_en": "梦落琴弦幻想钢琴插画", "category": "海报与插画案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/poster_case283/output.jpg", "prompt": "一位成年东方幻想系女性角色，梦幻唯美 3D CG 高精度渲染风格，9:16 竖版构图，坐在一架黑色三角钢琴前安静弹奏钢琴。画面氛围像高级幻想电影海报，柔和、浪漫、空灵、精致。\n\n人物位于画面右侧偏中位置，身体呈优雅的侧坐姿，腰部自然收束，肩颈线条柔和舒展，坐姿形成明显但自然的 S 型曲线。人物身材丰腴柔美，体态成熟健康，胸腰臀比例自然饱满，整体展现高级克制的女性美，可以看到胸部上半部分轮廓，以优雅、柔软、梦幻的气质为主。 \n\n她拥有精致柔和的东方幻想系五官，白皙通透的肌肤，肤质细腻，带有柔和的次表面散射光感。神情安静、温柔、专注，微微低头看向钢琴琴键，眼神沉静而梦幻。她拥有银白色到淡紫色渐变的超长柔顺发丝，头发自然垂落在肩背与胸前，发丝轻盈细腻，带有柔雾高光。耳侧佩戴一朵蓝色梦幻花朵发饰，点缀细小金色耳坠。\n\n服装为浅蓝紫色幻想礼裙，轻薄纱质层叠材质，带有柔和透明感与星光微粒，肩部与手臂有飘逸薄纱袖，裙摆自然散开。服装贴合身体但保持高级克制，突出柔和的女性曲线与丰腴体态，不做过度暴露处理。衣料带有细腻珠光、淡蓝色冷光与轻微星尘质感。\n\n场景是一间昏暗而高级的古典音乐室，左侧是一架黑色高亮漆面三角钢琴，琴盖打开，钢琴表面反射窗光与紫色花瓣。钢琴键清晰可见，人物双手自然放在琴键上，手指修长优雅，正在弹奏。背景有高大的复古窗户，窗外透入柔和冷白晨光，室内带有轻微雾气、空气尘埃与梦幻光晕。\n\n画面中大量紫色花瓣在空气中缓慢飘落，前景与背景都有虚化花瓣，形成强烈的空间层次。整体色彩以黑色钢琴、银白长发、淡蓝紫礼裙、紫色花瓣、冷白窗光为主，氛围高级、梦幻、浪漫、安静。光影柔和，边缘带有淡淡蓝紫辉光，电影级景深，精致细节，高级幻想插画质感，超清晰，8K，high detail, cinematic lighting, soft focus, dreamy atmosphere, elegant fantasy, premium 3D CG render。", "prompt_preview": "一位成年东方幻想系女性角色，梦幻唯美 3D CG 高精度渲染风格，9:16 竖版构图，坐在一架黑色三角钢琴前安静弹奏钢琴。画面氛围像高级幻想电影海报，柔和、浪漫、空灵、精致。\n\n人物位于画面右侧偏中位置，身体呈优雅的侧坐姿，腰部自然收束，肩颈线条柔和舒展，坐姿形成明显但自然的 S 型曲线。人物身材丰腴柔美，体态成熟健康，胸腰臀比例自然饱满，整体展现高级克制的女性美，可以看到胸部上半部分轮廓，以优雅"}, {"id": "284", "title": "河边的咖啡女孩", "title_en": "Coffee Girl By the River", "category": "海报与插画案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/poster_case284/output.jpg", "prompt": "尝试一个固定模式的 gpt image 2  提示词结构,一个近景，一个中景\n\n生成一张图片：\n\n主体：一个端着咖啡的二次元女孩，正坐在河边，望着河里正在玩水的两只小狗\n场景：山谷里的一条小河，清空万里，天上飘着几片白云\n构图：中景，主体位于画面左侧，50mm 镜头，浅景深，背景轻微虚化\n光线：柔和的阳光从右上角照入\n风格：手绘线稿风格插画\n色彩：孔雀蓝、芥末黄、珊瑚粉、象牙白，简约而沉稳的配色方案\n细节：小河里的水流泛着阳光的反射\n氛围：温馨的日常氛围\n画质：简约而圆润的形态，保留墨水质感的粗犷线条\n避免：文字、水印、logo、畸形结构", "prompt_preview": "尝试一个固定模式的 gpt image 2  提示词结构,一个近景，一个中景\n\n生成一张图片：\n\n主体：一个端着咖啡的二次元女孩，正坐在河边，望着河里正在玩水的两只小狗\n场景：山谷里的一条小河，清空万里，天上飘着几片白云\n构图：中景，主体位于画面左侧，50mm 镜头，浅景深，背景轻微虚化\n光线：柔和的阳光从右上角照入\n风格：手绘线稿风格插画\n色彩：孔雀蓝、芥末黄、珊瑚粉、象牙白，简约而沉稳的配色方"}, {"id": "285", "title": "浮岛旅游海报", "title_en": "Floating Island Travel Poster", "category": "海报与插画案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/poster_case285/output.jpg", "prompt": "Create a premium 9:16 hyper-realistic travel-poster of [COUNTRY NAME] in the same style as a luxury editorial miniature-map diorama: show the country as a recognizable floating island map with dramatic cliff edges, crystal-clear water, soft clouds, and a pure white  background. Use a clean, elegant poster layout with large culturally appropriate typography for “[COUNTRY NAME]” at the top, using a font style inspired by the country’s identity, history, script, or visual culture, plus a short refi", "prompt_preview": "Create a premium 9:16 hyper-realistic travel-poster of [COUNTRY NAME] in the same style as a luxury editorial miniature-map diorama: show the country as a recognizable floating island map with dramati"}, {"id": "286", "title": "复古单色城市旅游海报", "title_en": "Vintage Monochrome City Travel Poster", "category": "海报与插画案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/poster_case286/output.jpg", "prompt": "Vintage monochrome city travel poster illustration, detailed urban sketch aesthetic, clean architectural line art mixed with soft watercolor shading, modern Southeast Asian city atmosphere, minimalist green-and-cream color palette, elegant travel poster typography, large bol const CATEGORIES = [{"name": "全部", "count": 495}, {"name": "海报与插画案例", "count": 161}, {"name": "人像与摄影案例", "count": 133}, {"name": "UI与社交媒体案例", "count": 80}, {"name": "模型对比案例", "count": 57}, {"name": "广告创意案例", "count": 31}, {"name": "电商案例", "count": 20}, {"name": "角色设计案例", "count": 13}];

const PER_PAGE = 12;
let currentCategory = '全部';
let currentSearch = '';
let currentPage = 1;
let currentData = ALL_CASES;

function init() {
  renderCatBar();
  filterData();
}

function renderCatBar() {
  const bar = document.getElementById('catBar');
  bar.innerHTML = CATEGORIES.map(c => 
    `<span class="cat-tab${c.name === currentCategory ? ' active' : ''}" 
           onclick="selectCategory('${c.name.replace('案例','')}')">${c.name.replace('案例','')} (${c.count})</span>`
  ).join('');
}

function selectCategory(name) {
  currentCategory = name;
  currentPage = 1;
  filterData();
  renderCatBar();
}

function showAllCategories() {
  currentCategory = '全部';
  currentPage = 1;
  document.getElementById('searchInput').value = '';
  currentSearch = '';
  filterData();
  renderCatBar();
}

function doSearch() {
  currentSearch = document.getElementById('searchInput').value.trim().toLowerCase();
  currentCategory = '全部';
  currentPage = 1;
  filterData();
  renderCatBar();
}

function filterData() {
  let data = ALL_CASES;
  if (currentCategory !== '全部') {
    data = data.filter(c => c.category.replace('案例','') === currentCategory);
  }
  if (currentSearch) {
    const q = currentSearch;
    data = data.filter(c => 
      c.title.toLowerCase().includes(q) || 
      c.title_en.toLowerCase().includes(q) ||
      c.category.toLowerCase().includes(q) ||
      c.prompt.toLowerCase().includes(q)
    );
  }
  currentData = data;
  document.getElementById('resultInfo').textContent = 
    `共 ${data.length} 个结果${currentSearch ? ' · 搜索: ' + currentSearch : ''}${currentCategory !== '全部' ? ' · ' + currentCategory : ''}`;
  renderGallery(data);
  renderPagination(data);
}

function renderGallery(data) {
  const gallery = document.getElementById('gallery');
  const start = (currentPage - 1) * PER_PAGE;
  const pageData = data.slice(start, start + PER_PAGE);
  
  if (pageData.length === 0) {
    gallery.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">没有找到匹配的提示词</div></div>';
    return;
  }
  
  gallery.innerHTML = pageData.map(c => {
    const hasImg = c.img.startsWith('images/');
    const imgHtml = hasImg 
      ? `<img class="card-img" src="${c.img}" loading="lazy" 
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const placeholder = `<div class="card-img-placeholder" style="${hasImg ? 'display:none' : 'display:flex'}">
      <span>图片暂缺</span>
    </div>`;
    
    return `<div class="card" onclick="openModal('${c.id}')">
      <div class="card-img-wrap">
        ${imgHtml}
        ${placeholder}
      </div>
      <div class="card-body">
        <div class="card-title">$escapeHtml(c.title)}</div>
        <div class="card-tags">
          <span class="card-tag">${c.category}</span>
        </div>
        <div class="card-desc">$escapeHtml(c.prompt_preview)}</div>
      </div>
    </div>`;
  }).join('');
}

function renderPagination(data) {
  const totalPages = Math.ceil(data.length / PER_PAGE);
  const pag = document.getElementById('pagination');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }
  
  let html = '';
  html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">上一页</button>`;
  
  const maxShow = 7;
  let startP = Math.max(1, currentPage - Math.floor(maxShow / 2));
  let endP = Math.min(totalPages, startP + maxShow - 1);
  if (endP - startP < maxShow - 1) startP = Math.max(1, endP - maxShow + 1);
  
  if (startP > 1) { html += `<button class="page-btn" onclick="goPage(1)">1</button>`; }
  if (startP > 2) { html += `<span class="page-info">...</span>`; }
  
  for (let i = startP; i <= endP; i++) {
    html += `<button class="page-btn${i === currentPage ? ' active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }
  
  if (endP < totalPages - 1) { html += `<span class="page-info">...</span>`; }
  if (endP < totalPages) { html += `<button class="page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`; }
  
  html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">下一页</button>`;
  pag.innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  filterData();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

let currentPromptCase = null;
function openModal(id) {
  const c = ALL_CASES.find(x => x.id === id);
  if (!c) return;
  currentPromptCase = c;
  document.getElementById('modalTitle').textContent = c.title;
  document.getElementById('modalImg').src = c.img;
  document.getElementById('modalMeta').innerHTML = 
    `<span class="modal-meta-tag">${c.category}</span>` +
    `<span class="modal-meta-tag">#${c.id}</span>`;
  document.getElementById('modalPrompt').textContent = c.prompt;
  document.getElementById('modalOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('show');
  document.body.style.overflow = '';
  currentPromptCase = null;
}

function copyPrompt() {
  if (!currentPromptCase) return;
  navigator.clipboard.writeText(currentPromptCase.prompt).then(() => {
    const btn = document.querySelector('.modal-copy button');
    btn.textContent = '已复制!';
    setTimeout(() => { btn.textContent = '复制提示词'; }, 1500);
  });
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
window.escapeHtml = escapeHtml;

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

init();
</script>
