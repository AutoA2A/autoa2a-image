净的白色标签，上面写着“BYREDO”、“BAL D'AFRIQUE”和“EAU DE PARFUM”。将瓶子直立放置在1块弧形的浅色风化浮木上，周围是覆盖前景和下部框架的1层浓郁绿苔的密集地毯。", "prompt_preview": "以温暖的泥土静物场景为中心的单个豪华香水瓶的高端编辑产品照片。该产品是一个透明的长方形玻璃瓶，装满金色琥珀色液体，顶部有一个光滑的圆形黑色瓶盖，前面有一个干净的白色标签，上面写着“BYREDO”、“BAL D'AFRIQUE”和“EAU DE PARFUM”。将瓶子直立放置在1块弧形的浅色风化浮木上，周围是覆盖前景和下部框架的1层浓郁绿苔的密集地毯。"}, {"id": "148", "title": "Heliotropic建筑委员会", "title_en": "Heliotropic Architecture Board", "category": "UI与社交媒体案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/ui_case148/output.jpg", "prompt": "16:9 autonomous kinetic architecture, the heliotropic tracking mechanics of [aerospace/solar tracking array] shaping an adaptive, luxury [outdoor architectural structure], sequence from [astronomical/solar path diagrams] to [robotic kinematic wireframes] to a programmable louvre abstraction to the final architectural installation, ai to infer smart-motor integration and weather-responsive materials utilizing [material 1] and [material 2], featuring time-lapse shadow projection diagrams, [aesthetic style] aesthetic, presentation layout: solar path charts at the top, robotic hinge details in the margins, stunning photorealistic architectural render below, [lighting style].  input: [deep space network satellite dish array], [smart kinetic patio pergola], [equatorial solar trajectory mapping], [multi-axis pivoting joint schematics], [photovoltaic-coated tinted glass], [extruded matte bronze aluminum], [contemporary silicon valley billionaire estate], [golden hour sunlight casting intricate geometric shadows]", "prompt_preview": "16:9 autonomous kinetic architecture, the heliotropic tracking mechanics of [aerospace/solar tracking array] shaping an adaptive, luxury [outdoor architectural structure], sequence from [astronomical/"}, {"id": "149", "title": "金色皮草编辑香水瓶", "title_en": "Editorial Perfume Bottle in Golden Fur", "category": "广告创意案例", "img": "images/poster_case149/output.jpg", "prompt": "一张奢华的编辑产品照片，单个香水瓶坐落在浓密的毛绒人造皮毛中，呈现出浓郁的金色焦糖和蜂蜜棕色调。将组合物置于一个透明的椭圆形玻璃瓶中，瓶中装有温暖的琥珀色液体，带有光滑的圆形黑色瓶盖和干净的白色矩形标签。标签文本的顶部应为{argument name = \"brand name\" default = \"BYREDO\"} ，中间应为{argument name = \"product name\" default = \"BAL D'AFRIQUE\"} large ，中间应为{argument name = \"product type\" de", "prompt_preview": "一张奢华的编辑产品照片，单个香水瓶坐落在浓密的毛绒人造皮毛中，呈现出浓郁的金色焦糖和蜂蜜棕色调。将组合物置于一个透明的椭圆形玻璃瓶中，瓶中装有温暖的琥珀色液体，带有光滑的圆形黑色瓶盖和干净的白色矩形标签。标签文本的顶部应为{argument name = \"brand name\" default = \"BYREDO\"} ，中间应为{argument name = \"product name\" de"}, {"id": "149", "title": "品牌标识指南委员会", "title_en": "Brand Identity Guideline Board", "category": "UI与社交媒体案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/ui_case149/output.jpg", "prompt": "Using the uploaded logo for (Brand name) generate a high-end, agency-grade brand identity system poster.\n\nOBJECTIVE\nCreate a complete, presentation-ready brand guideline board that looks like it was designed by a top branding studio. The result must feel commercial, realistic, and client-deliverable, not conceptual.\n\nINTELLIGENCE RULE (THIS IS WHAT YOU WERE MISSING)\nBefore designing, analyze the logo and infer:\n3 identity traits (based on analysis)\n\nCOLOR SYSTEM (SMART GENERATION)\nExtract palette from logo automatically\nInclude:\nPrimary colors (3–5)\nSecondary colors (3–5)\nAccent colors\n\nEach must show:\nHEX codes\nlabeled usage (primary / UI / highlight / background)\n\nAlso generate:\ngradients\ncolor combinations\ntonal variations\n\nTYPOGRAPHY SYSTEM (MATCH PERSONALITY)\nSelect typography style based on brand:\nluxury → elegant serif\ntech → geometric sans\nstreet → bold condensed\ncorporate → clean neutral sans\n\nShow:\nheadline / subheadline / body\nreal text examples (brand-relevant, not lorem ipsum)\nclear hierarchy\n\nVISUAL LANGUAGE\nDefine and visualize:\nimage style (editorial / lifestyle / futuristic / minimal)\nlighting (soft / dramatic / high contrast)\nmood (energetic / premium / calm / disruptive)\n\nShow:\n3–5 visual tiles\n\nBRAND APPLICATIONS (REALISM BOOST)\nGenerate consistent mockups:\npackaging or product\nwebsite hero\nmobile UI\n3 social media creatives\nbusiness card\nbillboard / ad\n\nAll must feel real-world usable.\n\nLAYOUT SYSTEM\ngrid system\nspacing scale (4pt / 8pt system)\n\nShow:\nUI components\ncards\nbuttons\nlayout examples\n\nICONOGRAPHY\n6–10 icons style derived from brand (rounded / sharp / minimal / filled)\n\nPATTERNS & ELEMENTS\nshapes derived from logo\nrepeating motifs\nbackground systems\n\nMICRO DETAILS (THIS CREATES “PREMIUM FEEL”)\nshadows\nreflections\ntextures\ndepth layering\n\nVISUAL STYLE CONTROL\nmodern editorial + system design hybrid\nstrong hierarchy\nlayered composition\ncontrolled spacing\n\nDENSITY RULE\nminimum 30–50 elements\nmix of macro + micro components\nno empty or filler space\n\nHARD RESTRICTIONS\nno placeholders\nno generic UI\nno inconsistent styles\nno random colors\n\nFINAL OUTPUT\nA high-end brand system poster that looks:\nBehance feature-worthy\nagency presentation-ready\nvisually consistent and detailed", "prompt_preview": "Using the uploaded logo for (Brand name) generate a high-end, agency-grade brand identity system poster.\n\nOBJECTIVE\nCreate a complete, presentation-ready brand guideline board that looks like it was d"}, {"id": "150", "title": "豪华微型迪拜城市模型", "title_en": "Luxury Miniature Dubai City Model", "category": "广告创意案例", "img": "images/poster_case150/output.jpg", "prompt": "{argument name = \"landmark tower\" default = \"Burj Khalifa\"}的超细节电影等距微型城市模型从方形建筑总体规划板的中心戏剧性地升起，在黑色背景上像一个豪华的城市规划模型。作品展示了一座占主导地位的超高银色摩天大楼，周围环绕着密集的现代高层塔楼、照明道路、桥梁和发光的温暖城市灯光。曲线绿松石蓝水上壮举", "prompt_preview": "{argument name = \"landmark tower\" default = \"Burj Khalifa\"}的超细节电影等距微型城市模型从方形建筑总体规划板的中心戏剧性地升起，在黑色背景上像一个豪华的城市规划模型。作品展示了一座占主导地位的超高银色摩天大楼，周围环绕着密集的现代高层塔楼、照明道路、桥梁和发光的温暖城市灯光。曲线绿松石蓝水上壮举"}, {"id": "150", "title": "2027年桌面日历插图", "title_en": "Illustrated 2027 Desktop Calendar", "category": "UI与社交媒体案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/ui_case150/output.jpg", "prompt": "use this reference photo to create a desktop calendar for January-December 2027. Format: A4 vertical. Features: Korean illustration style, distinct character features, natural expressions, full-body composition, dynamic poses, exquisite clothing details, hand-drawn doodle style, splatter brushstrokes, free lines, a mix of pastels and ink, comic sketch texture, simple white background, symbolic elements around the edges, strong atmosphere, high detail, high quality.", "prompt_preview": "use this reference photo to create a desktop calendar for January-December 2027. Format: A4 vertical. Features: Korean illustration style, distinct character features, natural expressions, full-body c"}, {"id": "151", "title": "电子商务主图-微型立体造型护肤广告", "title_en": "E-commerce Main Image - Miniature Diorama Skincare Advertisement", "category": "电商案例", "img": "images/poster_case151/output.jpg", "prompt": "超逼真的微型立体产品广告，采用奶油/米色超大型豪华护肤泵瓶“LUXEVEIL Skin Science – Radiance Nourishing Body Lotion” ，抛光金色泵顶，置于圆形平台上。穿着黄色工作服和白色安全帽的小雕像建筑工人围绕着瓶子爬上脚手架，用滚筒粉刷瓶子，操作塔式起重机，在工业水箱和管道附近工作，并卸下", "prompt_preview": "超逼真的微型立体产品广告，采用奶油/米色超大型豪华护肤泵瓶“LUXEVEIL Skin Science – Radiance Nourishing Body Lotion” ，抛光金色泵顶，置于圆形平台上。穿着黄色工作服和白色安全帽的小雕像建筑工人围绕着瓶子爬上脚手架，用滚筒粉刷瓶子，操作塔式起重机，在工业水箱和管道附近工作，并卸下"}, {"id": "151", "title": "Monoluxe汽车海报网格", "title_en": "Monoluxe Automotive Poster Grid", "category": "UI与社交媒体案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/ui_case151/output.jpg", "prompt": "Monoluxe Automotive Posters 🔥\n\nImages on ChatGPT by GPT image 2.\n\nPrompt⤵️\n\n\"A high-quality editorial automotive poster split into a 2x2 grid layout, each quadrant featuring one iconic car with a bold typographic name as the background. Top-left: Toyota Corolla AE86 in Cobalt Blue, side profile view, floating above its reflection, massive \"COROLLA\" text behind in matching blue tones, cobalt blue panel background, small detail inset photos of interior and headlights in the corner, editorial body copy below the car. Top-right: Volkswagen Beetle in golden yellow, side profile, \"BEETLE\" in massive serif bold letters behind it, warm golden yellow panel, vintage feel, small detail thumbnails of curved body panel and round taillights. Bottom-left: Honda Civic Type R in Championship Red, aggressive front-three-quarter angle, massive \"CIVIC TYPE R\" text melting into the dark red background, dramatic low-angle lighting, small thumbnail of front grille and wing spoiler. Bottom-right: Classic Mini Cooper in burnt orange/rust tone, side profile, \"MINI\" in oversized bold condensed font, amber-orange panel, detail thumbnails of door handle and round taillight cluster. All four panels have a dark bottom section with white serif editorial description text, small divider lines, and 2–3 small square detail photos. Overall layout: vertical 9:13 poster, magazine-editorial aesthetic, graphic design studio quality, automotive illustration meets print poster art. A subtle \"OzairAI\" text appears naturally engraved on one of the license plates in the Corolla panel. Ultra photorealistic, 8K, no text overlays, cinematic color grading.\"", "prompt_preview": "Monoluxe Automotive Posters 🔥\n\nImages on ChatGPT by GPT image 2.\n\nPrompt⤵️\n\n\"A high-quality editorial automotive poster split into a 2x2 grid layout, each quadrant featuring one iconic car with a bold"}, {"id": "152", "title": "电子商务主图-中国传统艺术和瓷器花瓶", "title_en": "E-commerce Main Image - Traditional Chinese Art and Porcelain Vases", "category": "电商案例", "img": "images/poster_case152/output.jpg", "prompt": "这条围巾的灵感来自“千里江山” ，周围环绕着王西蒙的蓝绿色景观，质地丝滑，灯光柔和。\n\n家族玫瑰瓷花瓶，杨贵妃夫人欣赏鲜花，牡丹和蝴蝶图案为皇家窑炉风格。", "prompt_preview": "这条围巾的灵感来自“千里江山” ，周围环绕着王西蒙的蓝绿色景观，质地丝滑，灯光柔和。\n\n家族玫瑰瓷花瓶，杨贵妃夫人欣赏鲜花，牡丹和蝴蝶图案为皇家窑炉风格。"}, {"id": "152", "title": "爆炸车辆视图", "title_en": "Exploded Vehicle View", "category": "UI与社交媒体案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/ui_case152/output.jpg", "prompt": "Create an ultra detailed exploded view of the iconic [vehicle name].\n[Vehicle] is suspended in mid-air with all mechanical parts separated and floating in perfect alignment, showing the full internal structure of the vehicle. White background", "prompt_preview": "Create an ultra detailed exploded view of the iconic [vehicle name].\n[Vehicle] is suspended in mid-air with all mechanical parts separated and floating in perfect alignment, showing the full internal "}, {"id": "153", "title": "电子商务主图-高级游戏主板工作室照片", "title_en": "E-commerce Main Image - Premium Gaming Motherboard Studio Shot", "category": "电商案例", "img": "images/poster_case153/output.jpg", "prompt": "高端爱好者ATX游戏主板产品照片，深色工作室背景，以从左下角向右上方倾斜的四分之三自上而下的视角显示。该板主要为哑光黑色和炮铜色，带有锋利的几何装甲板，拉丝金属纹理，以及蓝色、紫色和洋红色的微妙RGB边缘照明。采用裸露的现代英特尔风格CPU插座，靠近上部中心，右侧有4个黑色DIMM内存插槽，顶部和u上有大型VRM散热器", "prompt_preview": "高端爱好者ATX游戏主板产品照片，深色工作室背景，以从左下角向右上方倾斜的四分之三自上而下的视角显示。该板主要为哑光黑色和炮铜色，带有锋利的几何装甲板，拉丝金属纹理，以及蓝色、紫色和洋红色的微妙RGB边缘照明。采用裸露的现代英特尔风格CPU插座，靠近上部中心，右侧有4个黑色DIMM内存插槽，顶部和u上有大型VRM散热器"}, {"id": "153", "title": "男性发光分析海报", "title_en": "Male Glow-Up Analysis Poster", "category": "UI与社交媒体案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/ui_case153/output.jpg", "prompt": "I will upload a face photo/selfie.\n\nCreate an ULTRA PREMIUM AI MALE GLOW-UP ANALYSIS POSTER with a luxury fashion-tech aesthetic.\n\nIMPORTANT:\nThe uploaded face and identity must remain EXACTLY THE SAME.\n\nDo NOT change:\n- facial structure\n- eyes\n- nose\n- lips\n- jawline\n- skin tone\n- facial proportions\n- identity\n\nThe face should look 100% identical to the uploaded image.\n\nYou MAY enhance:\n- hairstyle\n- beard style\n- expression\n- outfit\n- lighting\n- posture\n- styling\n- background\n- overall attractiveness\n\nSTYLE:\nThe final result should look like:\n- a luxury grooming brand campaign\n- a futuristic men’s fashion magazine\n- a premium AI self-improvement dashboard\n- cinematic and extremely expensive\n\nNO basic infographic look.\nNO cheap AI poster style.\nNO cartoonish design.\n\nTHEME:\nUse a premium modern luxury aesthetic:\n- matte black\n- champagne gold\n- warm beige\n- silver accents\n- dark graphite\n- soft cinematic lighting\n\nAdd:\n- glassmorphism UI\n- floating premium panels\n- luxury typography\n- subtle reflections\n- realistic shadows\n- elegant spacing\n- premium composition\n\nCENTER SUBJECT:\n- Place the uploaded face in the center\n- Make him look like a high-status modern male model\n- Confident masculine expression\n- Attractive but realistic\n- Strong eye contact\n- Natural skin texture\n\nHAIRSTYLE SECTION:\nCreate premium hairstyle recommendations using the SAME FACE:\n- textured quiff\n- low taper\n- side part flow\n- modern messy hairstyle\n- clean slick back\n\nBEARD SECTION:\nUsing the SAME FACE:\n- light stubble\n- short boxed beard\n- clean shave\n- sharp jawline beard\n\nOUTFIT STYLE SECTION:\nCreate multiple premium outfit inspirations using the SAME FACE:\n- old money\n- smart casual\n- luxury streetwear\n- classy formal\n- monochrome black fit\n\nAll outfits should look:\n- tailored\n- masculine\n- expensive\n- editorial quality\n\nFACE ANALYSIS SECTION:\nInclude:\n- face shape\n- jawline analysis\n- facial harmony\n- symmetry\n- hairstyle compatibility\n- skin undertone\n- attractiveness strengths\n\nCOLOR PALETTE SECTION:\nShow best clothing colors:\n- black\n- cream\n- olive\n- navy\n- charcoal\n- white\n\nGLASSES SECTION:\nShow glasses/sunglasses styles that suit the face:\n- aviator\n- rectangle\n- wayfarer\n- round metal\n\nBEST ANGLES SECTION:\nCreate multiple mini portraits using the SAME FACE:\n- 3/4 angle\n- side profile\n- eye-level\n- slight down angle\n\nBACKGROUND:\nLuxury studio environment:\n- blurred city lights\n- elegant interior\n- premium fashion studio\n- cinematic depth\n- luxury apartment vibe\n\nTEXT STYLE:\nMinimal, clean, elegant.\nLooks like a premium fashion editorial mixed with AI analysis.\n\nQUALITY:\n- ultra realistic\n- hyper detailed\n- 8K\n- cinematic realism\n- luxury aesthetic\n- highly polished\n- visually addictive", "prompt_preview": "I will upload a face photo/selfie.\n\nCreate an ULTRA PREMIUM AI MALE GLOW-UP ANALYSIS POSTER with a luxury fashion-tech aesthetic.\n\nIMPORTANT:\nThe uploaded face and identity must remain EXACTLY THE SAM"}, {"id": "154", "title": "电子商务主图-优质谷物粉广告板", "title_en": "E-commerce Main Image - Premium Grain Powder Ad Board", "category": "电商案例", "img": "images/poster_case154/output.jpg", "prompt": "{\"type\":\"Chinese e-commerce product marketing board\",\"product\":{\"category\":\"instant grain powder drink\",\"brand\":\"五谷磨房\",\"name\":\"核桃芝麻黑豆粉\",\"packaging\":\"matte black retail box with gold Chinese typography and a large swirling bowl graphic on the front, plus individual black sachets inside\",\"net weight\":\"320g (32g×10袋)\"},\"style\":{\"overall\":\"premium dark food advertising layout\",\"color palette\":[\"black\",\"deep brown\",\"warm gold\",\"beige\",\"walnut brown\"],\"lighting\":\"dramatic studio lighting with glossy highlights and warm rim light\",\"mood\":\"luxurious, nourishing, healthy, appetizing\"},\"layout\":{\"format\":\"single tall composite board divided into 5 major sections plus a bottom storyboard table\",\"sections\":[{\"title\":\"主图/Main image\",\"position\":\"top-left\",\"count\":8,\"labels\":[\"五谷磨房\",\"核桃芝麻黑豆粉\",\"32g×10袋 独立包装\",\"五黑谷物\",\"香浓醇厚\",\"独立小袋\",\"即冲即饮\",\"product box and drink cup\"]},{\"title\":\"详情页/Details page\",\"position\":\"top-right\",\"count\":5,\"labels\":[\"黑芝麻\",\"黑豆\",\"黑米\",\"核桃\",\"谷物粉\"]},{\"title\":\"香浓细腻 顺滑好喝\",\"position\":\"mid-right\",\"count\":4,\"labels\":[\"一冲即饮 营养美味\",\"粉质细腻 Fine powder\",\"浓香醇厚 Rich & Smooth\",\"营养代餐 Nutritious\"]},{\"title\":\"冲泡方式 HOW TO MAKE\",\"position\":\"mid-left lower\",\"count\":3,\"labels\":[\"1 倒入一袋粉(32g)\",\"2 加入200ml 热水或牛奶\",\"3 搅拌均匀 即可享用\"]},{\"title\":\ ality\":\"ultra-detailed commercial design mockup, polished e-commerce key visual plus details page plus ad storyboard, 4K\"}", "prompt_preview": "{\"type\":\"Chinese e-commerce product marketing board\",\"product\":{\"category\":\"instant grain powder drink\",\"brand\":\"五谷磨房\",\"name\":\"核桃芝麻黑豆粉\",\"packaging\":\"matte black retail box with gold Chinese typography"}, {"id": "154", "title": "东京粉色时尚拼贴画", "title_en": "Tokyo Pink Fashion Collage", "category": "UI与社交媒体案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/ui_case154/output.jpg", "prompt": "GPT Image 2 on ChatGPT                         \n\nPrompt :\n\nCreate a premium 1:1 luxury fashion collage featuring the same stylish Japanese college girl in multiple cinematic portrait moments across one artistic composition. Blend ultra-realistic anime-inspired beauty with luxury editorial aesthetics. Include close-up beauty shots, candid walking moments, stylish classroom fashion, playful mirror selfies, rooftop sunset poses, and soft emotional expressions while maintaining identical character identity throughout. Use asymmetrical overlapping photo layers, torn magazine textures, glossy reflections, handwritten fashion notes, dreamy pink gradients, cinematic bloom lighting, and tiny  size integrated typography like “TOKYO PINK”, “ICON”, “YOUTH MODE”, and “LUXE GIRL”. Ultra detailed, cinematic, modern Japanese fashion campaign aesthetic, soft depth of field, premium social media advertisement style, 8K.", "prompt_preview": "GPT Image 2 on ChatGPT                         \n\nPrompt :\n\nCreate a premium 1:1 luxury fashion collage featuring the same stylish Japanese college girl in multiple cinematic portrait moments across on"}, {"id": "155", "title": "电子商务主图-耳塞电子商务信息图", "title_en": "E-commerce Main Image - Earbuds E-commerce Infographic", "category": "电商案例", "img": "images/poster_case155/output.jpg", "prompt": "“{argument name =\" product \"default =\" Apple Pods Pro 3 \"}”无线耳机的高影响力电子商务信息图。\n前景：一个极端的特写镜头，一只手拿着一个敞开的白色无线耳机充电盒朝向摄像头。 外壳内有两个时尚的白色耳机，带有黑色扬声器口音。 手机壳正面有一个小型发光绿色LED指示灯。 手部和表壳有轻微的微距镜头深度模糊，以实现真实感。\n\nMid-ground: A {argument name = \"model\" default = \"confident y", "prompt_preview": "“{argument name =\" product \"default =\" Apple Pods Pro 3 \"}”无线耳机的高影响力电子商务信息图。\n前景：一个极端的特写镜头，一只手拿着一个敞开的白色无线耳机充电盒朝向摄像头。 外壳内有两个时尚的白色耳机，带有黑色扬声器口音。 手机壳正面有一个小型发光绿色LED指示灯。 手部和表壳有轻微的微距镜头深度模糊，以实现真实感。\n\nMid-ground"}, {"id": "155", "title": "索尼相机参考信息图", "title_en": "Sony Camera Reference Infographic", "category": "UI与社交媒体案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/ui_case155/output.jpg", "prompt": "Create a premium square “reference-style photography equipment infographic” centered around a modern Sony mirrorless camera such as the {CAMERA_MODEL}, designed as a beautifully curated camera-engineering handbook page rather than a retail advertisement.\n\nThe composition should feel like a modern visual encyclopedia mixed with an elite photographer’s field guide and high-end editorial infographic system.\n\nVisual Direction:\n\n• 1:1 square composition\n• Dark premium studio-tech background with subtle photography-grid textures, optical schematics, and cinematic UI overlays\n• Elegant muted palette using matte black, graphite gray, titanium silver, warm orange accents, and subtle electric-blue highlights\n• Refined editorial typography hierarchy\n• Rounded modular information cards with clean spacing\n• Gentle realistic reflections and premium HUD-style dividers\n• Minimal professional photography iconography\n• Extremely detailed central camera render viewed in dramatic three-quarter perspective with studio lighting and shallow depth-of-field aesthetics\n• Thin precision annotation lines pointing toward camera hardware systems and imaging technologies\n• Clean, organized “knowledge-first” layout with high information density but breathable spacing\n\nMain Subject Presentation:\n\nA stunning ultra-detailed realistic render of the {CAMERA_MODEL} placed at the center, featuring premium magnesium-alloy body textures, realistic lens glass reflections, tactile control dials, advanced sensor detailing, cinematic lighting, and ultra-realistic photography gear presentation.\n\nSurround the camera with scientific and engineering callouts explaining:\n\n• full-frame image sensor\n• AI autofocus system\n• image stabilization technology\n• electronic viewfinder system\n• advanced video recording features\n• dual card-slot architecture\n• battery performance system\n• weather-sealed body design\n• lens ecosystem compatibility\n• wireless connectivity systems\n\nInclude modular infographic sections such as:\n\n• Camera Overview\n• Technical Specifications\n• Dimensions & Build\n• Sensor & Image Quality\n• Processor & Performance\n• Autofocus & Subject Tracking\n• Video Recording Features\n• Stabilization Technology\n• Shooting Modes & Burst Performance\n• Lens Ecosystem\n• Battery & Power System\n• Connectivity Features\n• Professional Workflow Integration\n• Included Accessories & Box Contents\n• “Top 5 Reasons to Choose” section\n• Ideal Photography & Filmmaking Use Cases\n\nAdd small premium visualization modules like:\n\n• sensor cutaway diagrams\n• autofocus coverage maps\n• stabilization system graphics\n• lens ecosystem displays\n• battery performance charts\n• video codec comparison tables\n• camera blueprint dimensions\n• menu/UI mockups\n• accessory ecosystem visuals\n• performance benchmark graphics\n\nStyle Keywords:\n\n“premium photography encyclopedia”\n“editorial camera handbook”\n“high-end photography infographic”\n“scientific imaging technology poster”\n“museum-quality camera reference page”\n“modular photography knowledge system”\n“clean cinematography editorial design”\n“ultra-detailed camera visualization”\n\nAvoid:\n\n• generic e-commerce advertisement aesthetics\n• cluttered tech layouts\n• unrealistic sci-fi hologram effects\n• cartoon camera styling\n• excessive cyberpunk neon overload\n• low-detail product renders\n\nThe final result should resemble a professionally published photography-equipment reference-book page created for photographers, cinematographers, content creators, camera collectors, engineers, and educational imaging archives.", "prompt_preview": "Create a premium square “reference-style photography equipment infographic” centered around a modern Sony mirrorless camera such as the {CAMERA_MODEL}, designed as a beautifully curated camera-enginee"}, {"id": "156", "title": "电子商务主图-环保T恤植物标签广告", "title_en": "E-commerce Main Image - Sustainable T-Shirt Plantable Tag Ad", "category": "电商案例", "img": "images/poster_case156/output.jpg", "prompt": "优质的环保时尚广告，作为精致的编辑产品照片拍摄。一件米白色或天然奶油色圆领T恤挂在光滑的木衣架上，挂着一个黑色金属钩，放在郁郁葱葱的绿叶和攀爬的藤蔓墙上。衣架脖子附近刻有一个小型简约品牌会标。衬衫从上半身向下到下摆的一部分，略微倾斜，柔软的自然褶皱和高品质的棉质质地。", "prompt_preview": "优质的环保时尚广告，作为精致的编辑产品照片拍摄。一件米白色或天然奶油色圆领T恤挂在光滑的木衣架上，挂着一个黑色金属钩，放在郁郁葱葱的绿叶和攀爬的藤蔓墙上。衣架脖子附近刻有一个小型简约品牌会标。衬衫从上半身向下到下摆的一部分，略微倾斜，柔软的自然褶皱和高品质的棉质质地。"}, {"id": "156", "title": "桌面设置审核信息图", "title_en": "Desk Setup Audit Infographic", "category": "UI与社交媒体案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/ui_case156/output.jpg", "prompt": "Create a visual-first, editorial-style infographic auditing the desk setup in the attached photo. Show a side-by-side of current vs. optimized setup with annotations on monitor height, chair position, lighting, cable management, and clutter. Rate each issue with symbols like Top Fix, (working), (acceptable), (costing energy), and (actively hurting), tying each to a consequence like back pain, eye strain, or focus loss. Rank fixes by impact and group them into free fixes, under $50, and worth the investment. Include a Focus Forecast gauge predicting daily deep work hours possible with the current setup vs. after the top 3 fixes. Keep it clean, minimal text, no paragraphs.", "prompt_preview": "Create a visual-first, editorial-style infographic auditing the desk setup in the attached photo. Show a side-by-side of current vs. optimized setup with annotations on monitor height, chair position,"}, {"id": "157", "title": "电商主图-优雅美妆海报提示", "title_en": "E-commerce Main Image - Elegant Cosmetic Poster Prompt", "category": "电商案例", "img": "images/poster_case157/output.jpg", "prompt": "{argument name = \"reference style\" default = \"similar style\"}中的图像， {argument name = \"product\" default = \"lipstick\"}的产品图像，需要颜色协调和{argument name = \"style\" default = \"poster style\"}中的宏伟美学，语言更改为简体中文。", "prompt_preview": "{argument name = \"reference style\" default = \"similar style\"}中的图像， {argument name = \"product\" default = \"lipstick\"}的产品图像，需要颜色协调和{argument name = \"style\" default = \"poster style\"}中的宏伟美学，语言更改为简体中文。"}, {"id": "157", "title": "乡村体育信息图", "title_en": "Country Sports Infographic", "category": "UI与社交媒体案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/ui_case157/output.jpg", "prompt": "Create a premium editorial infographic in a high-end magazine style about [COUNTRY]’s most iconic national [SPORT]\n\nUse a sophisticated dark navy blue, beige, and warm gold color palette with clean minimalist typography and subtle grid lines.\n\nLayout structure (perfectly balanced, cinematic composition for vertical format):\n\n- Central large hero image: A hyper-realistic, cinematic golden-hour photograph of [SPORT] in action — [detailed action scene description with iconic player or moment, stadium/venue, national colors, dramatic lighting], extremely detailed, National Geographic level photography, 8k resolution. The image should be vertically oriented and fill the central space beautifully.\n\n- Top banner: Elegant title “[COUNTRY]’s National Passion: [SPORT]” in bold modern serif font with the [COUNTRY] flag subtly integrated.\n\nFour structured content panels surrounding the central image in a clean vertical asymmetrical grid:\n\n1. History & Origins (above center): Short paragraph on [brief history: when introduced, key milestones, how it became national obsession]. Include 1–2 small historical icons or timeline markers.\n\n2. Legendary Athletes (upper right or below top banner): [Athlete 1], [Athlete 2], [Athlete 3], [Athlete 4] — small portrait thumbnails with key achievements and one signature quote or record each.\n\n3. Key Statistics (below central image, left side): Clean infographic-style stats in bold numbers:\n   - [Stat 1]\n   - [Stat 2]\n   - [Stat 3]\n   - [Stat 4]\n   Use small relevant icons (trophy, stadium, crowd, sport-specific items, etc.).\n\n4. Cultural Significance (below central image, right side): [How the sport shapes national identity, traditions, rivalries, daily life, and culture]. Include 1–2 small cultural photos or symbols.\n\nDesign rules:\n- Luxurious editorial magazine aesthetic (think National Geographic × Kinfolk × Bloomberg Businessweek)\n- Thin gold accent lines, subtle shadows, generous white space\n- Small [COUNTRY] flag in the top-right corner\n- Professional sans-serif body text, elegant serif headings\n- Overall ultra-clean, balanced, premium feel with cinematic depth and rich texture\n- Aspect ratio 9:16 (vertical, mobile-friendly), ultra-high detail, no text distortion, sharp typography", "prompt_preview": "Create a premium editorial infographic in a high-end magazine style about [COUNTRY]’s most iconic national [SPORT]\n\nUse a sophisticated dark navy blue, beige, and warm gold color palette with clean mi"}, {"id": "158", "title": "电子商务主图-简约产品广告：纯粹紧缩", "title_en": "E-commerce Main Image - Minimalist Product Ad: PURE CRUNCH", "category": "电商案例", "img": "images/poster_case158/output.jpg", "prompt": "一个简约的产品广告， {argument name = \"product\" default = \"fried chicken bucket\"}放在一个干净的白色讲台上。\n\n背景：软渐变（ {argument name = \"background gradient\" default = \"light cream to white\"} ） ，干净的工作室。\n\n照明：柔和的漫射，优质的苹果风格。\n\n排版（中间） ： “{argument name =\" headline \"default =\" PURE CRUNCH \"}”\n\n下面的小文字： “没什么额外的。只是完美。”\n\n款式：超级干净，编辑极简，高端品牌， 8K。", "prompt_preview": "一个简约的产品广告， {argument name = \"product\" default = \"fried chicken bucket\"}放在一个干净的白色讲台上。\n\n背景：软渐变（ {argument name = \"background gradient\" default = \"light cream to white\"} ） ，干净的工作室。\n\n照明：柔和的漫射，优质的苹果风格。\n\n排版"}, {"id": "158", "title": "模切贴纸插图", "title_en": "Die-Cut Sticker Illustration", "category": "UI与社交媒体案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/ui_case158/output.jpg", "prompt": "Transform the uploaded image into a premium die-cut sticker illustration while keeping the main subject fully recognizable. Remove or simplify the original background and cleanly isolate the primary subject. Add a thick soft cream or beige sticker border around the entire silhouette with a subtle realistic drop shadow to create a floating sticker effect. Preserve important textures and details while slightly stylizing the image with enhanced colors, cinematic contrast, and a polished editorial l", "prompt_preview": "Transform the uploaded image into a premium die-cut sticker illustration while keeping the main subject fully recognizable. Remove or simplify the original background and cleanly isolate the primary s"}, {"id": "159", "title": "电子商务主图-淡蓝色鳄鱼时尚广告", "title_en": "E-commerce Main Image - Pastel Blue Crocs Fashion Ad", "category": "电商案例", "img": "images/poster_case159/output.jpg", "prompt": "{argument name = \"brand name\" default = \"crocs\"}的高端工作室广告海报，采用单色柔和的蓝白色调色板，光滑的反光地板和柔和的天蓝色背景。背景由单词{argument name = \"headline text\" default = \"CROCS\"}主导，其巨大的粗体白色浓缩无衬线字母几乎横跨图像的整个高度。在右上角，添加小白色文本“Designed with ChatGPT”。特色3肩膀的成年女性", "prompt_preview": "{argument name = \"brand name\" default = \"crocs\"}的高端工作室广告海报，采用单色柔和的蓝白色调色板，光滑的反光地板和柔和的天蓝色背景。背景由单词{argument name = \"headline text\" default = \"CROCS\"}主导，其巨大的粗体白色浓缩无衬线字母几乎横跨图像的整个高度。在右上角，添加小白色文本“Designed wi"}, {"id": "159", "title": "Rider-Waite塔罗牌", "title_en": "Rider-Waite Tarot Card", "category": " product; 7) bottom-detail close-up showing the underside and anti-slip pads; 8) mood/lifestyle scene at night with the product on a desk, smoke rising, and ambient lamp light; 9) brand closing frame with the product as the hero plus Chinese marketing text. Add the overall header text “产品TVC分镜脚本(15秒 / 9:16竖屏 / 9宫格)” and a product subtitle naming it {argument name=\"product name\" default=\"青花瓷烟灰缸\"}. Give each of the 9 panels a Chinese scene title and timestamp, plus small descriptive Chinese copy beneath each image in the style of a professional commercial shot list. Use premium, realistic commercial photography throughout, consistent product identity, elegant Chinese aesthetic, and a clean high-end storyboard presentation.", "prompt_preview": "Using the provided reference image, transform the single casual product photo into a polished e-commerce TVC storyboard board for a {argument name=\"video duration\" default=\"15-second\"} ad in a {argume"}, {"id": "161", "title": "高级产品工作室镜头模板", "title_en": "Premium product studio shot template", "category": "电商案例", "img": "images/poster_case161/output.jpg", "prompt": "根据[BRAND REFERENCE]设计，为[BRAND]创建[PRODUCT]的高级产品工作室形象。显示[PRODUCT]漂浮在干净的浅灰色到柔和的白色渐变背景上，具有最低限度的高端技术美感。[PRODUCT]应该感觉时尚、现代、精致和优雅，并带有[LIGHTING COLOR]的微妙照明色调。使用四分之三的前角，使两个耳罩都清晰可见，并带有详细的工业设计元素。将[BRAND]名称清晰地包含在产品上", "prompt_preview": "根据[BRAND REFERENCE]设计，为[BRAND]创建[PRODUCT]的高级产品工作室形象。显示[PRODUCT]漂浮在干净的浅灰色到柔和的白色渐变背景上，具有最低限度的高端技术美感。[PRODUCT]应该感觉时尚、现代、精致和优雅，并带有[LIGHTING COLOR]的微妙照明色调。使用四分之三的前角，使两个耳罩都清晰可见，并带有详细的工业设计元素。将[BRAND]名称清晰地包含在"}, {"id": "161", "title": "亲子沟通不畅信息图", "title_en": "Parent-Child Miscommunication Infographic", "category": "海报与插画案例", "img": "images/poster_case161/output.jpg", "prompt": "{\"type\":\"Japanese infographic\",\"style\":\"simple, easy-to-understand flat vector diagram, clean white background, rounded light-gray outer frame, minimal pastel color palette, presentation-slide design, clear hierarchy, lots of whitespace, modern sans-serif Japanese typography\",\"canvas\":{\"aspect_ratio\":\"16:9\"},\"headline\":{\"text\":\"{argument name=\\\"headline text\\\" default=\\\"親子のすれ違いは、記録があるかないかで起こる\\\"}\",\"position\":\"top center\",\"size\":\"large bold black\"},\"layout\":{\"structure\":\"2 side-by-side rounded panels beneath the headline\",\"sections\":[{\"title\":\"記録がない場合(ズレる)\",\"position\":\"left\",\"count\":8,\"header_color\":\"muted blue-gray\",\"panel_border\":\"light gray\",\"labels\":[\"親の記憶\",\"子どもの記憶\",\"あのとき決まったよね\",\"まだ考えてたのに\",\"ズレが大きくなる\",\"志望校がコロコロ変わる\",\"理由が『なんとなく』\",\"言ってることが違う\",\"関係がギクシャク\",\"現実を見てほしい\",\"ちゃんと決めてほしい\",\"口を出しすぎると関係が悪くなる\"],\"contents\":{\"top_left\":{\"type\":\"parent icon with thought bubble\",\"icon_color\":\"blue\",\"caption\":\"親の記憶\",\"bubble_text\":\"あのとき\\n決まったよね\"},\"top_right\":{\"type\":\"child icon with thought bubble\",\"icon_color\":\"pink\",\"caption\":\"子どもの記憶\",\"bubble_text\":\"まだ考えてたのに\"},\"center\":{\"type\":\"horizontal double-headed arrow\",\"color\":\"blue-gray\"},\"bottom_center\":{\"type\":\"downward arrow leading to burst shape\",\"color\":\"light gray\",\"burst_text\":\"ズレが\\n大きくなる\"},\"bottom_left\":{\"type\":\"rounded note box\",\"bullet_count\":4,\"bullets\":[\"志望校がコロコロ変わる\",\"理由が『なんとなく』\",\"言ってることが違う\",\"関係がギクシャク\"]},\"bottom_right\":{\"type\":\"rounded note box\",\"bullet_count\":3,\"bullets\":[\"現実を見てほしい\",\"ちゃんと決めてほしい\",\"口を出しすぎると関係が悪くなる\"]}},{\"title\":\"記録がある場合(ズレにくい)\",\"position\":\"right\",\"count\":7,\"header_color\":\"mustard yellow\",\"panel_border\":\"light yellow\",\"labels\":[\"親の認識\",\"子どもの認識\",\"記録\"],\"contents\":{\"top_left\":{\"type\":\"parent icon with thought bubble containing document symbol\",\"icon_color\":\"blue\",\"caption\":\"親の認識\"},\"top_right\":{\"type\":\"child icon with thought bubble containing document symbol\",\"icon_color\":\"pink\",\"caption\":\"子どもの認識\"},\"center\":{\"type\":\"horizontal double-headed arrow\",\"color\":\"mustard yellow\"},\"bottom_center\":{\"type\":\"circular record icon with document symbol\" で完成された商業広告ポスターを自動生"}, {"id": "168", "title": "户外运动服装网格运动", "title_en": "Outdoor Sportswear Grid Campaign", "category": "海报与插画案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/poster_case168/output.jpg", "prompt": "A dynamic 2×2 grid collage of modern outdoor sportswear advertising posters, each panel representing a different adventure lifestyle brand. High-energy, editorial-style composition with bold typography and textured graphic design.\n\nTop-left panel:\nAthletic male model in a bright blue insulated winter jacket, black snow pants, gloves, and sunglasses, stepping forward in a snowy environment. Snow particles flying, dramatic motion. Background features rough blue paint brush strokes. Bold distressed typography reads: “NEVER STOP EXPLORING.” Additional small text: “Built for extremes.” High contrast, rugged winter exploration theme.\n\nTop-right panel:\nFit male hiker climbing rocky terrain, wearing an olive green shirt, black trekking pants, and a large black backpack with orange straps. Dust and debris kicking up from the ground. Background includes orange paint strokes and sketched mountain graphics. Bold text: “BUILT FOR HERE – INDIA TESTED.” Handwritten Hindi accents and arrows. Warm earthy tones.\n\nBottom-left panel:\nCalm outdoor scene with a male model sitting on a rock, wearing a green jacket, beanie, sunglasses, and hiking shoes. Minimal scenic mountain illustration in the background with soft green tones. Typography reads: “ESCAPE THE NOISE – JUST GO OUTSIDE.” Clean, relaxed, nature-focused aesthetic with subtle graphic elements.\n\nBottom-right panel:\nEnergetic female runner in motion wearing a purple athletic t-shirt, black shorts, and running shoes. Bright, playful background with purple and yellow paint splashes, doodles, arrows, and sun illustration. Bold typography: “READY FOR EVERYONE – START YOUR JOURNEY.” Youthful, vibrant fitness energy.\n\nOverall style:\n\nHigh-resolution, photorealistic sportswear campaign\n\nBold brushstroke textures and grunge overlays\n\nMixed typography: distressed, handwritten, and modern sans-serif\n\nStrong color blocking per panel (blue, orange, green, purple)\n\nDynamic poses conveying motion, strength, and adventure\n\nClean grid layout with balanced spacing\n\nCommercial advertising / brand campaign aesthetic (Nike, Decathlon style)\n\nLighting: Professional, cinematic lighting with sharp detail and contrast\nMood: Energetic, adventurous, motivational\nAspect ratio: 1:1 (square collage)", "prompt_preview": "A dynamic 2×2 grid collage of modern outdoor sportswear advertising posters, each panel representing a different adventure lifestyle brand. High-energy, editorial-style composition with bold typograph"}, {"id": "169", "title": "奢华巧克力活动系统", "title_en": "Luxury chocolate campaign system", "category": "广告创意案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/poster_case169/output.jpg", "prompt": "为一个名为Noirvelle Chocolat的虚构奢华巧克力品牌制作优质方形（ 1: 1 ）产品广告，灵感来自高端巧克力品牌。广告应该感觉像是一个高端的编辑活动，结合奢华美食摄影、精致的包装设计和电影照明。使用哑光黑色包装纸、微妙的金箔、优雅的衬线排版和逼真的产品渲染。生成风味变体，如Blood Orange Noir、Salted Pistachio Muse和Raspberry Ember ，", "prompt_preview": "为一个名为Noirvelle Chocolat的虚构奢华巧克力品牌制作优质方形（ 1: 1 ）产品广告，灵感来自高端巧克力品牌。广告应该感觉像是一个高端的编辑活动，结合奢华美食摄影、精致的包装设计和电影照明。使用哑光黑色包装纸、微妙的金箔、优雅的衬线排版和逼真的产品渲染。生成风味变体，如Blood Orange Noir、Salted Pistachio Muse和Raspberry Ember "}, {"id": "169", "title": "地形字母卫星面板", "title_en": "Topographic Letter Satellite Panels", "category": "海报与插画案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/poster_case169/output.jpg", "prompt": "Ultra-realistic satellite view from space, a clean modern editorial layout of 9 vertical panels arranged side-by-side on a white background, together forming the word \"MADPENCIL\", each panel containing one letter created entirely from natural Earth topography, no artificial text overlays:\n\nPanel 1 (M): rugged mountain ranges and deep valleys forming a sharp, angular \"M\", rocky textures, high elevation shadows\nPanel 2 (A): winding river cutting through dense green forest forming an organic \"A\", strong contrast between water and vegetation\nPanel 3 (D): desert dunes and wind-sculpted sand patterns shaping a smooth \"D\", warm tones, soft gradients\nPanel 4 (P): agricultural farmland grids and patchwork fields forming a structured \"P\", geometric patterns clearly visible\nPanel 5 (E): glacier and ice formations carving a crisp \"E\", bright whites and icy blues, fractured textures\nPanel 6 (N): braided river system across floodplains forming \"N\", branching channels with natural flow lines\nPanel 7 (C): coastal shoreline and ocean edge shaping a curved \"C\", waves and sediment gradients visible\nPanel 8 (I): narrow canyon or straight river cutting through terrain forming a minimal \"I\", strong vertical emphasis\nPanel 9 (L): volcanic terrain with lava flows forming an \"L\", dark rock with glowing red/orange lava accents\n\ntop-down satellite perspective, NASA Earth observation style, hyper-detailed textures, realistic geography, consistent scale and lighting across all panels, minimal clouds, high contrast, sharp focus, subtle atmospheric haze, natural color grading, ultra high resolution 8K, clean spacing between panels, modern gallery-style composition, visually cohesive but each panel distinctly different biome, letters clearly readable yet organically integrated into terrain", "prompt_preview": "Ultra-realistic satellite view from space, a clean modern editorial layout of 9 vertical panels arranged side-by-side on a white background, together forming the word \"MADPENCIL\", each panel containin"}, {"id": "170", "title": "城市果汁广告海报", "title_en": "Urban fruit juice ad poster", "category": "广告创意案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/poster_case170/output.jpg", "prompt": "制作一张高档现代饮料广告海报，采用垂直3: 高架公路、桥梁、螺旋楼梯、小人物、豪华广告牌、无人机、直升机和电影般的城市活动。", "prompt_preview": "以电影般的微型世界风格创作超细致的奢华广告海报。中央矗立着一条巨大的皇家钻石项链，饰有精致的金丝和巨大的红宝石，就像一座建筑纪念碑。项链周围环绕着珠宝首饰周围和内部建造的未来主义微型城市，包括摩天大楼、高架公路、桥梁、螺旋楼梯、小人物、豪华广告牌、无人机、直升机和电影般的城市活动。"}, {"id": "171", "title": "雨街金色肖像", "title_en": "Rainy Street Golden Portrait", "category": "人像与摄影案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/portrait_case171/output.jpg", "prompt": "Ultra-realistic cinematic street photography of a young man standing alone on a rainy urban sidewalk during golden hour sunset in Mumbai, India. He is leaning casually against a black metal roadside railing while looking down at his smartphone, wearing an oversized black hoodie, loose dark blue cargo jeans, and clean white sneakers. Messy textured black hair moving slightly in the wind. Moody introspective vibe.\n\nWide-angle composition with dramatic depth and strong leading lines from the wet pavement and railings. Reflective rain-soaked street surface glowing with warm sunset light. Vintage street lamps lining the sidewalk. Historic Gothic architecture inspired by Chhatrapati Shivaji Maharaj Terminus visible on the right side, detailed stone textures and clock tower. Modern skyscrapers fading into atmospheric haze in the distant background, creating a blend of old and new Mumbai cityscape.\n\nSoft cinematic clouds filling the sky with warm orange, peach, and golden tones. A flying bird silhouette crossing the sky. Light traffic with black-and-yellow taxis and blurred cars moving through the street. Realistic puddle reflections, subtle motion blur, volumetric lighting, atmospheric perspective, ultra-detailed textures, natural shadows, realistic skin tones.\n\nShot on Sony A7R IV, 35mm lens, f/1.8, shallow depth of field, HDR photography, photorealistic, cinematic color grading, warm highlights with cool shadows, highly detailed urban realism, editorial photography style, 8K ultra resolution.", "prompt_preview": "Ultra-realis o background, gritty texture details, cinematic shadows, and luxury music-magazine aesthetics inspired by modern fashion campaigns. Black-and-white high-contrast photography style, full-body composition, eye-level angle, 85mm lens, ultra-sharp detail, soft studio lighting with subtle grain, premium viral poster design optimized for fashion and music culture content.", "prompt_preview": "Use my uploaded image as the face reference.\n\nCreate a bold monochrome streetwear editorial poster featuring the uploaded person in oversized urban fashion, relaxed stance, hands in pockets, layered b"}, {"id": "183", "title": "Y2K街头服饰贴纸海报", "title_en": "Y2K Streetwear Sticker Poster", "category": "人像与摄影案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/portrait_case183/output.jpg", "prompt": "Use the uploaded portrait only as the identity and hairstyle reference. Accurately preserve the person’s real facial identity, face shape, facial features, skin tone, hairstyle outline, hair volume, and natural real-life appearance. Do not copy the original photo’s background, lighting, clothing, pose, or image quality. Do not turn the person into an anime character, doll, idol illustration, or plastic-looking AI face.\n\nCreate a highly realistic 9:16 vertical Y2K streetwear collage poster of the same person. The overall visual style should reference a neon graffiti magazine sticker-board layout: multiple cutout portraits of the same person arranged dynamically on one vertical poster, with thick white sticker outlines, subtle pink neon rim glow, layered photo frames, graffiti tags, doodles, spray-paint textures, black grunge background, electric pink and cyan accents, and a high-energy urban fashion poster feeling.\n\nThe poster should include several different shots of the same person in one composition: one central full-body standing pose, one half-body playful pose, one seated or crouching pose, one close-up portrait, and one cropped detail frame showing one eye or facial detail. Each pose should have a different angle, expression, and framing, but all must clearly look like the same real person from the uploaded portrait.\n\nGenerate suitable clothing automatically based on the uploaded person’s real appearance and style. The outfit should feel like stylish Y2K streetwear, possibly including denim, layered casual fashion, boots or sneakers, accessories, soft street-style details, and a coordinated youthful look. Do not lock the clothing to the reference image exactly. Choose clothes that fit the person naturally and look believable. Avoid overly revealing clothing.\n\nUse realistic photography texture: natural skin pores, real skin texture, soft uneven skin tone, natural lips, realistic hair strands, believable fabric wrinkles, correct body proportions, detailed denim or streetwear fabric, realistic hands, and real camera lighting. The person should feel like a real photographed person placed into a designed collage poster, not a 3D render or anime illustration.\n\nLighting should be cinematic but believable, with soft neon pink and cyan reflections, subtle rim light around the cutout edges, realistic shadows, and clean separation from the dark graffiti background. Keep the composition polished, high-end, energetic, and social-media ready.\n\nDo not include any watermark, brand logo, AI-generated text, random Chinese characters, fake signatures, QR codes, platform labels, or unreadable typography. Any graffiti should be abstract decorative marks only, not readable text. The final image must be vertical 9:16.\n\nNegative Prompt:\n\nanime, cartoon, illustration, doll face, plastic skin, waxy skin, overly smooth face, beauty filter, fake glossy skin, over-beautified face, changed identity, different person, distorted face, asymmetrical eyes, bad hands, extra fingers, missing fingers, broken fingers, distorted body, unrealistic body proportions, stiff pose, floating hair, helmet-like hair, fake fabric, painted clothing, low-resolution texture, blurry face, over-sharpened skin, 3D render, CGI, toy-like, cheap poster, messy layout, unreadable text, watermark, logo, AI watermark, random letters, random Chinese text, QR code, duplicated face errors, inconsistent identity, cropped head, cut-off limbs", "prompt_preview": "Use the uploaded portrait only as the identity and hairstyle reference. Accurately preserve the person’s real facial identity, face shape, facial features, skin tone, hairstyle outline, hair volume, a"}, {"id": "184", "title": "Digicam LCD怀旧镜头", "title_en": "Digicam LCD Nostalgia Shot", "category": "人像与摄影案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/portrait_case184/output.jpg", "prompt": "A realistic close-up shot of a small digital camera screen glowing brightly in a dark indoor environment. Displayed on the LCD is a candid early-2010s style photograph of a young East Asian woman with long dark wavy hair standing beside a wooden shelf packed tightly with colorful comic books and magazines.\n\nShe wears a black spaghetti-strap top with a loose white cardigan hanging casually from both shoulders and faded blue jeans. Captured mid-laugh while turning her face slightly sideways, her expression feels spontaneous and natural, with hair falling softly across part of her cheek.\n\nThe harsh direct flash from the compact camera creates strong highlights on her face and cardigan while flattening shadows in the background, producing an authentic nostalgic digicam aesthetic. Slight motion blur and digital grain enhance the candid realism.\n\nCamera UI overlays are visible across the LCD screen, including the timestamp “8. 1. 2012 3:15 AM,” exposure data “1/30 F3.4 ISO 100,” focus indicators, and a small green battery symbol in the corner.\n\nThe image preserves visible screen pixel structure, slight glare reflections, chromatic softness, and compressed digital texture. Outside the LCD, the surrounding darkness fades smoothly into blur, emphasizing the glowing nostalgic screen.\n\nShot to resemble an authentic Sony Cyber-shot point-and-shoot camera from the early 2010s using a CCD sensor with vintage digital rendering and imperfect flash exposure.", "prompt_preview": "A realistic close-up shot of a small digital camera screen glowing brightly in a dark indoor environment. Displayed on the LCD is a candid early-2010s style photograph of a young East Asian woman with"}, {"id": "184", "title": "微型城市结雕塑", "title_en": "Miniature City Knot Sculpture", "category": "海报与插画案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/poster_case184/output.jpg", "prompt": "GPT Image 2 + Kling = 🔥 This was done for Tokyo. \n\n[VAR_CITY] = \"Tokyo, Japan\"     [NODE 1: BASE_TOPOLOGY] Generate a complex, self-intersecting 3D endless loop (e.g., a thick Trefoil Knot or Gordian Knot). Material_Output: Raw, unfinished layered birch plywood. Visible wood grain.  [NODE 2: INSTANCER_LOGIC] AI_INFERENCE_TRIGGER: Analyze [VAR_CITY]. Extract its iconic architectural style, specific landmarks, and road infrastructure.  Action: Instance these urban elements directly onto the surface normals of the [BASE_TOPOLOGY].  [NODE 3: GRAVITY_WARP] The gravity vector is strictly relative to the surface of the knot. Buildings must project outward from the wood, regardless of whether the surface is facing up, down, or sideways. The roads must follow the curvature perfectly. Tiny metallic cars dot the highways.  [RENDER_ENGINE] Execute Tree. Output as a physical macro-photography studio shot. The object sits on a blank museum pedestal. Soft, diffuse top-lighting. Shallow depth of field to emphasize the miniature scale.", "prompt_preview": "GPT Image 2 + Kling = 🔥 This was done for Tokyo. \n\n[VAR_CITY] = \"Tokyo, Japan\"     [NODE 1: BASE_TOPOLOGY] Generate a complex, self-intersecting 3D endless loop (e.g., a thick Trefoil Knot or Gordian "}, {"id": "185", "title": "Y2K街头艺术社论海报", "title_en": "Y2K Street-Art Editorial Poster", "category": "人像与摄影案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/portrait_case185/output.jpg", "prompt": "hair instructions, controlling hairstyle, changing hairstyle, young female, young male, bad anatomy, extra fingers, deformed hands, stiff pose, awkward body lean, distorted sunglasses, warped face, asymmetrical eyes, blurry face, low quality, low resolution, muddy colors, overcluttered layout, too many stickers, unreadable typography, misspelled text, cheap poster design, random logos, watermark, cartoon-only style, duplicate subject, extra limbs, plastic skin.", "prompt_preview": "hair instructions, controlling hairstyle, changing hairstyle, young female, young male, bad anatomy, extra fingers, deformed hands, stiff pose, awkward body lean, distorted sunglasses, warped face, as"}, {"id": "185", "title": "台湾美食博客传播", "title_en": "Taiwanese Food Blog Spread", "category": "海报与插画案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/poster_case185/output.jpg", "prompt": "A cozy restaurant table filled with a vibrant Taiwanese meal, shot in warm natural lighting. A large bowl of braised beef noodle soup with wide noodles, tender beef chunks, bok choy, and green onions sits in the foreground. Surrounding dishes include a bowl of rice topped with raw egg yolk, seaweed, kimchi, and chopped vegetables; a plate of Taiwanese fried chicken and tofu with greens; stir-fried water spinach with garlic; and a small dish of marinated vegetables. A tall elegant glass dessert with shrimp salad layered inside stands in the center. Wooden table surface, ceramic bowls, and a teapot in the background create a homely aesthetic. Handwritten-style Chinese text annotations and doodles are scattered around the dishes, adding a playful, lifestyle-blog feel. Soft depth of field, warm tones, high detail, food photography style.", "prompt_preview": "A cozy restaurant table filled with a vibrant Taiwanese meal, shot in warm natural lighting. A large bowl of braised beef noodle soup with wide noodles, tender beef chunks, bok choy, and green onions "}, {"id": "186", "title": "乐高微型城市社论", "title_en": "LEGO Miniature City Editorial", "category": "人像与摄影案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/portrait_case186/output.jpg", "prompt": "Use the uploaded reference image as the primary character reference.\nCreate a premium vertical 4:5 editorial illustration of the same character from the reference image, sitting at a cozy craft table and building a LEGO-style miniature diorama of [CITY NAME].\nOnly the character remains organic and natural. Everything else must be built entirely from visible LEGO-style bricks: landmarks, streets, bridges, rivers, lakes, trees, vehicles, trains, people, cafés, shops, food stalls, parks, signs, boa", "prompt_preview": "Use the uploaded reference image as the primary character reference.\nCreate a premium vertical 4:5 editorial illustration of the same character from the reference image, sitting at a cozy craft table "}, {"id": "186", "title": "外星人信息披露档案", "title_en": "Alien Disclosure Dossier", "category": "海报与插画案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/poster_case186/output.jpg", "prompt": "I asked GPT Image 2 to spill the beans on alien life. \n\ndo this for alien disclosure: <instruction>\nRole: You are \"The Declassification Officer,\" creating visually compelling intelligence dossiers.\n\nGoal: Produce a single vertical declassified case-file image about the chosen subject.\n\nPhase 1: Subject Classification\n- Analyze the input subject and reinterpret it as a high-priority intelligence target, anomaly, person of interest, secret invention, or unexplained event.\n- Assign:\n  - Case ID\n  - Threat level\n  - Classification level\n  - Status (active, missing, monitored, contained, unresolved)\n\nPhase 2: Document Structure\nDesign the image as a realistic but stylized dossier page with the following sections:\n- Header: agency-style title, case number, classification stamp.\n- Mugshot or main visual of the subject.\n- Summary paragraph.\n- Notable traits or observed abilities.\n- Timeline of 3–5 incidents.\n- Redacted notes.\n- Location sightings or evidence callouts.\n- Bottom section with stamp marks, signatures, and warnings.\n\nPhase 3: Visual Style\n- The entire output must be a single image.\n- Style: aged paper, photocopy texture, ink stamps, mild wear, redactions, handwritten annotations, paperclip shadows.\n- Include visual evidence elements such as photo corners, sticky notes, fingerprints, circles, arrows, highlighted lines.\n- Use readable layout and believable bureaucratic typography.\n\nPhase 4: Tone\n- Tone should be suspenseful, intriguing, and slightly cinematic.\n- Can be serious or humorous depending on the input.\n- Keep all content fictionalized if needed.\n\nOutput: One high-detail declassified dossier poster as a single finished image.\n</instruction>", "prompt_preview": "I asked GPT Image 2 to spill the beans on alien life. \n\ndo this for alien disclosure: <instruction>\nRole: You are \"The Declassification Officer,\" creating visually compelling intelligence dossiers.\n\nG"}, {"id": "187", "title": "时尚拼贴多风格肖像", "title_en": "Fashion Collage Multi-Style Portrait", "category": "人像与摄影案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/portrait_case187/output.jpg", "prompt": "Create a premium 1:1 ultra-stylish fashion collage advertisement featuring the same young handsome bearded male model across multiple cinematic portrait styles inside one single high-end composition. The model should have sharp jawline, textured beard, messy stylish hair, attractive confident expression, modern masculine aura, and luxury Gen-Z street fashion styling. Entire mood should feel bold, dark, mysterious, and visually addictive — designed for viral social media aesthetics. Theme: midnig", "prompt_preview": "Create a premium 1:1 ultra-stylish fashion collage advertisement featuring the same young handsome bearded male model across multiple cinematic portrait styles inside one single high-end composition. "}, {"id": "187", "title": "帝国地狱汉堡海报", "title_en": "Empire Inferno Burger Poster", "category": "海报与插画案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/poster_case187/output.jpg", "prompt": "A premium fast food advertisement poster with a cinematic composition and a clean white textured background with soft grey shading for depth.\nAt the top center, place a bold, modern logo text: “EMPIRE” with a minimal crown icon above it, sleek and premium typography.\nBelow the logo, add a large, dramatic headline in bold modern font:\n“NEW EMPIRE INFERNO BURGER”\n– The word INFERNO should have a fiery texture with flame elements integrated into the typography.\nAdd subtext below the headline in smaller clean font:\n“with signature hot sauce”\nMain composition (center focus):\nA hyper-realistic, ultra-detailed crispy chicken burger placed on a wooden board:\n– Thick, golden crunchy fried chicken fillet\n– Melted cheese dripping naturally\n– Fresh green lettuce and sliced jalapeños\n– Glossy toasted sesame bun\n– Spicy sauce visibly oozing out\n– Subtle steam/smoke rising to show heat and freshness\nAdditional food items:\n– A premium spicy pizza in the foreground with melted cheese, jalapeños, and spicy toppings\n– A black cup of creamy loaded fries (cheese sauce + jalapeños) placed to the side\nSide element:\n– A sleek glass bottle labeled “EMPIRE Signature Hot Sauce” with a premium black and red label design\nLighting:\n– High contrast studio lighting\n– Warm highlights on food\n– Soft shadows\n– Slight rim lighting for separation\nColor palette:\n– White and soft grey background\n– Fiery reds and oranges for spice\n– Golden browns for fried textures\n– Deep blacks for contrast elements\nExtra design elements:\n– Minimal spice icons or flame accents\n– Clean, modern layout with strong hierarchy\nBottom section:\n– Minimal icons and labels like: “Premium Chicken”, “Signature Hot Sauce”, “Fresh Ingredients”\n– NO order button or app store icons\nStyle:\nUltra-realistic, 8K food photography, commercial advertising, sharp focus, dramatic, premium global fast-food branding, highly detailed textures, mouthwatering presentation.", "prompt_preview": "A premium fast food advertisement poster with a cinematic composition and a clean white textured background with soft grey shading for depth.\nAt the top center, place a bold, modern logo text: “EMPIRE"}, {"id": "188", "title": "釜山旅游日记插图", "title_en": "Busan Travel Journal Illustration", "category": "人像与摄影案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/portrait_case188/output.jpg", "prompt": "Dreamy Busan Korea travel journal illustration, cozy vintage scrapbook aesthetic, watercolor and ink art style, red-haired girl sitting at a seaside café writing in a notebook, cream knitted cardigan, floral dress, cinematic ocean view, colorful Gamcheon Culture Village houses on cliffside, Korean signs, travel stamps, boarding pass, handwritten notes, postcards, maps, tape stickers, seashells, coffee cup, retro camera on wooden table, soft pastel tones, warm sunlight, detailed paper textures, w", "prompt_preview": "Dreamy Busan Korea travel journal illustration, cozy vintage scrapbook aesthetic, watercolor and ink art style, red-haired girl sitting at a seaside café writing in a notebook, cream knitted cardigan,"}, {"id": "188", "title": "希腊酸奶生活方式广告", "title_en": "Greek Yogurt Lifestyle Ad", "category": "海报与插画案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/poster_case188/output.jpg", "prompt": "Created by using GPT Image 2. \n\nPrompt👇\nUltra cinematic hyper-realistic premium dairy lifestyle advertisement, Milky Mist Greek Yogurt Natural cup placed as hero center foreground on glossy white marble counter, lid partially peeled revealing thick creamy yogurt with perfect spiral swirl texture, ultra-detailed micro highlights, condensation droplets on surface, branding ultra sharp\n\nBeautiful confident Indian woman (25–30), glowing natural skin with visible pores, soft blush tones, deep expressive brown eyes, long voluminous dark brown hair wind-blown with golden rim light, wearing minimal elegant light grey fitted t-shirt, leaning forward with both arms on counter framing the product, warm genuine smile, direct eye contact, friendly yet premium presence\n\nDynamic motion (hero effect): stainless steel spoon lifting thick yogurt upward creating smooth elastic creamy stretch, dramatic milk splash frozen mid-air around cup with suspended droplets (high-speed photography look), ultra realistic fluid physics, cinematic freeze motion\n\nForeground styling: fresh blueberries in white ceramic bowl, sliced strawberries with juice shine, crunchy granola scattered naturally, wooden spoon, mint leaves, premium editorial food styling (clean but rich composition)\n\nBackground: bright modern luxury kitchen interior, large soft window light from left, indoor plants softly blurred, warm cream tones, depth-rich cinematic bokeh, subtle lifestyle realism\n\nLighting: high-end commercial lighting setup, soft diffused key light from left, strong golden rim light on hair edges, product spotlight glow, deep soft shadows (not flat), HDR highlights on yogurt texture, magazine-level lighting\n\nComposition: 85mm lens, shallow depth of field f/1.8, subject slightly right, product perfectly centered and dominant, rule-of-thirds balance, luxury ad framing\n\nColor palette: pure white, sky blue, navy, fresh green, berry red, warm cream tones, ultra clean premium aesthetic\n\nStyle: Vogue-level editorial + Indian dairy commercial campaign, hyper-detailed, photorealistic, 8K ultra HD, crisp textures, luxury brand advertisement\n\nText overlay (optional, left side):\n“Thick. Creamy. Naturally Healthy.”\nsubtext: “High in Protein. Made with Love.”\nelegant serif + modern script combination\n\n--ar 4:5 --style raw --v 6 --q 2", "prompt_preview": "Created by using GPT Image 2. \n\nPrompt👇\nUltra cinematic hyper-realistic premium dairy lifestyle advertisement, Milky Mist Greek Yogurt Natural cup placed as hero center foreground on glossy white marb"}, {"id": "189", "title": "电影排球运动肖像摄影", "title_en": "Cinematic Volleyball Sports Portrait", "category": "人像与摄影案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/portrait_case189/output.jpg", "prompt": "Ultra-realistic cinematic sports portrait of a young athletic woman playing volleyball outdoors on a sunny tropical day, captured mid-action while gently tossing/spinning a colorful volleyball upward with one hand. She is standing on an outdoor sports court surrounded by green mesh fencing, lush tropical plants, palm leaves, and soft natural greenery in the background.", "prompt_preview": "Ultra-realistic cinematic sports portrait of a young athletic woman playing volleyball outdoors on a sunny tropical day, captured mid-action while gently tossing/spinning a colorful volleyball upward "}, {"id": "189", "title": "健身拳击运动拼贴海报", "title_en": "Fitness Boxing Campaign Collage Poster", "category": "海报与插画案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/poster_case189/output.jpg", "prompt": "Create a high-end fitness boxing poster in a 3-panel collage layout.\nTop panel:\nA strong athletic woman boxer wearing a red boxing outfit (sports bra, shorts, boxing gloves, high socks, boxing shoes) leaning confidently against a worn heavy punching bag. Studio background with large bold red typography behind ": "生成一张 9:16 竖版写实感人物照片，参考高级手机自拍质感，但不要完全普通生活照。整体像是用 iPhone 前置摄像头在温馨卧室中拍摄的精致自拍，保留柔和美型、干净构图和自然高级感。画质为真实手机照片质感，有轻微噪点、轻微柔焦和自然光感，但人物依然精致、漂亮、肤质自然干净，不要变成粗糙低质照片。\n\n画面中是一位成年东方女性，坐在温馨卧室床上，上半身近景自拍构图，镜头略微从上方俯拍，人物位于画面中"}, {"id": "210", "title": "Y2K日本街头社论海报", "title_en": "Y2K Japanese Street Editorial Poster", "category": "人像与摄影案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/portrait_case210/output.jpg", "prompt": "Create a bold Y2K Japanese street-editorial collage poster with a clean high-fashion magazine aesthetic, gritty paper textures, torn magazine cutouts, distressed ink splashes, and urban Tokyo-inspired design.", "prompt_preview": "Create a bold Y2K Japanese street-editorial collage poster with a clean high-fashion magazine aesthetic, gritty paper textures, torn magazine cutouts, distressed ink splashes, and urban Tokyo-inspired"}, {"id": "211", "title": "编辑男性肖像", "title_en": "Editorial Male Portrait", "category": "人像与摄影案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/portrait_case211/output.jpg", "prompt": "Ultra-realistic 8K editorial male portrait of the uploaded man, using his exact face as the ONLY identity reference — preserve 100% facial structure, jawline, hairstyle volume, beard texture, skin tone, eye shape, pores, and natural imperfections with zero beautification or face alteration. Luxury “quiet wealth” aesthetic blended with cinematic Instagram masculinity. Centered close-up composition, direct eye contact, calm dominant expression, slightly serious mood, no smile. Styled in a fitted black turtleneck under a premium black tailored blazer, no accessories. Dark emerald-green cinematic studio gradient background with soft atmospheric depth. Shot on an 85mm lens at f/1.8 with razor-sharp focus on the eyes, creamy bokeh, ultra-detailed skin texture, visible beard strands, realistic hair fibers, HDR dynamic range, deep contrast shadows, subtle rim li 河入梦 3D CG 插画", "title_en": "星河入梦 3D CG 插画", "category": "海报与插画案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/poster_case272/output.jpg", "prompt": "一位成年东方幻想系女性角色，梦幻星河仙女风，3D CG 高精度插画质感，9:16 竖版构图，画面充满全息星河、流光粒子、银河丝带与柔雾光晕。\n\n人物位于画面中央偏左，半身到大腿视角，身体呈优雅的 S 型动态站姿。她的上半身微微向一侧倾斜，腰部自然收束并轻轻扭转，胯部向相反方向形成柔和弧线，一侧肩膀略微抬起，另一侧肩膀自然放松，整体姿态像在星河中缓慢旋转，既轻盈又具有女性柔美。头部微微低垂，脸部呈三分之二侧脸，眼神温柔、安静、梦幻，神情清冷而优雅。\n\n她拥有精致柔和的东方幻想系五官，白皙通透的肌肤，肌肤带有柔和的次表面散射与珍珠般高光，面部轮廓干净细腻，鼻梁纤细，嘴唇柔软，睫毛纤长。长发为淡银白色与浅粉紫色渐变，发丝被星风吹起，向画面右侧大面积飘散，形成流动感极强的弧线，与人物 S 型身体曲线相互呼应。\n\n服装是一件梦幻星河礼裙，材质轻盈透明但保持优雅克制，肩部为柔软薄纱结构，胸口与腰部有银河般的渐变流光纹理，颜色以浅粉、淡蓝、薰衣草紫、珍珠白为主，局部点缀金色星尘。裙身像星云与薄纱融合而成，轻盈飘动，围绕人物身体形成螺旋状流光带，强调腰线、肩颈线与整体 S 型姿态，但不刻意暴露。\n\n背景是梦幻宇宙星河空间，整体色调为淡粉色、浅蓝色、薰衣草紫与柔金色，充满细密星光、星尘粒子、银河流线、半透明全息光带。光线从左上方柔和洒下，在人物发丝、肩颈、脸颊和礼裙边缘形成温柔轮廓光。画面空气感强，光晕柔和，整体像漂浮在银河梦境中。\n\n构图要求：\n人物身体线条呈明显但自然的 S 型曲线；\n肩、腰、胯形成柔和的反向动态；\n头发与星河丝带共同形成环绕式流动；\n画面保留大量梦幻光雾与星尘；\n人物优雅、柔美、梦幻、高级；\n重点表现女性身姿的柔和曲线、星河仙女气质与高级幻想感。\n\n风格关键词：\ndreamy fantasy girl, celestial goddess, galaxy dress, holographic starlight, soft pastel colors, ethereal beauty, elegant S-curve pose, cinematic lighting, ultra detailed 3D CG, soft glow, translucent silk, star particles, romantic fantasy atmosphere, high-end illustration, 16K detail, vertical poster composition\n\n负面提示词：\n身体比例错误，畸形手指，多手指，多手臂，脸部崩坏，眼睛不对称，廉价质感，灰蒙蒙，脏色调，过度锐化，低清晰度，杂乱背景，文字，水印，logo", "prompt_preview": "一位成年东方幻想系女性角色，梦幻星河仙女风，3D CG 高精度插画质感，9:16 竖版构图，画面充满全息星河、流光粒子、银河丝带与柔雾光晕。\n\n人物位于画面中央偏左，半身到大腿视角，身体呈优雅的 S 型动态站姿。她的上半身微微向一侧倾斜，腰部自然收束并轻轻扭转，胯部向相反方向形成柔和弧线，一侧肩膀略微抬起，另一侧肩膀自然放松，整体姿态像在星河中缓慢旋转，既轻盈又具有女性柔美。头部微微低垂，脸部呈三"}, {"id": "273", "title": "角色资料表", "title_en": "Character Profile Sheet", "category": "海报与插画案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/poster_case273/output.jpg", "prompt": "A stylish illustrated character profile sheet of a handsome young man sketchbook aesthetic, mixed media ink and watercolor style, highly detailed fashion portrait, messy dar lossy peach makeup, subtle freckles, soft shimmer eyelids, glossy nude lips, and delicate gold jewelry including layered necklaces, pearl rings, and slim bracelets. She wears elegant cream lace-up heels and carries a handcrafted crochet tote bag decorated with sunflower charms, daisy patches, mini ribbons, tiny plush keychains, and aesthetic beads.\nThe background is a bright warm editorial studio with creamy beige gradients, golden sunlight rays, subtle shadows, soft reflections, floating dust particles, and dreamy glowing highlights. The layout should feel like a realistic Pinterest luxury collage board with clean spacing and balanced composition.\nAround the character include many small scrapbook-inspired collage sections:\n\n– close-up beauty portraits\n\n– sunflower photography\n\n– perfume bottle flatlays\n\n– jewelry editorials\n\n– cozy café lifestyle moments\n\n– fashion accessories\n\n– handwritten diary pieces\n\n– soft fabric texture swatches\n\n– vintage books\n\n– coffee cups\n\n– aesthetic shoes\n\n– makeup close-ups\n\n– hair inspiration photos\n\n– dried flower arrangements\n\n– cute doodles and tiny heart sketches\n\n– polaroid-style frames\n\n– paper tape pieces\n\n– editorial magazine snippets\nTypography should be very small, elegant, subtle, and blended naturally into the layout like luxury fashion magazine captions. Use tiny serif text such as: “golden aura”, “soft bloom”, “editorial notes”, “mood archive”, and “daily elegance”. Text must never dominate the image.\nOverall aesthetic: warm, feminine, luxurious, ultra detailed, realistic photography, soft dreamy atmosphere, premium Korean fashion magazine moodboard, cinematic lighting, highly aesthetic Pinterest composition, rich textures, airy and bright color palette.", "prompt_preview": "Create an ultra-realistic luxury fashion moodboard poster in a premium Korean editorial magazine style. A beautiful young woman stands elegantly in the center wearing a flowing ivory floral chiffon ma"}, {"id": "275", "title": "釜山旅游日记插图", "title_en": "Busan Travel Journal Illustration", "category": "海报与插画案例", "img": "https://raw.githubusercontent.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts/main/images/poster_case275/output.jpg", "prompt": "Create a dreamy handcrafted ( CITY)travel journal illustration, as if painted in an artist’s personal sketchbook while traveling through (COUNTRY )\nSCENE: A romantic Busan coastal setting inspired by Gamcheon Culture Village + Haeundae + Songdo seaside charm. Feature: oceanfront promenade gentle waves seagulls Korean seaside cafés pastel coastal buildings tiny fishing boats paper lantern accents boardwalk details colorful Busan hillside houses in the distance beach umbrellas ocean breeze atmosphere subtle Korean storefront signage travel discovery mood \nSUBJECT: Place the woman from the uploaded reference naturally in the scene. Appearance:￼ long flowing copper auburn hair moving softly in the sea breeze hazel-green eyes fair skin natural elegant expression soft thoughtful gaze \nWARDROBE: romantic coastal travel styling cream knit sweater flowing midi skirt light trench coat or airy cardigan delicate scarf moving with wind comfortable elegant walking shoes \nPOSE OPTIONS: ((walking along the Busan seaside promenade)) OR ((sitting at a Korean seaside café sketching in a journal)) OR￼ ￼ ((holding a travel journal while looking toward the ocean)) OR ((standing near the railing with wind in hair, candid cinematic pose)) \nSTYLE: premium watercolor travel-journal illustration hand-drawn ink sketch detailing transparent watercolor washes aged textured paper pigment bleeding ink splatters vintage travel scrapbook aesthetic editorial artistic composition luxury Pinterest-worthy illustration \nADD SCRAPBOOK ELEMENTS: handwritten diary notes \"BUSAN\" \"KOREA\" tiny illustrated coastline map￼ metro ticket fragments passport stamps vintage postage marks boarding pass scraps coffee stains botanical doodles hand-drawn arrows tiny seashell
